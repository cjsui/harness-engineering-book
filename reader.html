  (function () {
    var DOCS = {"readme": "<p>本 repo 是一份 <strong>以開源專案 <a href=\"https://github.com/ultraworkers/claw-code\">claw-code</a> 為核心案例</strong> 的 Harness Engineering 學習手冊：教學敘事、章節中的路徑與設計討論，皆對應到該專案在 GitHub 上的目錄與實作。請將 <a href=\"https://github.com/ultraworkers/claw-code\">ultraworkers/claw-code</a> 視為本教材的 <strong>primary reference implementation</strong>；閱讀時建議 clone 或線上對照原始碼，而非僅讀本書文字。</p>\n<p><strong>案例來源（正式引用）</strong>：<a href=\"https://github.com/ultraworkers/claw-code\">https://github.com/ultraworkers/claw-code</a>（授權與版本資訊以該 repo 為準。）</p>\n<hr />\n<h2>書籤導覽（Landing）</h2>\n<table>\n<thead>\n<tr>\n<th>區塊</th>\n<th>說明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"#he-overview\">這是什麼</a></td>\n<td>教材定位與學習路線</td>\n</tr>\n<tr>\n<td><a href=\"#he-claw-code-ref\">案例 repo</a></td>\n<td><strong>claw-code</strong> 正式連結與引用方式</td>\n</tr>\n<tr>\n<td><a href=\"#he-audience\">適合誰</a></td>\n<td>先備能力</td>\n</tr>\n<tr>\n<td><a href=\"#he-outcomes\">你會學到什麼</a></td>\n<td>學習成果</td>\n</tr>\n<tr>\n<td><a href=\"#he-readers\">閱讀方式：離線／Vercel</a></td>\n<td><code>reader.html</code> 與動態 Web Reader</td>\n</tr>\n<tr>\n<td><a href=\"#he-start-here\">先從哪裡開始</a></td>\n<td>檔案導覽</td>\n</tr>\n<tr>\n<td><a href=\"#he-howto\">如何使用這本教材</a></td>\n<td>自學／授課建議</td>\n</tr>\n<tr>\n<td><a href=\"#he-plan-impl\">從 plan 到 implementation</a></td>\n<td>文件化開發過程</td>\n</tr>\n<tr>\n<td><a href=\"#he-structure\">全書結構</a></td>\n<td>Part I–IV 與附錄</td>\n</tr>\n<tr>\n<td><a href=\"#he-case-sources\">主要案例來源（對照 claw-code）</a></td>\n<td>建議閱讀的檔案路徑</td>\n</tr>\n<tr>\n<td><a href=\"#he-next\">what's next</a></td>\n<td>後續工作</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><span id=\"he-overview\"></span></p>\n<h2>這是什麼</h2>\n<p>這是一套以 <strong>claw-code</strong>（<a href=\"https://github.com/ultraworkers/claw-code\">ultraworkers/claw-code</a>）為核心案例的 Harness Engineering 教材，兼具自學講義與正式課程教案兩種用途。整套教材採「先拆解、後實作」路線，先幫你看懂真實 agent harness，再帶你用 Python 重建一個可工作的 <code>mini harness</code>。</p>\n<p><span id=\"he-claw-code-ref\"></span></p>\n<h2>案例 repo（claw-code）</h2>\n<ul>\n<li><strong>GitHub</strong>：<a href=\"https://github.com/ultraworkers/claw-code\">https://github.com/ultraworkers/claw-code</a></li>\n<li><strong>用途</strong>：本書 Part II 與多處範例皆以該 repo 的目錄配置、模組邊界與設計取捨為準；若正文與上游版本不一致，請以上游 repo 為準並自行對照 commit／tag。</li>\n</ul>\n<p><span id=\"he-audience\"></span></p>\n<h2>適合誰</h2>\n<p>適合已具備基本程式能力、熟悉 Python、CLI、Git，但尚未系統性學過 agent harness / systems engineering 的學習者。若你已經會寫程式、也用過 AI coding 工具，但還沒有把 runtime、tools、permissions、session、testing 看成同一個系統，這套教材就是為你準備的。</p>\n<p><span id=\"he-outcomes\"></span></p>\n<h2>你會學到什麼</h2>\n<ul>\n<li>看懂 <strong>claw-code</strong> 的核心架構（對照 <a href=\"https://github.com/ultraworkers/claw-code\">GitHub 原始碼</a>）</li>\n<li>能說明 runtime、tools、permissions、session、testing 的關係</li>\n<li>能實作一個 <code>Python mini harness</code></li>\n<li>能區分哪些能力屬於 harness 本質，哪些屬於規模化後才長出的複雜度</li>\n</ul>\n<p><span id=\"he-readers\"></span></p>\n<h2>閱讀方式：離線／Vercel</h2>\n<table>\n<thead>\n<tr>\n<th>方式</th>\n<th>說明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>離線單檔</strong></td>\n<td>開啟根目錄的 <code>reader.html</code>（由 <code>python3 tools/build_reader.py</code> 產生，內嵌已轉好的 HTML）</td>\n</tr>\n<tr>\n<td><strong>Vercel 動態版</strong></td>\n<td>將本目錄連到 Vercel 後，開啟站台的 <code>/</code>（<code>public/index.html</code>）：透過 <code>/api/doc</code> <strong>執行時讀取</strong> repo 內 <code>.md</code>，前端以 Markdown 渲染；<strong>不需把正文寫死在 HTML</strong>。建置會執行 <code>build_reader.py</code> 以更新 <code>reader.html</code> 與 <code>public/book-manifest.json</code>。</td>\n</tr>\n</tbody>\n</table>\n<p>部署提示：在 Vercel 專案設定將 <strong>Root Directory</strong> 指向本資料夾（<code>harness-engineering-book</code>）；<code>vercel.json</code> 已設定 <code>installCommand</code>／<code>buildCommand</code>。</p>\n<p><span id=\"he-start-here\"></span></p>\n<h2>先從哪裡開始</h2>\n<ul>\n<li><strong><code>reader.html</code>（離線瀏覽器版）</strong>：單一 HTML、不需 npm／本機伺服器，用瀏覽器開啟即可側欄導覽、深淺色切換、章節篩選與書內連結跳轉；內文可離線閱讀（字型預設走 Google Fonts CDN，離線時會退回系統字型）。教材 Markdown 更新後，請執行 <code>python3 tools/build_reader.py</code> 重新產生此檔與 <code>public/book-manifest.json</code>。</li>\n<li><strong><code>public/index.html</code>（Vercel／本機動態版）</strong>：需可存取 <code>/api/doc</code>（部署於 Vercel 時由 Serverless 提供）；章節列表來自 <code>book-manifest.json</code>。</li>\n<li><code>index.md</code>：全書目錄與章節入口</li>\n<li><code>roadmap.md</code>：自主學習路線圖</li>\n<li><code>syllabus.md</code>：授課版本的課程視角</li>\n<li><code>glossary.md</code>：關鍵術語表</li>\n<li><code>references.md</code>：<strong>claw-code</strong> 核心來源檔閱讀清單</li>\n<li><code>writing-progress.md</code>：目前撰寫進度與完成狀態</li>\n</ul>\n<p><span id=\"he-howto\"></span></p>\n<h2>如何使用這本教材</h2>\n<ul>\n<li><strong>用瀏覽器讀（離線）</strong>：開啟本目錄下的 <code>reader.html</code>；主欄會隨視窗寬度延伸（寬螢幕不會再卡在窄欄），窄螢幕可收合側欄並支援安全區與觸控友善按鈕高度。若你修改了任何章節 <code>.md</code>，請在專案內執行 <code>python3 tools/build_reader.py</code>（需已安裝 Python 套件 <code>markdown</code>）以同步更新 <code>reader.html</code> 與動態讀者用的 manifest。</li>\n<li><strong>用瀏覽器讀（線上／Vercel）</strong>：部署後使用站台首頁動態讀者；更新 <code>.md</code> 後重新部署即可，無須手動把 Markdown 貼進 HTML。</li>\n<li>自主學習路線：依 <code>index.md</code> 與 <code>roadmap.md</code> 逐章前進，邊讀 <a href=\"https://github.com/ultraworkers/claw-code\">claw-code</a>、邊整理自己的設計筆記（亦可全程用 reader 對照）</li>\n<li>授課使用路線：搭配 <code>syllabus.md</code> 依 Part I-IV 分段授課，將閱讀、實作與反思題組合成課程活動</li>\n<li>快速導覽路線：若只想先看整體，先讀第 <code>1</code>、<code>2</code>、<code>4</code>、<code>15</code>、<code>16</code>、<code>19</code> 章，再回補細節章節</li>\n</ul>\n<p><span id=\"he-plan-impl\"></span></p>\n<h2>從 <code>plan</code> 到 <code>implementation</code></h2>\n<p>這套教材不是一次性產出，而是依照一份明確的 docs-first <code>plan</code> 逐步落地。</p>\n<h3><code>plan</code></h3>\n<p>教材設計先從兩份文件出發：</p>\n<ul>\n<li>規格：<a href=\"../docs/superpowers/specs/2026-04-06-harness-engineering-curriculum-design.md\"><code>../docs/superpowers/specs/2026-04-06-harness-engineering-curriculum-design.md</code></a></li>\n<li>實作計畫：<a href=\"../docs/superpowers/plans/2026-04-06-harness-engineering-curriculum.md\"><code>../docs/superpowers/plans/2026-04-06-harness-engineering-curriculum.md</code></a></li>\n</ul>\n<p>在 <code>plan</code> 階段，幾個關鍵決策被先定清楚：</p>\n<ul>\n<li>採用 docs-first workflow，而不是先寫零散章節</li>\n<li>採 <code>MVP</code> 先行，再擴展成 full curriculum</li>\n<li>將章節模板分成 analysis chapters 與 build / integration chapters 兩類</li>\n<li>教學主讀 <strong>claw-code</strong> 的 <code>rust/</code> 主實作（<a href=\"https://github.com/ultraworkers/claw-code\">來源 repo</a>），同時保留 Python 作為 <code>mini harness</code> 重建語言</li>\n<li>保留 <code>19</code> 章主體與 <code>3</code> 份附錄，形成完整課程包</li>\n</ul>\n<h3><code>implementation</code></h3>\n<p>依照上面的 <code>plan</code>，目前已完成的 <code>implementation</code> 包括：</p>\n<ul>\n<li>全書骨架與作者支援檔：<code>README.md</code>、<code>index.md</code>、<code>syllabus.md</code>、<code>roadmap.md</code>、<code>glossary.md</code>、<code>references.md</code>、兩種 chapter templates、<code>writing-progress.md</code></li>\n<li>Part I 到 Part IV 共 <code>19</code> 章</li>\n<li><code>3</code> 份附錄：<code>appendix-a</code>、<code>appendix-b</code>、<code>appendix-d</code></li>\n<li>導航與進度同步更新</li>\n<li>一輪全書 QA：結構、模板、placeholder、語意錨點、內部連結與長度軟檢查</li>\n<li><strong>Web 讀者</strong>：<code>reader.html</code>（單檔、內嵌章節 HTML）與產生腳本 <code>tools/build_reader.py</code>；腳本僅讀取既有 <code>.md</code>、不會改寫教材源檔</li>\n<li><strong>Vercel 動態讀者</strong>：<code>public/index.html</code> + <code>api/doc.js</code> + <code>public/book-manifest.json</code>（由同一支 <code>build_reader.py</code> 產生 manifest）</li>\n</ul>\n<p>目前狀態可以直接概括為：<strong>完整初稿已成形。</strong></p>\n<p><span id=\"he-structure\"></span></p>\n<h2>全書結構</h2>\n<ul>\n<li>Part I：概念地基</li>\n<li>Part II：<strong>claw-code</strong> 拆解</li>\n<li>Part III：<code>mini harness</code> 重建</li>\n<li>Part IV：整合與提升</li>\n<li>Appendices：閱讀地圖、專題指南、進修方向</li>\n</ul>\n<p><span id=\"he-case-sources\"></span></p>\n<h2>主要案例來源（對照 claw-code）</h2>\n<p>以下路徑相對於 <a href=\"https://github.com/ultraworkers/claw-code\">claw-code 專案根目錄</a>（請以該 repo 實際檔案為準）：</p>\n<ul>\n<li><code>README.md</code></li>\n<li><code>USAGE.md</code></li>\n<li><code>PHILOSOPHY.md</code></li>\n<li><code>rust/README.md</code></li>\n<li><code>rust/crates/runtime/src/*</code></li>\n<li><code>rust/crates/tools/src/lib.rs</code></li>\n</ul>\n<p><span id=\"he-next\"></span></p>\n<h2><code>what's next</code></h2>\n<p>目前這套教材已經是可讀、可教、可自學的完整第一版，但還有幾個自然的下一步：</p>\n<ul>\n<li>編輯型 QA：刪除重複句、壓縮冗長段落、統一章節語氣與密度</li>\n<li><strong>Web 讀者進階</strong>（選做）：將字型改為 base64 內嵌以達成完全離線單檔、或加上列印樣式／閱讀進度匯出等</li>\n<li>教學資產補件：補 <code>assets/diagrams/</code>、<code>assets/code-snippets/</code>、<code>assets/figures/</code></li>\n<li>專題驗證：依附錄 B 真的做一輪 <code>mini harness</code> 專題，檢查章節順序與作業設計是否順手</li>\n<li>課程試教：用 <code>syllabus.md</code> 跑一輪課堂或自學 pilot，回收卡點與需要補強的章節</li>\n<li>第二階段擴充：在教材之外，再補 <code>evaluation</code>、<code>MCP</code>、remote execution、deployment 等進階主題</li>\n</ul>\n<p>如果你現在就要開始讀，最好的做法不是等它變成「完美版」，而是直接從 <code>reader.html</code>（離線）、<code>public/index.html</code>（線上部署後），或 <code>index.md</code>／<code>roadmap.md</code>（編輯器）進入，先走完一輪完整學習路徑。</p>", "index": "<h2>閱讀方式</h2>\n<p>本書採「先拆解、後實作」的學習順序。建議先完成 Part I 與 Part II，建立閱讀大型 harness 的能力，再進入 Part III 的 <code>mini harness</code> 重建，最後用 Part IV 做整體回看。</p>\n<h2>全書目錄</h2>\n<h3>Part I：Harness Engineering 的基礎觀念</h3>\n<ol>\n<li><a href=\"#\" data-doc=\"ch01\" class=\"internal-md-link\">第 1 章：從 Prompt Engineering 到 Harness Engineering</a></li>\n<li><a href=\"#\" data-doc=\"ch02\" class=\"internal-md-link\">第 2 章：AI Agent 系統的基本構成</a></li>\n<li><a href=\"#\" data-doc=\"ch03\" class=\"internal-md-link\">第 3 章：Harness 的核心設計原則</a></li>\n<li><a href=\"#\" data-doc=\"ch04\" class=\"internal-md-link\">第 4 章：如何閱讀一個真實的 Agent Harness</a></li>\n</ol>\n<h3>Part II：以 <code>claw-code</code> 拆解真實 Harness</h3>\n<ol start=\"5\">\n<li><a href=\"#\" data-doc=\"ch05\" class=\"internal-md-link\">第 5 章：從 CLI 入口看整個系統</a></li>\n<li><a href=\"#\" data-doc=\"ch06\" class=\"internal-md-link\">第 6 章：Conversation Runtime：Agent Loop 的心臟</a></li>\n<li><a href=\"#\" data-doc=\"ch07\" class=\"internal-md-link\">第 7 章：Tool System：讓模型有手腳</a></li>\n<li><a href=\"#\" data-doc=\"ch08\" class=\"internal-md-link\">第 8 章：Permissions and Guardrails：讓模型不會亂來</a></li>\n<li><a href=\"#\" data-doc=\"ch09\" class=\"internal-md-link\">第 9 章：Session、Transcript、Memory</a></li>\n<li><a href=\"#\" data-doc=\"ch10\" class=\"internal-md-link\">第 10 章：Prompt Assembly 與 Project Context</a></li>\n<li><a href=\"#\" data-doc=\"ch11\" class=\"internal-md-link\">第 11 章：Config、Modes 與執行環境</a></li>\n<li><a href=\"#\" data-doc=\"ch12\" class=\"internal-md-link\">第 12 章：MCP、Plugins 與能力擴充</a></li>\n<li><a href=\"#\" data-doc=\"ch13\" class=\"internal-md-link\">第 13 章：Remote 與多執行環境能力</a></li>\n<li><a href=\"#\" data-doc=\"ch14\" class=\"internal-md-link\">第 14 章：Parity Harness 與測試哲學</a></li>\n<li><a href=\"#\" data-doc=\"ch15\" class=\"internal-md-link\">第 15 章：把 <code>claw-code</code> 當成一個完整系統來理解</a></li>\n</ol>\n<h3>Part III：用 Python 重建一個 Mini Harness</h3>\n<ol start=\"16\">\n<li><a href=\"#\" data-doc=\"ch16\" class=\"internal-md-link\">第 16 章：定義 Mini Harness 的最小範圍</a></li>\n<li><a href=\"#\" data-doc=\"ch17\" class=\"internal-md-link\">第 17 章：實作最小 Runtime、Tools 與 Permissions</a></li>\n<li><a href=\"#\" data-doc=\"ch18\" class=\"internal-md-link\">第 18 章：加入 Session Persistence 與基本測試</a></li>\n</ol>\n<h3>Part IV：整合與提升</h3>\n<ol start=\"19\">\n<li><a href=\"#\" data-doc=\"ch19\" class=\"internal-md-link\">第 19 章：從 Mini Harness 回看真實 Harness</a></li>\n</ol>\n<h3>Appendices</h3>\n<p>A. <a href=\"#\" data-doc=\"appendix-a\" class=\"internal-md-link\">附錄 A：<code>claw-code</code> 閱讀地圖</a><br />\nB. <a href=\"#\" data-doc=\"appendix-b\" class=\"internal-md-link\">附錄 B：<code>mini harness</code> 專題製作指南</a><br />\nD. <a href=\"#\" data-doc=\"appendix-d\" class=\"internal-md-link\">附錄 D：後續進修方向</a></p>", "syllabus": "<h2>課程定位</h2>\n<p>本課程以真實 agent harness 作為主案例，帶學生從概念理解、系統拆解，到最終以 Python 重建 <code>mini harness</code>。它同時可作為大學課程、研究導向讀書會，或工程師自主學習教材。</p>\n<h2>目標學生</h2>\n<p>具備基本程式能力，熟悉 Python / CLI / Git，想從 AI coding 的使用者提升為能理解與設計 agent harness 的工程學習者。</p>\n<h2>學習成果</h2>\n<p>完成本課程後，學生應能看懂 <code>claw-code</code> 的核心架構、清楚說明 runtime / tools / permissions / session / testing 的互動關係，並獨立規劃與實作一個最小可行的 <code>Python mini harness</code>。</p>\n<h2>建議授課方式</h2>\n<ul>\n<li>12 週版</li>\n<li>16 週版</li>\n<li>工作坊濃縮版</li>\n</ul>\n<h2>章節對應</h2>\n<ul>\n<li>Part I：概念導入</li>\n<li>Part II：系統拆解</li>\n<li>Part III：重建實作</li>\n<li>Part IV：整合反思</li>\n</ul>\n<h2>評量建議</h2>\n<ul>\n<li>閱讀筆記</li>\n<li>架構圖</li>\n<li>mini harness 專題</li>\n<li>期末整合報告</li>\n</ul>", "roadmap": "<h2>Route A：完整主教材路線</h2>\n<p>依序閱讀 Part I -&gt; Part II -&gt; Part III -&gt; Part IV，適合想完整建立 Harness Engineering 心智模型、並最終自己做出 <code>mini harness</code> 的學習者。</p>\n<h2>Route B：只想快速看懂 <code>claw-code</code></h2>\n<p>先讀第 1、2、4 章建立閱讀策略，再跳到第 5-15 章，以 <code>claw-code</code> 為中心理解真實系統的分層與設計取捨。</p>\n<h2>Route C：只想先做 <code>mini harness</code></h2>\n<p>至少先讀第 1、2、3、6、7、8、14 章，建立 runtime / tools / permissions / testing 的最低背景，再進入第 16-19 章實作與整合。</p>\n<h2>章節先修關係</h2>\n<p>Part I 是全書地基；第 6、7、8、14 章是 Part II 的關鍵樞紐；第 16 章則是進入 <code>mini harness</code> 實作前的必要範圍定義章。</p>\n<h2>常見卡點與建議讀法</h2>\n<p>如果你在 Part II 被大型 repo 淹沒，先回到第 4 章的閱讀方法，再用 <code>references.md</code> 只追核心檔案；如果你在 Part III 不確定該保留哪些能力，回看第 15 章與第 16 章的 essential vs scale-induced 比較。</p>", "glossary": "<table>\n<thead>\n<tr>\n<th>Term</th>\n<th>中文說明</th>\n<th>在本書中的位置</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Prompt Engineering</td>\n<td>以 prompt 技巧提升模型輸出的做法</td>\n<td>第 1 章</td>\n</tr>\n<tr>\n<td>Harness Engineering</td>\n<td>將模型包裝進可操作、可限制、可測試系統的工程工作</td>\n<td>第 1-3 章</td>\n</tr>\n<tr>\n<td>Runtime</td>\n<td>執行 turn loop 的核心</td>\n<td>第 6 章</td>\n</tr>\n<tr>\n<td>Tool Registry</td>\n<td>集中管理工具宣告與可用性的層</td>\n<td>第 7 章</td>\n</tr>\n<tr>\n<td>Permission Policy</td>\n<td>控制工具權限的規則層</td>\n<td>第 8 章</td>\n</tr>\n<tr>\n<td>Session</td>\n<td>對話與狀態的持續容器</td>\n<td>第 9 章</td>\n</tr>\n<tr>\n<td>Prompt Assembly</td>\n<td>將 system prompt 與 context 組裝起來的流程</td>\n<td>第 10 章</td>\n</tr>\n<tr>\n<td>MCP</td>\n<td>外部能力擴充協定與工具橋接方式</td>\n<td>第 12 章</td>\n</tr>\n<tr>\n<td>Parity Harness</td>\n<td>用 mock / scenario 驗證行為一致性的測試方法</td>\n<td>第 14 章</td>\n</tr>\n<tr>\n<td>Mini Harness</td>\n<td>本書後半段用 Python 重建的最小系統</td>\n<td>第 16-19 章</td>\n</tr>\n</tbody>\n</table>", "references": "<h2>Primary Source Repository</h2>\n<ul>\n<li><code>claw-code/README.md</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n</ul>\n<h2>Core Runtime Files</h2>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/conversation.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/session.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/prompt.rs</code></li>\n</ul>\n<h2>Tooling Files</h2>\n<ul>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n</ul>\n<h2>Verification Files</h2>\n<ul>\n<li><code>claw-code/rust/crates/rusty-claude-cli/tests/mock_parity_harness.rs</code></li>\n<li><code>claw-code/rust/mock_parity_scenarios.json</code></li>\n</ul>\n<h2>Reading Strategy</h2>\n<ul>\n<li>先看 README / USAGE 建立入口</li>\n<li>再看 runtime 核心</li>\n<li>再看 tools / permissions / testing</li>\n</ul>", "ch01": "<h2>章節導言</h2>\n<p>很多人第一次接觸 AI coding，直覺上會把它理解成「把問題問好一點，模型就會回答好一點」。這個理解在早期並不算錯，因為當時多數工作流確實以單輪問答為主：人把程式碼、錯誤訊息、需求描述貼進對話框，模型回傳一段文字或一段程式碼，再由人自己去執行、測試、修正。這種工作方式的重點，自然會落在 prompt wording、上下文安排、few-shot example、Chain-of-Thought 之類的技巧上。</p>\n<p>但今天的 AI coding 工具已經不是單純的聊天視窗。像 <code>claw-code</code> 這種系統，真正重要的不是模型會不會「講得漂亮」，而是它能不能在一個可操作、可限制、可測試的環境裡穩定工作。模型要能讀檔、搜尋、執行工具、被限制權限、保存 session、接受測試、在失敗後重試。到了這個階段，工程焦點就從「如何對模型說話」轉向「如何為模型搭建工作系統」。</p>\n<p>這一章的任務，是把這個典範轉移講清楚。你不只要知道 <code>Harness Engineering</code> 是什麼，還要知道它為什麼會取代純粹的 prompt 技巧，成為現代 agent tooling 的主軸。更重要的是，你要開始建立本書的第一個核心視角：學 <code>claw-code</code>，不是為了背一個 repo，而是為了理解一種把 LLM 變成可運作系統元件的方法。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能區分 prompt engineering 與 harness engineering</li>\n<li>能說明為什麼現代 AI coding 的瓶頸已轉向系統設計</li>\n<li>能解釋 tools、permissions、session、testing 為何成為主軸</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>Prompt engineering 在早期工作流中的角色</h3>\n<p>早期的 LLM 使用方式，本質上比較接近「高能力但無手腳的顧問」。你可以向它提問、要求它產生程式碼、請它解釋錯誤，但模型本身無法直接進入你的工作區，也不能自己跑測試、讀 log、呼叫 shell、操作版本控制。換句話說，模型只能靠你餵給它的文字來理解世界。</p>\n<p>在這種條件下，<code>Prompt Engineering</code> 之所以重要，是因為它是在資訊受限、互動受限的情況下，盡可能提高輸出品質的方法。你要決定哪些背景資訊先給、哪些 code snippet 要貼、問題要分成幾步、要不要先給範例、要不要要求模型先思考再回答。這些技巧並不虛假，它們曾經真的是有效的工程能力。</p>\n<p>但它有兩個明顯限制。第一，很多資訊整理工作其實是由人手動代勞，例如複製錯誤訊息、刪掉不相關內容、重述需求。第二，輸出品質常常高度依賴單次 prompt 的文字工藝，結果容易脆弱，也不容易在團隊中重現。只要換一個人提問、少貼一段背景、或多貼了一段噪音，模型的回答品質就可能明顯波動。</p>\n<h3>為什麼「環境感知 + 工具使用 + 護欄」改變了問題本質</h3>\n<p>當模型開始被放進 CLI、IDE、agent runtime 裡，問題的性質就變了。現在它不再只是根據一段輸入文字回答，而是可以透過工具看到工作區、讀取檔案、搜尋程式碼、執行測試、回收錯誤、再進行下一輪判斷。這時候，模型不再只是「回答器」，而是被放進一個會持續運轉的行動回圈中。</p>\n<p>這裡有三個關鍵變化。第一，<code>環境感知</code> 讓模型不必完全依賴人手動貼上下文；它可以自己讀 repo、查檔案、觀察目前狀態。第二，<code>工具使用</code> 讓模型從生成文字變成能採取行動的 agent。第三，<code>護欄</code> 讓這些行動不至於無限制擴張，避免模型因判斷失誤而誤寫檔案、亂跑指令、或做出高風險操作。</p>\n<p>這也就是為什麼現代 AI coding 的難點不再只是 prompt。真正難的是：你要給模型哪些能力？哪些能力要先 ask 再做？哪些狀態要保存？怎麼讓它知道專案規則？怎麼測試它的行為是否符合預期？這些都不是單句 prompt 能解決的，它們是 system design 問題。</p>\n<h3>Oracle 心智模型與 Reasoning Engine 心智模型的差異</h3>\n<p>如果把 LLM 想成 <code>Oracle</code>，你的工作重點就會是「問得更準」。Oracle 心智模型假設模型本身像一個幾乎完整的智慧來源，而人類的主要任務是用夠好的話術把答案問出來。這會自然導向 prompt trick、措辭技巧、以及一次性輸出的優化。</p>\n<p>但在 <code>Harness Engineering</code> 裡，更有用的心智模型是把 LLM 看成 <code>Reasoning Engine</code>。也就是說，模型是系統中的推理元件，不是整個系統本身。它負責理解目標、規劃下一步、解讀工具結果、產生行動建議；但它是否可靠，取決於外層是否替它準備了好的 runtime、好的工具界面、好的權限政策、好的記憶方式，以及好的驗證機制。</p>\n<p>這個差異很重要。當你把模型當成 Oracle 時，失敗往往被理解成「我 prompt 下得不夠好」；當你把模型當成 Reasoning Engine 時，失敗會被拆成更可工程化的問題：是不是上下文組裝錯了？是不是工具集合太少？是不是 permission mode 不合理？是不是 session 沒保存導致前文遺失？是不是缺少 deterministic test 去重現 bug？後者才是可以穩定改進的工程路徑。</p>\n<h3>Harness engineering 的工作邊界</h3>\n<p><code>Harness Engineering</code> 不等於模型訓練，也不等於單純寫一個聊天 UI。它關注的是：如何把一個已存在的模型，包裝成一個可操作、可限制、可測試、可維護的工作系統。這通常包含幾個核心面向。</p>\n<p>第一是 <code>runtime</code>，也就是 turn loop 與控制流程的核心。第二是 <code>tooling</code>，包括工具 schema、registry、dispatch 與工具結果回收。第三是 <code>permissions / guardrails</code>，決定哪些工具在什麼條件下能執行。第四是 <code>session / memory</code>，讓多輪互動與中斷恢復成為可能。第五是 <code>prompt assembly / project context</code>，把系統規則、專案脈絡與工作指令組裝成模型真正看到的上下文。第六是 <code>testing / verification</code>，用 scenario 或 mock harness 去驗證整體行為。</p>\n<p>這裡還有一個常被忽略的邊界：人類的角色沒有消失，只是位置變了。<code>PHILOSOPHY.md</code> 一再強調，真正稀缺的不是打字速度，而是 direction、judgment、taste 與 system design。也就是說，Harness Engineering 並不是要把人移除，而是要把人從微操 prompt 的位置，移到設計系統、設定邊界、判斷取捨的位置。</p>\n<h3>為什麼本課程主讀 Rust 而不是 Python port</h3>\n<p>這是學習 <code>claw-code</code> 時最容易混亂的地方。根目錄 <code>README.md</code> 明確寫著「The main source tree is now Python-first」，而且 <code>src/</code> 被描述為 active Python porting workspace。只看這段，初學者很容易直覺認為本課程應該直接主讀 Python。</p>\n<p>但同一份 <code>README.md</code> 也在最前面標示：active Rust workspace lives in <code>rust/</code>，並且明確建議先從 <code>USAGE.md</code> 與 <code>rust/README.md</code> 進入。再往下看，根目錄 <code>README.md</code> 其實也承認目前 Python workspace 還不是 complete one-to-one replacement。換句話說，<code>src/</code> 比較像平行中的 porting effort，而 <code>rust/</code> 才是目前較完整、較可操作、具備 session、permission、tooling、MCP、parity harness 等系統面能力的主教學案例。</p>\n<p>因此，本教材主讀 <code>rust/</code>，不是因為 Python 不重要，而是因為我們想教的是 harness，而不是只找一個語法較親切的檔案樹。對初學者來說，這確實增加了語言門檻；但它換來的是更完整的系統視野。至於 Python，會在 Part III 變成重建 <code>mini harness</code> 的教學語言，讓你把在 Rust 系統中學到的概念轉譯成較易上手的實作。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/README.md</code></li>\n<li><code>claw-code/PHILOSOPHY.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先看 <code>README.md</code></li>\n<li>再看 <code>PHILOSOPHY.md</code></li>\n<li>最後看 <code>rust/README.md</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li>repo 不只是 code，而是 coordination system 的產物；<code>README.md</code> 與 <code>PHILOSOPHY.md</code> 都在提醒你，真正值得學的層不是單一語言重寫本身，而是後面的 agent workflow</li>\n<li>真正值得學的是 harness 與 workflow layer；也就是 runtime、tools、permissions、sessions、testing 這些把模型變成工作系統的結構</li>\n<li><code>README.md</code> 中的 Python-first 敘述指向另一條 porting effort；本教材的 study scope 仍以 <code>rust/</code> workspace 為準，因為它目前更完整地承載了 harness 能力</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>從教材設計的角度看，這一章其實在處理兩個取捨。第一個取捨，是要不要把學習重心放在 prompt 技巧。若這樣做，進入門檻看似低，學生很快就能獲得「好像變強了」的回饋；但這種能力往往不穩，也難以解釋大型 agent 工具為什麼能運作。相反地，從 harness 角度切入，前期比較抽象，卻能讓學生真正理解系統是怎麼把模型能力轉化成可操作能力。</p>\n<p>第二個取捨，是要不要一開始就選擇較容易讀的 Python。若只求語法友善，Python 確實較適合入門；但如果教材的核心任務是「看懂一個真實、完整、具備 guardrails 的 agent harness」，那麼主讀 <code>rust/</code> 會更誠實。這是本書刻意採取的教學策略：先忍受一點語言難度，換取對完整系統的正確認知；之後再用 Python 把核心概念重建成自己的版本。</p>\n<h2>Mini Harness 連結點</h2>\n<p>到了 Part III，我們不會重做整個 <code>claw-code</code>，而是會問一個更有教學價值的問題：如果你只能保留最重要的本質，要留下什麼？從本章角度看，答案已經開始浮現了。<code>mini harness</code> 至少要有能執行回圈的 runtime、能採取行動的工具、能限制行動的 permissions、能延續脈絡的 session，以及能驗證行為的基本測試。這五者正是 Harness Engineering 與單純 prompt 工作流的分水嶺。</p>\n<h2>本章小結</h2>\n<p><code>Prompt Engineering</code> 著重於如何讓模型在一次互動中回答得更好；<code>Harness Engineering</code> 則著重於如何把模型包進一個可觀測、可操作、可限制、可測試的系統。當模型從 Oracle 變成 Reasoning Engine，工程的重點就不再只是說話技巧，而是 runtime、tools、permissions、session、testing 與整體工作流設計。理解這個轉向，是讀懂 <code>claw-code</code> 與後續自己做出 <code>mini harness</code> 的起點。</p>\n<h2>章末練習</h2>\n<ol>\n<li>用自己的話定義 harness engineering。</li>\n<li>說明 prompt engineering 與 harness engineering 的差異。</li>\n<li>列出三個你認為不能只交給模型自律處理的問題。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>如果一個 AI coding 工具完全不提供 permission layer，你會信任它替你直接操作真實專案嗎？為什麼？</li>\n<li>在你過去使用聊天式 AI 的經驗裡，有哪些挫折其實不是模型「不聰明」，而是工作流本身設計得不夠好？</li>\n<li>如果今天讓你做一個最小 agent 工具，你會優先投資在 prompt wording、tooling、還是 testing？你的理由是什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>讀完這一章後，下一步不是立刻鑽進某個函式，而是先建立系統地圖。第 2 章會把 model、runtime、tools、permissions、session、config、testing 這些元件放進同一張架構圖裡，讓你知道一個 agent harness 到底由哪些部分組成，以及為什麼它們不能被混為一談。</p>", "ch02": "<h2>章節導言</h2>\n<p>理解了「為什麼要從 prompt 走向 harness」之後，下一個問題就是：一個 agent harness 到底由哪些部分構成？很多初學者會把 agent system 想成「模型加上一些工具」，但這樣的理解太扁平了。真正能讓系統穩定工作的，不只是模型本身，也不只是把幾個 function 暴露給模型，而是這些元件之間如何形成分工、邊界與控制關係。</p>\n<p>這一章的目標，是替你建立一張高階架構圖。你要能看出 model、runtime、tools、permissions、session、config、testing 各自扮演什麼角色，也要能說明它們為什麼不能互相取代。當你之後進入 <code>claw-code</code> 的各章拆解時，這張圖會成為你的導航地圖；當你在 Part III 真的動手做 <code>mini harness</code> 時，這張圖則會幫你判斷哪些元件一定要保留，哪些能力可以先省略。</p>\n<p>也可以說，這一章在做一件很重要的事：把「一個會回話的模型」和「一個可運作的 agent system」清楚分開。只有把這個差異講清楚，後面你看到 <code>ConversationRuntime</code>、<code>ToolSpec</code>、<code>PermissionPolicy</code>、<code>Session</code>、<code>ConfigLoader</code> 等名詞時，才不會把它們誤以為只是一些分散的小模組。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能畫出 agent system 的高階架構圖</li>\n<li>能說明 model、runtime、tools、permissions、session、config、testing 的關係</li>\n<li>能指出哪些元件是 <code>mini harness</code> 必須保留的核心</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>Model 不是整個系統</h3>\n<p>在 agent harness 裡，model 很重要，但它不是整個系統。模型擅長的是推理、語言生成、從上下文中決定下一步；但它本身不保存你的專案規則、不管理工具清單、不決定哪些工具可用、不負責 session persistence，也不替你保證輸出一定安全。把模型想成「大腦」或許有幫助，但大腦若沒有感官、記憶、手腳與邊界控制，也無法穩定完成工作。</p>\n<p>這也是為什麼只談 model choice 永遠不夠。你可以換更強的模型，但若 runtime 沒有把上下文組好、工具回圈沒有設計好、permission layer 過鬆或過緊、session 無法恢復、測試又不足，系統仍然會不穩。模型能力會影響天花板，但系統工程決定地板。</p>\n<p>從教學角度看，這個觀念非常重要。因為本書不是教你如何挑一個最強模型，而是教你如何讓「任何具有一定推理能力的模型」能在一個可控環境裡工作。這正是 harness engineering 的核心。</p>\n<h3>Runtime 為什麼是執行核心</h3>\n<p>如果 model 不是整個系統，那誰在協調系統？答案通常是 <code>runtime</code>。Runtime 負責把使用者輸入、系統 prompt、過往訊息、工具結果、權限政策與停止條件串成一個可執行的回圈。它決定何時送 request 給模型、如何接收 streamed events、遇到 tool call 時怎麼 dispatch、完成後如何更新 session，以及什麼情況下結束這一輪。</p>\n<p>你可以把 runtime 理解成 agent system 的「流程控制器」。在 <code>claw-code</code> 的 Rust workspace 裡，<code>runtime</code> crate 並不是只含一個小 loop，而是集中承載許多與執行有關的核心能力：<code>ConversationRuntime</code> agentic loop、session persistence、permission policy、MCP client、system prompt assembly、usage tracking 等。這意味著 runtime 不是單一 API wrapper，而是把多個系統責任組裝成一個能持續運作的中心。</p>\n<p>這裡也能看出一個重要區別：<code>ApiClient</code> 不是 runtime，tool executor 也不是 runtime。它們是 runtime 協調下的子角色。模型客戶端只處理和模型服務互動的邊界；工具執行器只處理工具呼叫的邊界。Runtime 才是把這些邊界串接起來、讓整個 turn loop 成形的地方。</p>\n<h3>Tooling 與 permissions 如何互相制衡</h3>\n<p>很多人第一次看 agent 系統，最興奮的部分通常是 tools，因為它們讓模型看起來真的「會做事」了。讀檔、搜尋、寫檔、跑 bash、查網頁、呼叫子代理，這些能力使模型從產生文字變成能影響世界的 agent。但 capability 增加的同時，風險也同步增加。能做得越多，出錯時破壞的範圍也越大。</p>\n<p>所以 tooling 不能單獨存在，它必須和 <code>permissions</code> 一起看。Tool registry 決定系統有哪些手腳；permission policy 決定這些手腳在什麼條件下可以動。這兩者其實形成一種制衡關係。只有工具沒有權限控管，系統會變危險；只有權限控管沒有明確的工具界面，系統會變含糊，因為你根本不知道在控管什麼。</p>\n<p>在 <code>claw-code</code> 的 <code>tools</code> crate 裡，<code>ToolSpec</code> 把工具名稱、描述、input schema、required permission 綁在一起。這是很有代表性的設計：工具不是只有「怎麼做」，還必須帶著「這個能力需要多高的權限」一起被宣告。也因此，tooling 與 permissions 不是兩個平行主題，而是同一個能力面與治理面的兩側。</p>\n<h3>Session、prompt assembly、testing 的位置</h3>\n<p>初學者常把 session、prompt assembly、testing 當成後期附加功能，但在真實 harness 裡，它們是核心結構的一部分。<code>Session</code> 的作用，不只是保存聊天紀錄而已。它負責讓系統能 resume、能匯出 transcript、能做 compaction、能記錄先前工具結果，換句話說，它讓 agent 不是每一輪都在失憶狀態下重新開始。</p>\n<p><code>Prompt assembly</code> 也不是「把幾段字串黏起來」這麼簡單。系統 prompt、project context、專案規則、<code>CLAUDE.md</code> 記憶、allowed tools、當前 mode，這些資訊都要經過整理與注入，模型才會站在正確的位置上思考。若這一步做不好，再強的模型也會像被丟進陌生房間一樣工作。</p>\n<p><code>Testing</code> 則回答另一個更根本的問題：你怎麼知道系統真的可靠？既然 agent system 會跨越模型、工具、權限、session 與 CLI 邊界，單靠手動試幾次通常不夠。這也是為什麼 <code>claw-code</code> 會有 mock parity harness 這類 deterministic 驗證方法。對 agent harness 而言，測試不是後來補上的品質保證，而是讓系統可維護的必要條件。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li><code>rust/README.md</code></li>\n<li><code>runtime/src/lib.rs</code></li>\n<li><code>tools/src/lib.rs</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>rust/README.md</code> 的 crate responsibilities 幾乎就是一張高階 agent system 地圖；先把 <code>api</code>、<code>runtime</code>、<code>tools</code>、<code>rusty-claude-cli</code>、<code>telemetry</code> 的分工讀懂</li>\n<li><code>runtime/src/lib.rs</code> 透過大量 <code>pub use</code> 告訴你 runtime 真正涵蓋的責任範圍：不只有 conversation loop，還有 permissions、session、prompt、remote、MCP、usage、hooks 等</li>\n<li><code>tools/src/lib.rs</code> 則把工具層的核心抽象攤開來看：<code>ToolSpec</code> 說明單一工具要如何被宣告，<code>GlobalToolRegistry</code> 說明多種工具來源如何被統一管理</li>\n<li><code>runtime</code> 與 <code>tools</code> 被拆開，不是因為它們無關，而是因為一個負責流程控制，一個負責能力定義；這樣的分層有助於測試、替換與權限治理</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>真實的 agent harness 幾乎不可能只用一個檔案或一個模組就寫完。<code>claw-code</code> 的 Rust workspace 把責任拆到 <code>api</code>、<code>runtime</code>、<code>tools</code>、<code>commands</code>、<code>telemetry</code>、<code>rusty-claude-cli</code> 等 crate，這樣的好處是邊界清楚、可獨立測試、也有利於團隊分工；代價則是初學者第一次閱讀時很容易迷路，因為同一個使用者行為往往會跨越多個 crate。</p>\n<p>因此，教材在介紹這些元件時，不能直接照 repo 目錄逐一念過去，而是要先回到系統層次：哪些是推理邊界，哪些是流程邊界，哪些是能力邊界，哪些是治理邊界。這也是本章刻意先畫高階地圖，再讓你去看 <code>claw-code</code> 的原因。你需要先知道自己在找什麼，才不會把 crate 數量誤以為系統複雜度的全部來源。</p>\n<p>另一個取捨則和 <code>mini harness</code> 有關。真實系統為了可用性與規模化，會加入 OAuth、telemetry、MCP、sub-agent orchestration、hooks、slash commands、config hierarchy 等能力；但若把這些全部帶進教學版實作，學生很可能還沒學會核心 loop，就先淹沒在周邊功能裡。因此後續重建時，我們會保留結構本質，刻意砍掉規模化附屬能力。</p>\n<h2>Mini Harness 連結點</h2>\n<p>如果你要自己做一個 <code>mini harness</code>，本章就是你的元件清單。最少要保留的核心包括：模型邊界、runtime loop、tool dispatcher、permission policy、session persistence，以及能覆蓋基本行為的測試。你可以不先做 OAuth、不先做完整 config hierarchy、不先做 MCP，也不先做 parity harness 的全套場景，但你不能把 runtime 和 model 混成一團，也不能把 tooling 和 permission 當成兩個互不相干的小功能。</p>\n<p>更實際地說，Part III 會把這些元件縮成較少的 Python 檔案，例如 <code>runtime.py</code>、<code>tools.py</code>、<code>permissions.py</code>。這不是在否定真實系統的分層，而是在教學上做有意識的壓縮。你要學到的不是「Rust repo 怎麼分 crate」，而是「一個 agent system 不管用什麼語言寫，都逃不掉哪些核心責任」。</p>\n<h2>本章小結</h2>\n<p>一個可運作的 agent harness，至少包含 model、runtime、tools、permissions、session、prompt assembly、config 與 testing 等核心元件。模型提供推理能力，runtime 負責協調流程，tools 提供行動能力，permissions 管治理邊界，session 與 prompt assembly 管脈絡延續，而 testing 負責驗證整體行為。理解這張高階地圖之後，你才真正準備好進入後續章節，把 <code>claw-code</code> 拆成可理解的系統，而不是一堆分散的檔名。</p>\n<h2>章末練習</h2>\n<ol>\n<li>畫出一張 agent system 基本構成圖。</li>\n<li>解釋為什麼 runtime 不等於 model client。</li>\n<li>指出 <code>mini harness</code> 最少必須保留的五個元件。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你過去使用 AI coding 工具時，最常把哪個系統責任誤以為是模型本身在完成？</li>\n<li>如果把 permissions 完全拿掉，tooling 會變成什麼？如果把 tooling 拿掉，runtime 又會剩下什麼？</li>\n<li>你認為在教學版 <code>mini harness</code> 裡，哪個能力最不應該過早加入？為什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>接下來的第 3 章會把本章的元件地圖進一步提煉成設計原則，討論一個好的 harness 應該如何處理環境感知、工具編排、guardrails、session state 與可測試性。也就是說，我們會從「它有哪些部分」進一步走到「它應該怎麼被設計」。</p>", "ch03": "<h2>章節導言</h2>\n<p>知道 agent system 有哪些元件，和知道一個好的 harness 應該怎麼設計，仍然是兩回事。前一章回答的是「它由什麼組成」；這一章要回答的則是「它應該遵守哪些原則」。如果沒有這一層原則意識，你很容易把一個能動的 demo 誤認成一個可長期維護的 system。它可能暫時能跑，但一遇到權限邊界、長對話、上下文混亂、工具失敗或測試需求，就會迅速失控。</p>\n<p>本章會把後續整本書不斷重複出現的五個設計原則先拉到前台：<code>環境感知</code>、<code>工具編排</code>、<code>Guardrails</code>、<code>Session state</code>、以及 <code>可觀測性與可測試性</code>。這五者其實不是附加功能，而是把模型轉變成可工作的 agent harness 所需要的基本條件。少掉其中任何一個，系統都可能還能「看起來能用」，但很難穩定、可控、可擴充。</p>\n<p>你也可以把這一章視為一個判準工具。之後不管是在讀 <code>claw-code</code>，還是在設計自己的 <code>mini harness</code>，都可以反過來問：這個設計是否處理了環境感知？工具是否被清楚編排？權限邊界是否明確？session 是否能維持狀態？系統是否能被觀測與驗證？如果答案模糊，通常就表示這還不是一個成熟的 harness。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明一個好的 harness 至少應具備哪些核心設計原則</li>\n<li>能用 <code>claw-code</code> 的實作對照這些原則如何落地</li>\n<li>能判斷哪些原則在 <code>mini harness</code> 中必須保留、哪些可以先縮減</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>環境感知</h3>\n<p>一個沒有環境感知的模型，只能被動等待人類餵資料。這種系統即使加上了再多 prompt 技巧，本質上仍然是聊天式輔助，而不是工作型 agent。好的 harness 會替模型提供可讀取的工作環境：目前在哪個 workspace、有哪些檔案、有哪些 project rules、是否存在 session history、系統 prompt 應該注入哪些上下文。<code>claw-code</code> 的 <code>runtime</code> crate 一開頭就把 session persistence、permission evaluation、prompt assembly 放在核心責任說明中，這其實就是在告訴你：環境不是背景，而是 runtime 本身的一部分。</p>\n<p>環境感知並不代表把所有東西都塞給模型。真正重要的是有選擇地暴露環境。太少，模型像瞎子；太多，模型會被噪音淹沒、成本上升，甚至混淆目前任務。好的 harness 不只是讓模型「看得到」，還要決定它「該看到什麼」。</p>\n<h3>工具編排</h3>\n<p>模型要能工作，必須有手腳；但有手腳不代表會工作。工具設計的重點，不只是列出一串可呼叫能力，而是要把工具納入穩定的控制流。工具需要有明確的 schema、清楚的名稱、可預期的輸入輸出格式，以及一致的 dispatch 路徑。這樣 runtime 才能判斷何時呼叫工具、怎麼把結果送回模型、怎麼處理錯誤與停止條件。</p>\n<p>因此，好的 harness 不是「工具越多越好」，而是「工具界面越清楚越好」。當工具被編排成穩定的 capability layer，模型的推理才有可靠的落點。否則就算表面上支援很多能力，整體行為也可能非常脆弱。</p>\n<h3>Guardrails</h3>\n<p>工具越強，guardrails 就越重要。這是 agent harness 和一般聊天系統最關鍵的分水嶺之一。<code>claw-code</code> 在 <code>permissions.rs</code> 裡不是只定義一個簡單的 allow / deny 開關，而是把 <code>PermissionMode</code>、<code>PermissionOutcome</code>、<code>PermissionPolicy</code>、rule matching、以及 prompt-based approval flow 一起納進來。這顯示 guardrails 不是單點機制，而是一整條治理流程。</p>\n<p>為什麼需要這麼做？因為模型的問題從來不只是「會不會犯錯」，而是「犯錯時會造成什麼後果」。讀檔錯了，可能只是理解偏差；寫檔錯了，可能直接改壞工作區；跑 shell 錯了，可能造成更大的副作用。因此 guardrails 的作用，不是阻止模型做事，而是把能力放進有邊界的制度中，讓高風險行為要嘛被拒絕，要嘛被明確批准後才執行。</p>\n<h3>Session state</h3>\n<p>沒有 session state 的 agent，只能活在當下。每一輪都重新開始，意味著先前的決策、工具結果、對話脈絡與工作目標都必須重新組裝，這不只低效，也容易產生漂移。好的 harness 會把 session 當成真正的系統狀態容器，而不只是聊天記錄。它要能支援 resume、轉存 transcript、必要時 compact，甚至在長對話中保留足夠的可追溯性。</p>\n<p>這個原則很重要，因為 agent work 常常不是一輪完成，而是跨多個回合逐步收斂。若沒有 session state，系統就很難形成穩定的工作記憶；若 session state 設計得太重，又會拖慢系統、增加維護負擔。因此好的設計永遠是在保留必要脈絡與避免上下文膨脹之間找平衡。</p>\n<h3>可觀測性與可測試性</h3>\n<p>對 agent harness 而言，能跑不等於能維護。你必須能看見系統做了什麼、花了多少 token、做過哪些工具呼叫、為什麼被 permission deny、為什麼在某個 scenario 失敗。這就是可觀測性的價值。<code>runtime</code> crate 會重新匯出 <code>SessionTracer</code>、<code>HookRunner</code>、usage tracking 等能力，表示系統作者不是把執行視為黑箱，而是把觀測點做進核心層。</p>\n<p>而可測試性則是更進一步的要求。<code>mock_parity_harness.rs</code> 的存在代表 <code>claw-code</code> 不滿足於「人工跑起來看起來沒問題」，而是用 deterministic mock service 與 scenario-based assertions 來驗證行為。這背後的原則是：如果你無法穩定重現 agent 行為，就很難真正改進 agent 系統。對一個好的 harness 來說，測試不是善後工作，而是架構設計的一部分。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n<li><code>claw-code/rust/crates/rusty-claude-cli/tests/mock_parity_harness.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先看 <code>runtime/src/lib.rs</code> 頂端的 crate 說明與 <code>pub use</code> 範圍</li>\n<li>再看 <code>permissions.rs</code> 中的 <code>PermissionMode</code>、<code>PermissionOutcome</code>、<code>PermissionPolicy</code></li>\n<li>最後看 <code>mock_parity_harness.rs</code> 的 scenario 名稱與 assertion 函式</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>runtime</code> crate 不只負責 conversation loop，也同時持有 prompt、permissions、session、remote、usage 等關鍵責任，這說明環境感知與狀態管理是 runtime 設計的一部分</li>\n<li><code>permissions.rs</code> 把 allow / deny / ask 做成可組合的政策層，反映 guardrails 是制度設計，而不是零散 if/else</li>\n<li><code>mock_parity_harness.rs</code> 的 <code>streaming_text</code>、<code>read_file_roundtrip</code>、<code>write_file_denied</code>、<code>bash_permission_prompt_approved</code> 等 scenario，展示了系統如何把可測試性內建進 harness</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>這五個原則之所以難，不是因為它們概念複雜，而是因為它們彼此拉扯。環境感知越強，可能越耗 token、越容易引入噪音；工具越多，能力越強，但治理也越困難；guardrails 越嚴，安全性越高，但互動摩擦也可能增加；session state 越完整，resume 越方便，但上下文負擔也更重；觀測點與測試越多，可靠性越高，但實作成本也更大。</p>\n<p>所以好的 harness 設計，不是把每一項原則都拉到最大，而是判斷在當前目標下要做到哪個程度。<code>claw-code</code> 作為真實系統，傾向把這些原則做得較完整；本書後面的 <code>mini harness</code>，則會保留原則本身，但刻意縮小實作規模。這種「保留本質、壓縮規模」的能力，正是學習 harness engineering 的關鍵。</p>\n<h2>Mini Harness 連結點</h2>\n<p>到了 Part III，我們會用 Python 重做一個教學版系統，而這五個原則會變成實作的最低檢核表。<code>mini harness</code> 也需要基本的 project context、需要明確而少量的工具、需要簡化版 permission policy、需要 JSON 或 JSONL 形式的 session state，還需要幾個可重現的測試案例。也就是說，教學版可以更小，但不能失去這些原則；否則做出來的就只是包了幾個 function 的聊天程式，而不是 harness。</p>\n<h2>本章小結</h2>\n<p>好的 harness 不只是讓模型能回答，而是讓模型能在可理解的環境裡工作、透過清楚的工具採取行動、在 guardrails 中受控、依靠 session 維持狀態，並且整個過程能被觀測與測試。這五個原則共同決定了一個 agent system 是不是只是「看起來很厲害」，還是真正能長期維護與持續擴充。</p>\n<h2>章末練習</h2>\n<ol>\n<li>比較「環境感知」與「人工貼上下文」兩種工作方式的差異。</li>\n<li>為一個只有 <code>read</code>、<code>write</code>、<code>bash</code> 三個工具的 agent system 設計最小 guardrail 策略。</li>\n<li>解釋為什麼「可測試性」應該被視為 harness 設計原則，而不是開發後期才補的工作。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你覺得在真實工作情境中，哪一個原則最容易被初學者忽略？為什麼？</li>\n<li>如果只能在第一版系統裡保留三個原則，你會選哪三個？你願意承擔另外兩個被削弱後的什麼代價？</li>\n<li>你是否曾經用過「看起來很聰明，但其實很難信任」的 AI 工具？現在回頭看，它缺的是哪個原則？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>下一章我們要從原則走向方法，正式討論：當你面對一個像 <code>claw-code</code> 這樣的真實大型 repo，應該怎麼讀才不會迷路。換句話說，第 4 章要教你的不是某個 API，而是閱讀 agent harness 的策略本身。</p>", "ch04": "<h2>章節導言</h2>\n<p>很多人第一次打開大型 agent repo，第一個反應是直接從某個看起來最核心的原始碼檔案開始往下讀。結果常常是十五分鐘後就迷路：型別很多、模組很多、crate 很多、功能交錯得很快，越讀越不知道自己到底在找什麼。這不是你不夠聰明，而是因為大型 harness 本來就不適合用「從第一行看到最後一行」的方式閱讀。</p>\n<p>閱讀真實 harness，比閱讀一般教學專案更像在做系統考古。你要先找到入口，再辨識核心 loop，再看能力邊界，最後才進入實作細節。若順序反了，就很容易把大量局部細節誤認成全貌。也正因如此，本章要教你的不是某個單一檔案，而是一套閱讀策略。這套策略會陪你讀完整個 <code>claw-code</code>，也會影響你未來看任何 agent framework 的方式。</p>\n<p>對本書而言，這一章尤其重要，因為 <code>claw-code</code> 有一個容易造成混淆的特徵：根目錄 <code>README.md</code> 同時談 Python-first porting workspace 與 Rust workspace。若你沒有先建立閱讀順序與範圍界線，很容易一開始就卡在「到底該先看哪裡」。所以這一章的目標很實際：讓你知道如何不迷路，並且知道何時應該停下來回到高階地圖，而不是被局部細節拖走。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能建立閱讀大型 agent harness 的基本路線圖</li>\n<li>能先找入口與邊界，再逐步深入核心 loop 與細部模組</li>\n<li>能避免把大型 repo 的局部細節誤當成整體設計</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>從 README 與 usage 進入</h3>\n<p>閱讀真實 harness 的第一步，不是打開最深的原始碼，而是讀作者怎麼描述系統。<code>README.md</code> 與 <code>USAGE.md</code> 通常提供三種非常重要的資訊：系統定位、主要工作入口、以及目前實作成熟度。以 <code>claw-code</code> 為例，根目錄 <code>README.md</code> 一方面說 active Rust workspace lives in <code>rust/</code>，另一方面又說 main source tree is now Python-first。這種資訊如果不先消化，後面所有 code reading 都可能建立在錯誤假設上。</p>\n<p><code>USAGE.md</code> 的價值則在於它把系統當成一個可操作工具來介紹。你會看到 interactive REPL、one-shot prompt、permission mode、allowed tools、session resume、config resolution、mock parity harness 等用法。這些不是只有「怎麼用」的資訊，它們同時也是「系統有哪些核心功能」的證據。對初學者而言，usage guide 往往比原始碼更適合作為系統地圖的第一張草圖。</p>\n<h3>先找入口，再找核心 loop</h3>\n<p>當你從 README 與 usage 建立初步地圖之後，下一步不是隨便挑一個模組深入，而是先找「從哪裡進來」。對 CLI harness 而言，入口通常是二進位檔或主命令程式，例如 <code>rusty-claude-cli</code> 這一層。入口層會告訴你有哪些 subcommands、哪些模式是 one-shot、哪些模式是 REPL、哪些流程需要 <code>--resume</code> 或特定 flag。這些都是系統 surface。</p>\n<p>確認入口後，才去找核心 loop。對 <code>claw-code</code> 來說，這個 loop 的代表是 <code>ConversationRuntime</code> 所在的 runtime 層。你不必一開始就理解所有細節，但你要知道：真正把使用者輸入、模型回應、工具呼叫、權限檢查、session 更新串起來的，是這個層，而不是 CLI 表面本身。這樣你才不會把指令介面誤當成系統核心。</p>\n<h3>先看邊界，再讀實作細節</h3>\n<p>大型 harness 最難讀的地方之一，是很多能力同時存在：API client、streaming、tools、permissions、session、prompt assembly、config、remote、MCP、telemetry。若你直接埋進某個函式，通常會在還沒搞清楚邊界前，就看到一大堆跨模組呼叫。比較好的方式，是先畫邊界。</p>\n<p>所謂邊界，就是先問每個層負責什麼、不負責什麼。例如：CLI 層負責使用者入口與顯示；runtime 層負責 agent loop 與狀態協調；tools 層負責能力宣告與執行；permissions 層負責決定這些能力何時能動；session 層負責持久化與恢復。當你先用責任分工來看 repo，再回頭看函式與型別，就比較不會陷入「每個名稱都看得懂，但還是不知道整體在幹嘛」的困境。</p>\n<h3>如何避免迷失在大型 repo</h3>\n<p>避免迷失的關鍵，不是一次讀更多，而是一次只讀對的東西。實務上可以採用三個策略。第一，<code>分層閱讀</code>：先文件、再入口、再核心 loop、再相鄰邊界、最後才是局部實作。第二，<code>帶問題閱讀</code>：每次進檔案前先問自己要回答什麼問題，例如「runtime 和 tools 怎麼分工？」、「permission mode 在哪裡決定？」。第三，<code>建立自己的對照筆記</code>：把檔案、責任、核心型別、與本書章節對應起來。</p>\n<p>還有一個常見誤區值得提醒：不要急著把每個檔案都讀完。大型 harness 往往不是靠「通讀」理解，而是靠「反覆定向抽讀」理解。你先建立粗地圖，遇到某章主題再回來抽讀相關檔案，這樣反而更接近工程上真正有效的閱讀方式。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/README.md</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>claw-code/README.md</code>，確認 Rust / Python 兩條路線的關係</li>\n<li>再讀 <code>claw-code/USAGE.md</code>，把 CLI 功能面與操作面建立起來</li>\n<li>接著讀 <code>claw-code/rust/README.md</code>，理解 crate responsibilities</li>\n<li>最後回到 <code>runtime/src/lib.rs</code>，確認核心責任如何在 runtime 層收束</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>README.md</code> 要先幫你釐清「教材主讀 Rust，但 repo 又有 Python port」這個範圍問題</li>\n<li><code>USAGE.md</code> 讓你先從使用者角度看到 REPL、one-shot、permission modes、session resume、config hierarchy、parity harness 等能力</li>\n<li><code>rust/README.md</code> 的 crate responsibilities 是理解整體系統分工的捷徑</li>\n<li><code>runtime/src/lib.rs</code> 頂端說明「This crate owns session persistence, permission evaluation, prompt assembly...」，可作為核心 loop 周邊責任的濃縮摘要</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>閱讀大型 harness 有一個核心取捨：你要先求全貌，還是先求細節？如果一開始就鑽細節，你很快會得到局部理解，但常常失去方向；如果只看文件與表層，又可能產生過度簡化的印象。比較好的做法其實是往返式閱讀：先靠 README / usage / crate responsibilities 拿到系統地圖，再帶著具體問題回到原始碼找證據。</p>\n<p>這種方法的代價是速度看起來比較慢，因為你會重讀同一份文件、反覆回到同一個檔案。但它的好處是理解比較穩，而且更接近真實工程工作。因為在大型系統裡，真正稀缺的不是「把檔案讀完」，而是「知道自己為什麼在讀這個檔案，以及讀完後能回答什麼設計問題」。</p>\n<h2>Mini Harness 連結點</h2>\n<p>這一章雖然看起來像是在教你「怎麼讀別人的 repo」，其實也在替 Part III 做準備。因為當你開始做 <code>mini harness</code> 時，也必須用同樣的方法對待自己的系統：先定義入口、再定義核心 loop、再界定工具與權限邊界、最後才補細節。會讀真實 harness 的人，通常也更會設計自己的 harness，因為他知道哪一層應該先被釐清，哪一層不該太早展開。</p>\n<h2>本章小結</h2>\n<p>閱讀真實 agent harness 的正確順序，通常是先讀 README / usage 釐清定位與功能面，再找 CLI 入口與核心 loop，接著以邊界分工理解各層責任，最後才進入局部實作。對 <code>claw-code</code> 這種同時存在 Rust workspace 與 Python porting 脈絡的 repo 而言，閱讀策略尤其重要。它能避免你在大量細節中迷失，也能讓每次抽讀原始碼都更有方向。</p>\n<h2>章末練習</h2>\n<ol>\n<li>用自己的話寫出你閱讀 <code>claw-code</code> 的第一輪路線圖。</li>\n<li>解釋為什麼讀 <code>USAGE.md</code> 不是「只看操作文件」，而是理解系統功能面的重要步驟。</li>\n<li>如果一個 repo 同時有多條實作路線，你會用哪些標準決定教材應該主讀哪一條？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你過去讀大型 repo 時，最常犯的是「太早鑽細節」還是「只停留在文件表面」？為什麼？</li>\n<li>如果現在要你帶另一位同學讀 <code>claw-code</code>，你會要求他先回答哪三個問題，才准他進入原始碼？</li>\n<li>你是否曾經因為沒有先釐清 system surface，而把某個模組的重要性高估或低估？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>到這裡，Part I 的基礎已經完成：你知道為什麼要學 Harness Engineering、知道 agent system 的元件地圖、知道好的 harness 應遵守哪些原則，也知道面對真實 repo 時該如何閱讀。下一章開始，我們就正式進入 Part II，從 CLI 入口把 <code>claw-code</code> 當成一個真實系統來拆解。</p>", "ch05": "<h2>章節導言</h2>\n<p>要理解一個真實 harness，最自然的入口往往不是最深的 runtime 原始碼，而是 <code>CLI</code>。原因很簡單：CLI 是人真正碰到系統的第一層，也是很多系統責任第一次顯形的地方。你會在這裡看到有哪些 subcommands、有哪些旗標、什麼情況下進 REPL、什麼情況下走 one-shot prompt、以及哪些能力其實只是查詢系統狀態而不會啟動完整 agent loop。</p>\n<p>對 <code>claw-code</code> 來說，這一層尤其重要，因為 <code>rusty-claude-cli/src/main.rs</code> 不只是單純解析參數，它同時把 mode routing、resume flow、輸出格式、permission mode、allowed tools、status/sandbox/skills/mcp/system-prompt 等 surface action 整理成一個可操作的前台。換句話說，它不是「外面包一層 command line」而已，而是整個系統如何向人類暴露自身能力的地方。</p>\n<p>本章要做的，就是從 CLI surface 反推整個系統邏輯。你會看到，真實 harness 的入口層其實已經透露很多架構訊號：哪些東西是執行核心，哪些是檢視或管理功能，哪些是 session continuation，哪些是環境快照。讀懂這一層，你後面再回頭看 runtime，就比較不會把所有功能都混成單一 agent loop。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 <code>claw-code</code> 的 CLI surface 如何映射到不同系統責任</li>\n<li>能區分 subcommands、one-shot prompt、REPL 與 resume 模式</li>\n<li>能理解 mode routing 為什麼是大型 harness 不可缺少的入口層能力</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>CLI entry</h3>\n<p><code>claw-code</code> 的 CLI 不是單一「問模型一個問題」的介面，而是一個多模式系統入口。從 <code>USAGE.md</code> 與 <code>main.rs</code> 可看出，使用者可以用 interactive REPL、<code>prompt</code> one-shot、shorthand prompt、<code>--resume</code>、<code>status</code>、<code>sandbox</code>、<code>agents</code>、<code>mcp</code>、<code>skills</code>、<code>system-prompt</code>、<code>login</code>、<code>logout</code> 等多種方式進入系統。這說明 CLI 層不只是 command parser，而是整個 harness 的 front door。</p>\n<p>從架構角度看，這一點很重要。因為一個成熟 harness 並不只有「執行任務」這一種工作。它還要能顯示狀態、檢查環境、恢復 session、輸出 system prompt、管理認證。把這些能力都放在 CLI surface，不是讓系統更雜，而是讓不同責任有清楚的人類操作入口。</p>\n<h3>subcommands</h3>\n<p><code>main.rs</code> 裡的 <code>CliAction</code> 很值得讀，因為它幾乎就是一張系統功能清單。像 <code>CliAction::Prompt</code> 會進入一次性任務執行；<code>CliAction::Status</code> 與 <code>CliAction::Sandbox</code> 則偏向觀測與快照；<code>CliAction::Agents</code>、<code>CliAction::Mcp</code>、<code>CliAction::Skills</code> 屬於能力檢視；<code>CliAction::PrintSystemPrompt</code> 則讓 prompt assembly 可被獨立檢查；<code>Login</code> / <code>Logout</code> 則屬於認證生命週期。</p>\n<p>這表示 subcommands 並不是隨便長出來的功能分頁，而是把不同系統責任切成可直接操作的視角。從教學角度看，這很有幫助，因為它提醒你：真實 harness 的使用者需求不只有「請模型做事」，還包括理解系統狀態與診斷環境。</p>\n<h3>one-shot vs REPL</h3>\n<p><code>USAGE.md</code> 很清楚區分了 interactive REPL 與 one-shot prompt。REPL 適合多輪工作，會持續保留 session；one-shot prompt 則適合腳本化、自動化或單次查詢。這種區分並不只是 UX 差異，而是系統操作模型的差異。REPL 假設你要和一個持續中的 conversation runtime 互動；one-shot 則假設你要快速完成一個單輪任務。</p>\n<p>真實 harness 為什麼要同時保留這兩種模式？因為它們服務的場景不同。REPL 更適合探索、修補、反覆修正；one-shot 更適合 automation、CI、簡短分析或 shell pipeline。若只有 REPL，腳本整合會變差；若只有 one-shot，很多 agentic workflow 會被迫重新組 session。CLI surface 把兩者都納入，等於承認 agent 工具不只有一種使用型態。</p>\n<h3>mode routing</h3>\n<p><code>mode routing</code> 是這一章真正的架構重點。從 <code>main.rs</code> 的參數解析可看到，系統會先處理像 <code>--output-format</code>、<code>--permission-mode</code>、<code>--allowedTools</code>、<code>--resume</code> 等旗標，再決定最終進入哪一條執行路徑。也就是說，CLI 層不是被動轉發，而是先把使用者意圖翻譯成較高層的執行模式。</p>\n<p>例如：有 <code>--resume</code> 時會走 <code>parse_resume_args()</code> 與 resumed command flow；有 <code>system-prompt</code> 時會走 prompt rendering；輸入 <code>status</code> 或 <code>sandbox</code> 則走 snapshot path；沒指定 subcommand 時，甚至可能直接把剩餘字串視為 prompt。這些 routing 規則讓系統 surface 看起來自然，但內部仍保持相對清楚的模式分流。</p>\n<p>這個分流若被拿掉會怎樣？系統會變成一個只會「把文字交給模型」的大入口，許多 operational functions 不是消失，就是被迫塞進互動式 session 內，結果人和系統都更難操作。對真實 harness 來說，入口分流就是可用性與可維運性的第一層設計。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/rusty-claude-cli/src/main.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>USAGE.md</code>，看使用者視角下有哪些操作模式</li>\n<li>再讀 <code>rust/README.md</code>，確認 <code>rusty-claude-cli</code> 在 workspace 裡的責任</li>\n<li>最後讀 <code>main.rs</code>，追 <code>CliAction</code>、參數解析與 mode routing</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>CLI</code> entry 如何承載 subcommands 與 operational surfaces</li>\n<li><code>prompt</code>、interactive REPL、<code>--resume</code> 如何對應不同工作模式</li>\n<li><code>permission-mode</code>、<code>allowedTools</code>、<code>output-format</code> 為何在入口層就要先決定</li>\n<li><code>system-prompt</code>、<code>status</code>、<code>sandbox</code> 這些命令如何透露 runtime 以外的系統面能力</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>CLI surface 的最大取捨，是「簡單入口」與「多責任入口」之間的平衡。若只保留單一 prompt 入口，系統會看起來很單純，但很多狀態檢查、環境診斷與 session 恢復工作都會變得笨重；若把所有能力都做成獨立命令，則入口會變厚、學習成本也會上升。<code>claw-code</code> 的做法，是接受入口層較豐富的複雜度，換取更完整的 operational surface。</p>\n<p>另一個取捨則是 CLI 是否應該過早知道太多 runtime 細節。<code>claw-code</code> 沒有讓 CLI 完全變成薄殼，因為像 mode routing、resume、system-prompt rendering 這些本來就屬於入口層責任；但它也沒有把 runtime loop 細節全塞進 <code>main.rs</code>。這種分層值得學，因為它說明「入口負責決定去哪裡，不負責成為所有業務邏輯本身」。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 不需要一開始就複製整個 CLI surface，但至少應該保留一個很小的 entry model，例如：<code>run</code>、<code>prompt</code>、<code>resume</code> 三種最基本模式。也就是說，教學版仍然要讓學生看到 <code>CLI</code> 不是單純收字串，而是系統如何決定要開新 session、恢復舊 session、或執行一次性任務的地方。完整 <code>claw-code</code> 多做的部分，是更豐富的 operational commands 與 mode routing；教學版則保留其中最能教會人的骨架。</p>\n<h2>本章小結</h2>\n<p>從 <code>CLI</code> 入口看 <code>claw-code</code>，你會發現它不是單一 prompt 工具，而是一個有 subcommands、有 one-shot / REPL 差異、有 resume flow、有狀態與環境命令的完整系統 surface。入口層的價值，不只是讓人按下開始，而是把不同的系統責任整理成可操作模式。理解這一層，後面讀 session、prompt assembly、config 時都會更有方向。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明為什麼 <code>status</code>、<code>sandbox</code>、<code>system-prompt</code> 這類命令對 harness 來說不是可有可無。</li>\n<li>比較 one-shot prompt 與 REPL 在 session 與使用情境上的差異。</li>\n<li>如果你要為 <code>mini harness</code> 設計最小 CLI surface，你會保留哪三個命令或模式？為什麼？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你過去是否把 CLI 想成只是輸入 prompt 的外殼？現在回頭看，這種理解少了哪一層系統視角？</li>\n<li>如果一個 agent 工具完全沒有 resume mode，你覺得最受影響的是哪類工作流？</li>\n<li>對教學版來說，你會先教 subcommands 還是先教 runtime？兩者順序會影響理解方式嗎？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>既然入口層已經告訴我們系統有 <code>--resume</code>、有多輪工作流，那下一章就自然要問：這些狀態到底保存在哪裡，又如何被帶回來？第 9 章會進入 <code>session</code>、<code>transcript</code>、<code>resume</code> 與 <code>compaction</code>，把 agent 的持續性講清楚。</p>", "ch06": "<h2>章節導言</h2>\n<p>如果說前面的章節是在替你建立地圖，那麼從這一章開始，我們就正式走進 <code>claw-code</code> 的核心機房。在一個 agent harness 裡，最關鍵的問題不是「模型能不能回答」，而是「整個系統如何把一次任務變成一個可持續執行、可呼叫工具、可更新狀態、可安全停止的 turn loop」。這個問題的答案，就集中在 <code>ConversationRuntime</code> 周圍。</p>\n<p><code>claw-code</code> 的 runtime 設計很有代表性，因為它沒有把 conversation 視為單純的 chat transcript，而是把它當成一個持續運作的執行回圈。這個回圈需要組 request、接收 event stream、判斷是否有 tool use、做 permission 檢查、執行工具、把結果寫回 session、追蹤 usage、必要時 compact session，最後再決定下一輪要不要繼續。換句話說，conversation 在這裡不是對話表面，而是整個 agent system 的運轉形式。</p>\n<p>本章的目標，是讓你真正讀懂這個 loop 的最小骨架。你不需要在第一次閱讀就記住所有細節，但你一定要看清楚幾個核心契約：<code>ApiRequest</code> 是什麼、<code>AssistantEvent</code> 為什麼是事件流、<code>ApiClient</code> 與 <code>ToolExecutor</code> 各自負責哪個邊界、<code>ConversationRuntime&lt;C, T&gt;</code> 為何要做成 generic，以及 turn loop 在什麼條件下持續、停止、或失敗。當你理解這些之後，很多看似分散的 agent 行為就會突然連成一條線。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能解釋 <code>ConversationRuntime</code> 在 agent system 中扮演的角色</li>\n<li>能說明 <code>ApiRequest</code>、<code>AssistantEvent</code>、<code>ApiClient</code>、<code>ToolExecutor</code> 之間的資料流</li>\n<li>能指出 turn loop 的停止條件、迭代機制與縮減版 <code>mini harness</code> 該保留的本質</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3><code>ApiRequest</code></h3>\n<p><code>conversation.rs</code> 一開始就定義了 <code>ApiRequest</code>：</p>\n<ul>\n<li><code>system_prompt: Vec&lt;String&gt;</code></li>\n<li><code>messages: Vec&lt;ConversationMessage&gt;</code></li>\n</ul>\n<p>這個型別看起來很簡單，但它非常關鍵，因為它揭示了 runtime 對模型呼叫的基本理解：送給模型的不是「一個字串 prompt」，而是一個已經被組裝好的請求物件。這代表 system instructions 和 conversation messages 在結構上被明確分開，也代表 prompt assembly 早已不是零散字串拼接，而是 runtime 可管理的輸入邊界。</p>\n<p>從資料流角度看，<code>ApiRequest</code> 是 turn loop 每次進模型前的總封包。它把目前 system prompt 與 session 內的 messages 一起送進 <code>ApiClient</code>。如果這一層被拿掉，系統就只剩下模糊的「把某些字串送給模型」，而失去可測試、可推理的 request 邊界。</p>\n<h3><code>AssistantEvent</code></h3>\n<p><code>AssistantEvent</code> 是另一個極具代表性的設計。它不是單一「最終回答」，而是一串 streamed events，包含：</p>\n<ul>\n<li><code>TextDelta</code></li>\n<li><code>ToolUse</code></li>\n<li><code>Usage</code></li>\n<li><code>PromptCache</code></li>\n<li><code>MessageStop</code></li>\n</ul>\n<p>這意味著 runtime 不是等模型整段輸出完成後才開始理解結果，而是把模型回應視為一個事件序列。文字增量可以逐步累積、tool use 可以在中途被攔截並執行、usage 可被記錄、prompt cache telemetry 可被保存，而 <code>MessageStop</code> 則告訴 runtime 一次 assistant turn 已完成。</p>\n<p>這種事件流設計的最大價值，在於它把模型回應從「被動顯示文字」變成「可被系統消化的控制訊號」。如果沒有 <code>AssistantEvent</code> 這種抽象，tool use 幾乎只能靠後處理字串解析，usage tracking 也很難穩定整合，整個 runtime 會退化成較脆弱的一次性 chat wrapper。</p>\n<h3><code>ApiClient</code> 與 <code>ToolExecutor</code></h3>\n<p><code>ApiClient</code> 與 <code>ToolExecutor</code> 是 runtime 對外界兩個最重要的抽象介面。前者只承諾一件事：<code>stream(request)</code>，也就是拿到 <code>ApiRequest</code> 後，回傳一串 <code>AssistantEvent</code>。後者也只承諾一件事：<code>execute(tool_name, input)</code>，也就是根據工具名稱與輸入執行本地能力，回傳結果或錯誤。</p>\n<p>這種設計非常乾淨。它把「和模型供應者互動」與「在本地執行工具」兩件事分開，也讓 <code>ConversationRuntime&lt;C, T&gt;</code> 可以只依賴抽象，不依賴某個特定 API 實作或某個固定工具集合。也因此，runtime 真正扮演的是協調者，而不是把所有外部責任硬塞進自己內部。</p>\n<p>從教學角度看，這兩個 trait 也是 <code>mini harness</code> 最值得保留的部分。因為它們迫使你清楚定義：模型邊界在哪裡，工具邊界又在哪裡。只要這兩層分清楚，之後就算更換模型供應者、調整工具集合、加入 mock client 做測試，也不會把整個系統拆壞。</p>\n<h3><code>ConversationRuntime</code></h3>\n<p><code>ConversationRuntime&lt;C, T&gt;</code> 本身就是本章主角。它的欄位很值得細看：<code>session</code>、<code>api_client</code>、<code>tool_executor</code>、<code>permission_policy</code>、<code>system_prompt</code>、<code>max_iterations</code>、<code>usage_tracker</code>、<code>hook_runner</code>、<code>auto_compaction_input_tokens_threshold</code>、<code>hook_abort_signal</code>、<code>hook_progress_reporter</code>、<code>session_tracer</code>。這個列表幾乎就是一個成熟 runtime 的責任清單。</p>\n<p>最值得注意的是兩件事。第一，它是 generic over <code>C</code> and <code>T</code>，也就是把模型流與工具執行抽象成可替換元件。第二，它不只管「跑一輪」，還同時持有 usage tracking、hooks、auto compaction、session tracing 等 scale-induced 能力。這表示 <code>ConversationRuntime</code> 不是課本上的最小 loop，而是一個真實系統裡逐漸長出周邊能力的執行核心。</p>\n<p>因此，讀 <code>ConversationRuntime</code> 時不要只盯著它的欄位多不多，而要問：哪些是本質，哪些是規模化附加能力？本質通常是 session、api client、tool executor、permission policy、system prompt、iterations；規模化能力則包括 hooks、prompt cache telemetry、session tracer、auto compaction 等。這種區分，會直接影響你後面如何設計 <code>mini harness</code>。</p>\n<h3>turn loop、iterations、stop reason</h3>\n<p>真正的精華在 turn loop。從 <code>conversation.rs</code> 的流程來看，一次 runtime turn 大致會經過以下步驟：</p>\n<ol>\n<li>增加 <code>iterations</code> 計數，先檢查是否超過 <code>max_iterations</code></li>\n<li>用 <code>system_prompt</code> 與目前 <code>session.messages()</code> 組成 <code>ApiRequest</code></li>\n<li>呼叫 <code>api_client.stream(request)</code> 取得 <code>AssistantEvent</code> 序列</li>\n<li>把事件組裝成 assistant message，並記錄 <code>usage_tracker</code></li>\n<li>從 assistant message 中抽出 <code>pending_tool_uses</code></li>\n<li>若沒有 tool use，代表這一輪可正常停止</li>\n<li>若有 tool use，逐一執行 pre-hook、permission evaluation、tool execution、post-hook，並把 <code>tool_result</code> 寫回 session</li>\n<li>回到下一次 iteration，直到沒有 pending tool use</li>\n<li>turn 結束後，視 token 門檻決定是否 <code>maybe_auto_compact()</code></li>\n</ol>\n<p>這裡最值得你掌握的是「停止條件」的性質。runtime 並不是看到 <code>MessageStop</code> 就一定整輪結束，而是要進一步看 assistant message 裡是否仍有 pending tool uses。若有，這其實只是模型一輪輸出完成，不是整個 agent turn 完成。真正的 stop reason 比較接近：「沒有新的工具呼叫，或已觸發錯誤 / iteration 上限 / policy 阻擋」。這種 distinction 很重要，因為它是 agent loop 與普通 chat completion 最大的差別之一。</p>\n<p>如果把這整個 turn loop 拿掉，<code>claw-code</code> 會發生什麼事？系統就只剩下單次 request-response 的文字互動，失去 agent 最核心的特徵：模型不能在本輪中觸發工具、觀察工具結果、再做下一輪推理。換句話說，沒有 runtime loop，就沒有真正的 agentic workflow。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/conversation.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>conversation.rs</code> 前半部的型別與 trait 定義</li>\n<li>再讀 <code>ConversationRuntime</code> 的欄位與建構函式</li>\n<li>最後讀 turn loop 內處理 <code>pending_tool_uses</code>、usage tracking、auto compaction 的流程</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li>request 組裝：<code>ApiRequest</code> 如何把 <code>system_prompt</code> 與 <code>messages</code> 包成模型輸入</li>\n<li>streamed events：<code>AssistantEvent</code> 為什麼用事件流而不是單一輸出物件</li>\n<li>tool use 事件：<code>pending_tool_uses</code> 如何驅動下一輪迭代</li>\n<li>usage tracking：<code>UsageTracker</code> 如何在每次 assistant 回應後累積 usage 與支援後續 compaction 判斷</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p><code>ConversationRuntime</code> 的設計有一個很鮮明的取捨：它把大量控制責任集中在同一個執行核心中。好處是資料流清楚，session、permission、tool execution、usage tracking 都在同一條生命週期裡被協調；壞處則是 runtime 會變成複雜度聚集點，閱讀成本也因此上升。</p>\n<p>另一個取捨是事件流 vs 單次結果。事件流設計更接近真實 agent 需求，因為它能支援 <code>TextDelta</code>、<code>ToolUse</code>、<code>Usage</code>、<code>PromptCache</code> 等多種控制訊號；但它也迫使系統必須處理更多中間狀態。若只追求最小可行版本，單次結果模型當然更容易實作；但那也會直接失去工具回圈與細緻觀測能力。這正是 <code>claw-code</code> 作為真實 harness 與教學版 <code>mini harness</code> 之間的重要差別。</p>\n<h2>Mini Harness 連結點</h2>\n<p>在 <code>mini harness</code> 裡，我們會保留 runtime 的本質，但縮小規模。也就是說，Python 版仍然應該有類似 <code>ApiClient</code> / <code>ToolExecutor</code> 的邊界、有 session + system prompt 組 request 的步驟、有最大迭代數、有 assistant 觸發 tool use 再回圈的邏輯。但我們大概不會一開始就做完整 hooks、prompt cache telemetry、session tracer、或自動 compaction。這些都屬於成熟系統的增量能力，而不是第一版教學系統的必要條件。</p>\n<h2>本章小結</h2>\n<p><code>ConversationRuntime</code> 是 <code>claw-code</code> 的 agentic heart。它透過 <code>ApiRequest</code>、<code>AssistantEvent</code>、<code>ApiClient</code>、<code>ToolExecutor</code> 等契約，把模型呼叫、工具執行、權限檢查、session 更新、usage tracking 與停止條件整合成可持續運作的 turn loop。理解這個 loop，等於真正理解了 agent harness 與一般聊天系統的分界線。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋為什麼 <code>ApiRequest</code> 不是單純的一段 prompt 字串。</li>\n<li>比較 <code>MessageStop</code> 與「整個 agent turn 結束」之間的差異。</li>\n<li>如果你要為 <code>mini harness</code> 設計最小版 <code>ConversationRuntime</code>，你會保留哪些欄位？會先刪掉哪些欄位？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你認為 runtime 中最不該和其他責任混在一起的是哪個邊界：模型、工具、還是 session？為什麼？</li>\n<li>如果一個 agent 系統完全沒有 <code>max_iterations</code>，你覺得最可能出現什麼風險？</li>\n<li>你會如何判斷某個 runtime 功能屬於「本質必要」還是「規模化附加」？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>理解了 runtime 之後，下一步自然是問：模型到底有哪些手腳可以用？第 7 章會往另一個核心層走，拆解 <code>ToolSpec</code>、<code>GlobalToolRegistry</code>、<code>normalize_allowed_tools</code>、<code>definitions()</code> 這些工具系統設計，看看 <code>claw-code</code> 如何把能力表面管理成可供模型安全使用的工具空間。</p>", "ch07": "<h2>章節導言</h2>\n<p>一個沒有工具的模型，最多只能當顧問；一個有工具的模型，才可能成為 agent。但真正困難的地方從來不是「把工具接上去」，而是「如何把工具接成一個可控、可理解、可限制的能力層」。如果工具只是零散函式的集合，模型可能勉強能呼叫幾個能力，卻很難在大型系統中穩定使用。<code>claw-code</code> 的 <code>tools</code> crate 值得學，不是因為它工具很多，而是因為它把工具表面做成一個有宣告、有治理、有過濾機制的 registry system。</p>\n<p>本章的核心問題有五個：單一工具應該如何被宣告？所有工具如何被統一管理？模型真正看到的是哪一層工具定義？使用者透過 <code>--allowedTools</code> 限制能力時，系統如何把別名與 canonical name 處理乾淨？以及 built-in、runtime、plugin tools 這三種來源為什麼需要被一起考慮？這些問題如果沒有被設計清楚，工具系統很快就會變成一堆難以治理的 capability leak。</p>\n<p>換句話說，tool system 的任務不只是讓模型「有手腳」，而是讓這雙手腳能被清楚說明、被安全開放、被合理限制，並且能在未來擴充時不把整個系統變成混亂的能力黑箱。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 <code>ToolSpec</code>、<code>GlobalToolRegistry</code> 與 <code>definitions()</code> 各自的角色</li>\n<li>能解釋 <code>allowed tools</code> 與 permission 要如何共同治理工具表面</li>\n<li>能指出哪些 tool-system 能力是 <code>mini harness</code> 必須保留、哪些可以先省略</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>tool schema</h3>\n<p><code>ToolSpec</code> 是理解整個 tool system 的第一個關鍵。它把四個東西綁在一起：</p>\n<ul>\n<li><code>name</code></li>\n<li><code>description</code></li>\n<li><code>input_schema</code></li>\n<li><code>required_permission</code></li>\n</ul>\n<p>這個設計非常重要，因為它表示工具不是只有「可做的事」，還同時帶著「怎麼被描述」與「需要什麼權限」一起被宣告。也就是說，一個工具一旦進入 registry，就不只是程式碼能力，而是成為一個可被模型理解、可被 runtime 傳遞、也可被 permissions 系統治理的正式介面。</p>\n<p>如果拿掉 schema 層，工具很快就會退化成零散本地函式：模型不知道輸入格式、系統很難統一暴露能力、權限資訊也無法穩定附著。這也是為什麼 <code>ToolSpec</code> 看似簡單，卻是整個 tool system 的語義基礎。</p>\n<h3>tool registry</h3>\n<p>單一工具的宣告只是第一步，真正重要的是所有工具如何被集中管理。<code>GlobalToolRegistry</code> 的欄位很直接：<code>plugin_tools</code>、<code>runtime_tools</code>、<code>enforcer</code>。這表示它不是只收 built-in tools，而是預期系統中的工具可能來自多個來源，而且這些來源最終都要被統一管理。</p>\n<p>從實作可看出，registry 並不是單純的容器。<code>with_plugin_tools()</code> 會檢查 plugin tool 名稱是否和 built-in 衝突，也會擋下重複名稱；<code>with_runtime_tools()</code> 則會再和 built-in 與 plugin 工具一起做名稱衝突檢查。這說明 registry 的責任不只是「裝東西」，還包括維持能力空間的整體一致性。若沒有這層檢查，大型系統很快就會出現名稱碰撞、描述混亂、權限不一致等問題。</p>\n<h3>tool dispatch</h3>\n<p>很多初學者會把 registry 和 dispatch 混在一起，但兩者其實不同。registry 的工作是維護「有哪些工具」以及「這些工具的定義是什麼」；dispatch 的工作則是當模型真的發出 tool use 時，系統如何把那個名稱導向正確執行器並回收結果。也就是說，registry 比較像能力目錄，dispatch 比較像行動路由。</p>\n<p>在 <code>claw-code</code> 的整體架構中，這兩層是分開的。<code>tools</code> crate 管的是宣告與整理，而實際執行是在 runtime / tool executor 的流程裡發生。這種分工很值得學，因為它讓「模型看到什麼工具」與「系統怎麼執行工具」可以被分別推理與測試。如果把兩者混成一團，你很難單獨驗證工具表面是否合理，也很難清楚限制哪些工具能被暴露給模型。</p>\n<h3>allowed tools</h3>\n<p><code>normalize_allowed_tools()</code> 是一個很容易被忽略、但其實很實用的函式。它處理的問題是：當使用者透過 <code>--allowedTools</code> 輸入工具限制時，系統如何把這些值正規化成 canonical name 集合。這裡不只支援直接輸入正式工具名，也支援一些常用 alias，例如：</p>\n<ul>\n<li><code>read</code> -&gt; <code>read_file</code></li>\n<li><code>write</code> -&gt; <code>write_file</code></li>\n<li><code>edit</code> -&gt; <code>edit_file</code></li>\n<li><code>glob</code> -&gt; <code>glob_search</code></li>\n<li><code>grep</code> -&gt; <code>grep_search</code></li>\n</ul>\n<p>這個函式的重要性在於，它把 CLI surface 的使用便利性與內部工具命名一致性橋接起來。使用者可以用較自然的縮寫，但系統內部仍維持穩定 canonical name。若沒有這層正規化，<code>--allowedTools</code> 會變得脆弱且難用；如果把 alias 邏輯散落在各處，則整個工具治理也會變得難維護。</p>\n<h3>built-in tools、runtime tools、plugin tools</h3>\n<p><code>GlobalToolRegistry</code> 最值得學的一點，是它沒有假設所有工具都來自同一種來源。內建工具來自 <code>mvp_tool_specs()</code>；runtime tools 可在執行期被加入；plugin tools 則代表外部擴充來源。接著，<code>definitions()</code> 會把這三種來源統一轉成模型可見的 <code>ToolDefinition</code> 列表。</p>\n<p>這裡其實有一條很漂亮的資料流：使用者先透過 config 或 CLI 決定可見工具範圍，registry 透過 <code>normalize_allowed_tools()</code> 取得 canonical allowed set，再用 <code>definitions()</code> 只把允許暴露的 built-in、runtime、plugin 工具轉成最終提供給模型的工具表面。換句話說，模型看到的不是整個本地宇宙，而是經過 registry 篩選後的能力切片。</p>\n<p>這也是本章必須強調的「如果拿掉它會壞什麼」分析之一。若拿掉 <code>definitions()</code> 這種統一輸出層，工具來源再多也只是零散集合，模型端很難拿到一致的工具清單；若拿掉 <code>required_permission</code> 與 <code>permission_specs()</code> 的關聯，權限系統就無法穩定知道每個工具需要哪種 permission mode。tool system 因此不是一個獨立小模組，而是整個 governance chain 的一環。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>ToolSpec</code>、<code>GlobalToolRegistry</code>、<code>RuntimeToolDefinition</code></li>\n<li>再讀 <code>normalize_allowed_tools()</code></li>\n<li>最後讀 <code>definitions()</code> 與 <code>permission_specs()</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>ToolSpec</code>：單一工具如何把 schema 與 required permission 綁在一起</li>\n<li><code>GlobalToolRegistry</code>：如何合併 built-in、runtime、plugin 三種工具來源</li>\n<li><code>normalize_allowed_tools</code>：如何把 alias 與 canonical name 統一</li>\n<li><code>definitions()</code> method：如何把 registry 中可見的工具轉成模型真正可用的 <code>ToolDefinition</code></li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>tool system 最根本的取捨，是能力廣度與治理清晰度之間的平衡。工具越多，模型能做的事越多；但工具越多，也越需要統一 naming、schema、permission mapping、allowed-tools filtering、以及衝突檢查。<code>claw-code</code> 選擇把這些治理工作做得相對完整，因此工具層不是一份簡單清單，而是一個正式 registry。</p>\n<p>這種設計的代價，是閱讀上會多一層抽象。初學者可能會想：「為什麼不直接寫一個 map，tool name 對 function 就好了？」答案是那樣做雖然快，但很難支援工具來源擴充、很難把 permission 綁進宣告、也很難穩定控制模型可見表面。當系統規模一大，這些省略掉的抽象反而會變成技術債。因此 <code>claw-code</code> 的做法雖然較重，卻更接近真實 harness 面對的問題。</p>\n<h2>Mini Harness 連結點</h2>\n<p>在 <code>mini harness</code> 裡，我們會保留 tool system 的骨架，但把它縮小。教學版依然應該有明確的 tool spec，至少包含名稱、描述、輸入格式與權限需求；也應該有一個很小的 registry，能決定哪些工具暴露給模型。但我們大概不會一開始就做 plugin tools、複雜搜尋、完整 alias 集合或大量 runtime tool definitions。對 <code>mini harness</code> 來說，真正不能拿掉的是「能力宣告與治理綁在一起」這個原則，而不是所有成熟系統才需要的周邊功能。</p>\n<h2>本章小結</h2>\n<p><code>claw-code</code> 的 tool system 告訴我們：讓模型有手腳，不是把幾個 function 接上去就算完成。真正的重點是把工具做成有 schema、有 permission、有 registry、有 filtering、有統一輸出層的能力系統。<code>ToolSpec</code>、<code>GlobalToolRegistry</code>、<code>normalize_allowed_tools()</code>、<code>definitions()</code> 正是這條能力鏈上的幾個關鍵節點。理解它們，你才會知道工具層為何既是 capability layer，也是 governance layer。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明為什麼 <code>ToolSpec</code> 必須同時包含 <code>input_schema</code> 與 <code>required_permission</code>。</li>\n<li>解釋 <code>normalize_allowed_tools()</code> 在 CLI 使用體驗與內部一致性之間扮演的角色。</li>\n<li>如果要為 <code>mini harness</code> 設計最小版 tool registry，你會保留哪些欄位與函式？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你覺得在真實 agent 系統中，工具數量增加時最先壞掉的會是 schema、命名、還是 permission 治理？為什麼？</li>\n<li>如果只做 dispatch、不做 registry，短期看起來省事；那長期會在哪些地方付出代價？</li>\n<li>你是否能接受模型看到的工具清單和系統實際存在的工具清單不同？在什麼條件下這是合理的？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>有了 runtime 的 heart 與 tools 的 hands，下一個問題自然是：這雙手到底能動到什麼程度，誰來說了算？接下來的第 8 章會進入 <code>Permissions and Guardrails</code>，把 capability 與 governance 如何真正扣合起來講清楚。</p>", "ch08": "<h2>章節導言</h2>\n<p>一旦模型有了工具，問題就不再只是「它能做什麼」，而是「它可以被允許做什麼」。這是 agent harness 與一般聊天系統最鮮明的分界點之一。工具讓模型有能力改變世界；permissions 則決定這個改變世界的能力是否被限制在合理邊界內。沒有這一層，agent 很快就會從「很方便」變成「很危險」。</p>\n<p><code>claw-code</code> 對 guardrails 的處理值得細讀，因為它不是只做一個粗略的 yes/no 開關，而是把 permission mode、規則匹配、hook override、interactive approval、file-write boundary、bash 檢查等機制拆開來處理。這透露出一個很重要的設計觀念：安全不是事後補上的外掛，而是 runtime 內部正式承認並治理的一條控制流程。</p>\n<p>本章會先把 <code>PermissionMode</code> 的分層說清楚，再討論 allow / deny / ask 三種規則如何互動，接著說明 <code>PermissionPolicy</code> 與 <code>PermissionEnforcer</code> 為什麼是兩種不同責任。最後，我們要回到最根本的問題：為什麼不能只靠模型自律？如果你能回答這個問題，你就真正理解了 guardrails 的必要性。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能比較不同 <code>permission mode</code> 的意義與風險差異</li>\n<li>能說明 allow / deny / ask 與 policy / enforcement 的分工</li>\n<li>能為 <code>mini harness</code> 設計一套最小但合理的 permission model</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>permission mode</h3>\n<p><code>permissions.rs</code> 一開始就定義了 <code>PermissionMode</code>：</p>\n<ul>\n<li><code>ReadOnly</code></li>\n<li><code>WorkspaceWrite</code></li>\n<li><code>DangerFullAccess</code></li>\n<li><code>Prompt</code></li>\n<li><code>Allow</code></li>\n</ul>\n<p>從使用者操作角度，最常見的是前三種：<code>read-only</code>、<code>workspace-write</code>、<code>danger-full-access</code>，這也和 <code>USAGE.md</code> 的 CLI flags 對應。它們代表的是整個 session 的基本操作邊界：只能讀、可在 workspace 內寫、或幾乎完全放開。這些 mode 的意義不只是 convenience，而是系統對風險承受度的明確宣告。</p>\n<p>另外兩個 mode 則更像系統內部治理語意。<code>Prompt</code> 代表某些行為需要走 interactive approval flow；<code>Allow</code> 則代表更寬鬆的全開狀態。也就是說，<code>PermissionMode</code> 不是單純的使用者 UI 文案，而是一套用來比較當前權限與工具需求的正式階層。</p>\n<h3>allow / deny / ask</h3>\n<p><code>PermissionPolicy</code> 真正精彩的地方，在於它不是只看「目前 mode 是否高於工具需求」，而是再疊加三種規則集合：<code>allow_rules</code>、<code>deny_rules</code>、<code>ask_rules</code>。從 <code>authorize_with_context()</code> 的流程可以看出，deny rule 會先被檢查；ask rule 會要求進一步 approval；allow rule 則能在相符情況下直接放行，但 ask rule 仍可能優先要求確認。</p>\n<p>這裡反映出一個重要原則：permission 不是單一層級比較，而是靜態 mode、細粒度規則、以及互動式確認三者共同形成的結果。舉例來說，就算當前 mode 理論上足夠，ask rule 仍然可以要求額外確認；反過來說，hook 也可能透過 <code>PermissionOverride</code> 臨時把某個決策改成 Allow、Deny、或 Ask。這使得權限系統不只可分層，也可被更高層 orchestration 或 hooks 介入。</p>\n<h3>policy 與 enforcement 的差異</h3>\n<p>這是很多人第一次讀權限系統時最容易混淆的地方。<code>PermissionPolicy</code> 的工作是做授權判斷，回答「依照目前模式、工具需求、規則與上下文，這次操作應該被允許還是拒絕？」它產出的是 <code>PermissionOutcome</code>，也就是 Allow 或 Deny，以及被拒絕時的原因。</p>\n<p><code>PermissionEnforcer</code> 則是另一層責任。它把 policy 帶到實際執行邊界上，回傳較具結構的 <code>EnforcementResult</code>。像 <code>check_file_write()</code> 會額外考慮 workspace boundary，<code>check_bash()</code> 則會用保守 heuristic 判斷某個 command 是否只讀。也就是說，policy 比較像抽象授權邏輯；enforcement 則是把這個邏輯落在具體操作面，補上路徑、命令性質與執行上下文。</p>\n<p>這個分層很值得學。若 policy 和 enforcement 全混在一起，系統很快就會變成難以測試的 if/else 叢林；若只有 policy 沒有 enforcement，則很多真實邊界條件無法被良好表示，例如「workspace-write 可以寫工作區內，但不能寫工作區外」這類規則。</p>\n<h3>為什麼不能只靠模型自律</h3>\n<p>這是 permission 系統存在的根本理由。有人可能會說：模型已經很聰明了，只要在 system prompt 裡提醒它不要做危險事，不就夠了嗎？答案通常是不夠。因為 prompt 指令只能提供行為傾向，不能提供真正可執行、可驗證、可拒絕的邊界控制。當模型判斷錯誤、上下文不足、或任務壓力過高時，它仍可能選擇高風險操作。</p>\n<p><code>claw-code</code> 的 mock parity scenarios 很直接地證明了這件事。像 <code>write_file_denied</code>、<code>bash_permission_prompt_approved</code>、<code>bash_permission_prompt_denied</code> 這些場景之所以重要，就是因為系統必須在外部明確決定：什麼行為會被拒絕、什麼行為必須 ask、什麼情況下 approval 才能放行。若這些判斷完全交給模型自己決定，整個 guardrail 就等於不存在。</p>\n<p>換句話說，好的 agent 不是「會自我克制的模型」，而是「被放進良好制度中的模型」。自律可以是加分項，但不能是唯一防線。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permission_enforcer.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>PermissionMode</code>、<code>PermissionOutcome</code>、<code>PermissionPolicy</code></li>\n<li>再看 <code>authorize_with_context()</code> 如何依序處理 deny / ask / allow / override</li>\n<li>最後讀 <code>PermissionEnforcer</code> 的 <code>check()</code>、<code>check_file_write()</code>、<code>check_bash()</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>PermissionMode</code> 如何表達不同風險層級</li>\n<li><code>PermissionPolicy</code> 如何把 active mode、tool requirement、rule matching、interactive prompt 串起來</li>\n<li><code>PermissionEnforcer</code> 如何把抽象政策落到具體工具執行邊界上</li>\n<li><code>read-only</code>、<code>workspace-write</code>、<code>danger-full-access</code> 在真實檔案寫入與 bash 執行上的差異</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>permission system 的核心取捨，是安全性與摩擦成本之間的平衡。<code>read-only</code> 最安全，但也最限制 agent 能力；<code>danger-full-access</code> 最順手，但把大量風險暴露給模型；<code>workspace-write</code> 則試圖在生產力與邊界控制之間找折衷。再加上 ask rules 後，系統可以針對特定高風險行為保留人類批准流程，但同時也增加了互動中斷與心智負擔。</p>\n<p>另一個取捨是 policy 與 enforcement 要不要分開。分開的好處是抽象清楚、可測試性好、理由可追溯；壞處則是你得維護兩層概念，不像一個巨大的條件判斷那麼「看起來直接」。<code>claw-code</code> 選擇承擔這個複雜度，因為它換來的是更可靠的治理結構。對真實 harness 來說，這筆成本通常值得。</p>\n<h2>Mini Harness 連結點</h2>\n<p>在 <code>mini harness</code> 裡，我們不一定需要完整複製 <code>claw-code</code> 的所有 permission 細節，但至少要保留三件事：第一，有明確的 mode 分層，例如 <code>read-only</code>、<code>workspace-write</code>、<code>danger-full-access</code>；第二，工具宣告要帶著所需權限；第三，要有一個最小授權函式在工具執行前被呼叫。若教學版還能再進一步保留 ask / deny 規則，那會更接近真實系統；但就算先簡化，也不能把所有保護都塞回 prompt 文字裡。</p>\n<h2>本章小結</h2>\n<p><code>claw-code</code> 的 permission system 展示了 guardrails 的真正樣子：不是一句「請小心操作」，而是一套由 <code>PermissionMode</code>、<code>PermissionPolicy</code>、<code>PermissionEnforcer</code>、rules、prompts 與執行邊界共同構成的治理流程。能力越強，越需要這種制度化控制。理解它，才能明白 agent harness 的安全性不是附屬品，而是核心架構的一部分。</p>\n<h2>章末練習</h2>\n<ol>\n<li>比較 <code>read-only</code>、<code>workspace-write</code>、<code>danger-full-access</code></li>\n<li>說明 <code>ask</code> 規則何時有必要</li>\n<li>設計一條適合 <code>mini harness</code> 的最小 permission policy</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>如果讓你在「較安全但常打斷工作流」與「較順手但風險較高」之間二選一，你會如何為不同任務設計不同 permission mode？</li>\n<li>你是否認為某些工具應該永遠不允許在 fully automatic 模式下執行？為什麼？</li>\n<li>若一個系統只有 mode 分層，沒有 allow / deny / ask 規則，它最可能在哪些邊界案例出現漏洞？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>讀完 guardrails 後，接下來要問的是：你怎麼知道這些權限、工具與 runtime 真的按預期運作？這個問題會在第 14 章得到回答。我們會從 <code>mock parity harness</code> 出發，看看真實 agent harness 為什麼需要 deterministic、scenario-based 的驗證方法。</p>", "ch09": "<h2>章節導言</h2>\n<p>一個 agent 若每一輪都從零開始，理論上仍能回答問題，但很難成為真正可工作的系統。因為真實任務往往不是一輪完成，而是跨多輪逐步收斂：讀檔、執行工具、修正、再問、再比對。這時候，<code>session</code> 就不只是方便功能，而是 agent 能不能維持工作脈絡的核心機制。</p>\n<p><code>claw-code</code> 的 session 設計很值得學，因為它不是把 conversation history 當成一塊模糊字串，而是把每筆訊息、tool result、usage metadata、compaction 狀態與 fork provenance 都做成結構化資料。這讓 <code>transcript</code> 不只是可讀記錄，同時也是 runtime 可以恢復、追蹤與壓縮的狀態容器。</p>\n<p>本章要處理四個核心問題：什麼是 <code>session persistence</code>、什麼是 <code>transcript</code>、<code>resume</code> 為什麼能成立、以及長對話時為什麼需要 <code>compaction</code>。理解這四者後，你會更清楚 agent 的「記憶」其實不是單一 feature，而是狀態保存、重播、摘要與使用成本管理一起構成的系統能力。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能解釋 <code>session</code>、<code>transcript</code>、<code>resume</code>、<code>compaction</code> 在 <code>claw-code</code> 中的角色</li>\n<li>能說明結構化 session 為什麼比單純聊天記錄更適合 agent harness</li>\n<li>能判斷 <code>mini harness</code> 應保留哪些 session 能力，哪些可暫時簡化</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>session persistence</h3>\n<p><code>session.rs</code> 裡的 <code>Session</code> 不是只有一個 message list。它至少包含版本、<code>session_id</code>、建立與更新時間、<code>messages</code>、<code>compaction</code>、<code>fork</code>，以及可選的 persistence path。這說明 session 在 <code>claw-code</code> 裡不是暫時對話快取，而是一個正式的持久化狀態物件。</p>\n<p>更重要的是，它真的會寫到檔案。<code>save_to_path()</code> 會把當前 session snapshot 寫出，<code>with_persistence_path()</code> 與 <code>append_persisted_message()</code> 則讓新訊息能被追加到持久化檔案中。也就是說，session 不是靠「程式還活著」才存在，而是被設計成可中斷、可恢復、可重播的狀態容器。這正是 <code>session persistence</code> 的意義。</p>\n<h3>transcript</h3>\n<p>很多人會把 transcript 理解成「聊天紀錄」，但在 agent harness 裡，transcript 更像「行為紀錄與狀態日誌」。<code>ConversationMessage</code> 不是只有 user 與 assistant 文本，它還可以包含 <code>ContentBlock::ToolUse</code> 與 <code>ContentBlock::ToolResult</code>。這表示 transcript 會記住模型曾要求什麼工具、工具回了什麼結果、那個結果是否是 error。</p>\n<p>這個差異很重要。若 transcript 只保存最後的人類可讀文字，很多 agent 行為就無法被重建。runtime 不知道上一輪執行過什麼工具，testing 也難以還原 bug。正因為 transcript 是結構化的，所以它同時服務於使用者理解、runtime resume、以及後續 debugging。</p>\n<h3>resume</h3>\n<p><code>resume</code> 之所以能成立，不是因為有一個神奇命令，而是因為系統一直有在保存結構化 session。<code>USAGE.md</code> 明確寫到 REPL turns 會持久化在當前 workspace 的 <code>.claw/sessions/</code> 底下，而 CLI 也提供 <code>--resume latest</code> 之類的入口。當使用者恢復 session 時，系統不是只把一段文字再貼回 prompt，而是重新載入先前的結構化狀態。</p>\n<p><code>Session::load_from_path()</code> 更進一步展現了這點：它可以從 JSON object 或 JSONL 內容載入 session，再配上 persistence path。這意味著 resume flow 本質上是「讀取並重建狀態」，而不是「重新開始並希望模型自己記得」。從 harness engineering 的角度看，這正是狀態管理與單純聊天 UI 的分界之一。</p>\n<h3>compaction</h3>\n<p>只保存狀態還不夠，因為長對話會讓上下文不斷膨脹。這時候 <code>compaction</code> 就變得重要。<code>SessionCompaction</code> 與 runtime 中的 auto-compaction 機制說明，<code>claw-code</code> 並沒有假裝上下文可以無限累積，而是承認 session 需要被摘要與瘦身。這讓系統能在維持工作記憶的同時，控制 token 成本與 prompt 長度。</p>\n<p>這裡 <code>usage.rs</code> 也扮演關鍵角色。<code>UsageTracker::from_session()</code> 會從現有 session 重建累積 usage，表示 usage 並不是和 session 分離的後置報表，而是 session management 的一部分。因為只有知道累積 token 與成本，runtime 才能更合理地決定何時需要 compaction。這也是為什麼本章同時讀 <code>session.rs</code> 與 <code>usage.rs</code> 特別有意義。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/session.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/usage.rs</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>USAGE.md</code> 的 session management 段落</li>\n<li>再讀 <code>session.rs</code> 的 <code>Session</code>、<code>ConversationMessage</code>、<code>ContentBlock</code></li>\n<li>最後讀 <code>usage.rs</code> 的 <code>UsageTracker</code>，看 usage 如何從 session 回建</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>session</code> 如何被保存、載入與追加寫入</li>\n<li><code>transcript</code> 為什麼包含 tool use / tool result，而不只是純文字</li>\n<li><code>resume</code> 為什麼是狀態重建，而不是簡單重新開聊</li>\n<li><code>compaction</code> 與 usage tracking 如何共同處理長對話成本</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>session 系統的最大取捨，是「保存越完整」與「維護越複雜」之間的平衡。若只保留簡單文字紀錄，系統容易做，但 agent 狀態很難真正恢復；若把每個 message、tool result、usage、fork、compaction 都結構化保存，系統可恢復性與可除錯性會更好，但格式設計、載入相容性與維護成本也會上升。<code>claw-code</code> 明顯選擇了後者，因為它面向的是真實長流程工作，而不是短暫聊天。</p>\n<p>另一個取捨則是 compaction。若完全不做，系統邏輯簡單，但長期成本與上下文負擔會持續增加；若過度積極 compaction，又可能失去對後續推理很重要的細節。因此成熟 harness 必須把 <code>session</code>、<code>transcript</code>、<code>resume</code>、<code>usage</code> 一起看，而不是把它們當成互不相干的小功能。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 在 session 這一層最值得保留的，是結構化訊息、最小 persistence、以及簡單的 <code>resume</code>。教學版大概不需要一開始就做 rotation、fork provenance、完整 compaction metadata 或較細的 usage 成本估算；但至少應該讓學生看到：<code>session</code> 不是一個列表暫存，而是一個會被寫出、再讀回、讓系統繼續工作的狀態容器。完整 <code>claw-code</code> 加上的，則是更成熟的 transcript 結構與長對話維護能力。</p>\n<h2>本章小結</h2>\n<p>在 <code>claw-code</code> 裡，<code>session</code> 不只是保存聊天內容，而是承載 <code>transcript</code>、tool results、usage、resume、compaction 等能力的核心狀態容器。它讓 agent work 可以跨回合延續，也讓 runtime 與測試能基於結構化紀錄重建先前行為。理解這一層，才能真正明白為什麼多輪 agent 系統不能只靠「模型記得剛剛在說什麼」。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋為什麼 agent transcript 需要保存 tool use 與 tool result，而不只是最終回答。</li>\n<li>說明 <code>resume</code> 為什麼依賴 session persistence，而不是只依賴 prompt wording。</li>\n<li>如果你要為 <code>mini harness</code> 設計最小 session 格式，你會保留哪些欄位？哪些先不做？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你覺得很多人為什麼會把 session 問題低估成「只是聊天記錄」？</li>\n<li>若一個系統只有 resume、沒有 compaction，長期最可能出現什麼問題？</li>\n<li>如果 transcript 足夠完整，你認為它除了 resume 之外，還能支援哪些工程工作？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>第 9 章處理的是系統如何保存自己；下一章要處理的，則是系統如何向模型描述自己所處的世界。第 10 章會進入 <code>Prompt Assembly</code> 與 <code>ProjectContext</code>，看 <code>claw-code</code> 如何把 <code>CLAUDE.md</code>、git 狀態、工作目錄與動態環境資訊組進 system prompt。</p>", "ch10": "<h2>章節導言</h2>\n<p>很多初學者一聽到 system prompt，就直覺想到一大段固定文字。但在真實 harness 裡，<code>Prompt Assembly</code> 幾乎從來不是靜態字串。它通常是一個動態組裝流程，會把工作目錄、日期、平台資訊、instruction files、git 狀態、設定檔內容與附加章節一起拼成模型真正看到的上下文。也就是說，prompt 在這裡不是文案，而是 runtime 建構出來的環境描述。</p>\n<p><code>claw-code</code> 的 <code>prompt.rs</code> 很值得學，因為它把這個流程寫得很明確。它不只提供 <code>load_system_prompt()</code>，還定義了 <code>ProjectContext</code>、<code>ContextFile</code>、<code>SystemPromptBuilder</code>、instruction-file discovery、environment section、config section、以及 <code>CLAUDE.md</code> 記憶的注入方式。這些設計共同說明一件事：高品質 agent prompt，來自系統化 context injection，而不是只靠人臨時補充背景。</p>\n<p>本章要回答的核心問題有四個：什麼是 system prompt、什麼是 project context、context injection 到底注入了什麼、以及 <code>CLAUDE.md</code> / instruction files 為何能被視為一種專案記憶。理解這四點，你就會知道 prompt assembly 其實是 harness 裡最容易被低估、但又最影響 agent 表現穩定度的核心層之一。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 <code>Prompt Assembly</code> 與單純寫一段 system prompt 的差異</li>\n<li>能解釋 <code>ProjectContext</code>、instruction files、git 狀態如何被注入模型上下文</li>\n<li>能判斷 <code>mini harness</code> 應保留哪些 prompt assembly 能力，哪些可先簡化</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>system prompt</h3>\n<p>在 <code>prompt.rs</code> 裡，system prompt 並不是一個常數，而是 <code>SystemPromptBuilder</code> 建出來的一組 sections。這些 sections 包含 intro、system section、doing-tasks section、actions section，再加上一條 <code>SYSTEM_PROMPT_DYNAMIC_BOUNDARY</code>，把靜態 scaffold 和動態 context 切開。這個邊界設計很重要，因為它明確承認 prompt 有兩個來源：一部分是長期穩定的系統規則，一部分是當下環境與專案脈絡。</p>\n<p>這種做法的價值在於可維護性。你可以比較清楚地知道哪一段是普遍規則，哪一段是這次工作才有的 context，也更容易獨立檢視 prompt assembly 是否正確。這和「把所有東西複製貼上一大段」的差別非常大。</p>\n<h3>project context</h3>\n<p><code>ProjectContext</code> 是這一章的主角之一。它至少包含：</p>\n<ul>\n<li><code>cwd</code></li>\n<li><code>current_date</code></li>\n<li><code>git_status</code></li>\n<li><code>git_diff</code></li>\n<li><code>instruction_files</code></li>\n</ul>\n<p>這代表 <code>ProjectContext</code> 不只是「目前路徑在哪裡」，而是對當前工作環境的結構化描述。尤其是 <code>discover_with_git()</code> 會進一步把 git 狀態與 diff 帶進來，這表示模型看到的專案脈絡不只是靜態檔案規則，也包含工作區目前的變化狀態。對 coding agent 來說，這種 context injection 非常關鍵，因為它能直接影響模型如何理解任務與風險。</p>\n<h3>context injection</h3>\n<p>很多系統會說自己有 context，但 <code>claw-code</code> 展示的是比較嚴格的 <code>context injection</code>。<code>SystemPromptBuilder</code> 的 <code>with_project_context()</code>、<code>with_runtime_config()</code>、<code>append_section()</code> 等方法，讓不同來源的資訊能被有秩序地組進最終 prompt。從 <code>build()</code> 流程可看出，環境資訊、project context、instruction files、config section 都是被分段插入，而不是混成一塊。</p>\n<p>這種結構化 injection 有兩個好處。第一，模型更容易接收有層次的資訊，而不是被一大段無結構文字淹沒。第二，系統更容易測與診斷。例如 CLI 提供 <code>system-prompt</code> 命令，本質上就是讓你把 prompt assembly 的結果單獨印出來檢查。這種可檢視性，是 prompt assembly 真正工程化的一個重要訊號。</p>\n<h3>CLAUDE.md memory</h3>\n<p><code>prompt.rs</code> 的另一個關鍵點，是它會沿路搜尋 instruction files，例如：</p>\n<ul>\n<li><code>CLAUDE.md</code></li>\n<li><code>CLAUDE.local.md</code></li>\n<li><code>.claw/CLAUDE.md</code></li>\n<li><code>.claw/instructions.md</code></li>\n</ul>\n<p>而且搜尋不是只看目前資料夾，而是從 <code>cwd</code> 一路往上追 parent directories，再去重與限制總字數。這表示 <code>CLAUDE.md memory</code> 在 <code>claw-code</code> 裡不是神秘長期記憶，而是一種 project-local instruction layer。它會把專案規則、工作原則、特定限制注入到 system prompt 中，使模型每次工作都能站在相對一致的規則脈絡上。</p>\n<p>這種記憶方式很有意思，因為它兼具可讀、可編輯、可版控、可被 prompt assembly 載入的特性。從 harness engineering 的角度看，這比把所有規則埋在不可見程式碼裡更透明，也比每次都靠人手動重新說明更穩定。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/prompt.rs</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先看 <code>USAGE.md</code> 裡 <code>system-prompt</code> 的用法</li>\n<li>再讀 <code>prompt.rs</code> 中的 <code>ProjectContext</code>、<code>ContextFile</code>、<code>SystemPromptBuilder</code></li>\n<li>最後讀 instruction-file discovery 與 <code>load_system_prompt()</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>Prompt Assembly</code> 為什麼是一個 builder 流程，而不是固定文本</li>\n<li><code>ProjectContext</code> 如何把 <code>cwd</code>、日期、git 狀態與 instruction files 收束成模型上下文</li>\n<li>context injection 為什麼要分 environment / project / instruction / config 等不同 section</li>\n<li><code>CLAUDE.md</code> memory 如何被載入、去重與限制長度</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>prompt assembly 的最大取捨，是資訊完整度與 prompt 負擔之間的平衡。你注入越多 context，模型越可能站在「正確世界」裡工作；但注入過多時，成本、噪音與認知負擔也會上升。<code>claw-code</code> 的做法很值得學，因為它不是盲目加資訊，而是透過 <code>ProjectContext</code> 與 instruction-file discovery 明確控制注入類型，還對 instruction file 字數設上限。</p>\n<p>另一個取捨則是把專案規則寫在 code 還是寫在 <code>CLAUDE.md</code>。寫在 code 裡，系統更封閉，但規則可能較難被人檢查與維護；寫在 instruction files 裡，則更透明、更利於專案自定義，但也需要處理 discovery、dedupe 與長度控制。<code>claw-code</code> 選擇後者，這顯示它把 project memory 視為需要被顯性管理的上下文資源。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 在 prompt assembly 這一層最值得保留的，是簡化版 <code>ProjectContext</code> 與最基本的 instruction file 注入。教學版不一定要一開始就帶 <code>git_diff</code>、完整 config section、或多種 output style，但至少應該讓學生看到：系統 prompt 不是手寫一段固定話術，而是會根據 <code>cwd</code>、日期、專案規則與簡單環境資訊被動態組裝。完整 <code>claw-code</code> 多做的，則是更豐富的 context injection 與可診斷的 system-prompt rendering surface。</p>\n<h2>本章小結</h2>\n<p><code>Prompt Assembly</code> 在 <code>claw-code</code> 裡不是文案技巧，而是一個正式的 runtime 建構流程。<code>ProjectContext</code> 提供工作脈絡，context injection 把環境與專案資訊結構化帶進模型上下文，而 <code>CLAUDE.md</code> 則作為 project-local memory 被穩定注入 system prompt。理解這一層，才能看清楚模型為何不是在「真空中回答」，而是在被 harness 主動描述過的工作世界裡推理。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋 <code>Prompt Assembly</code> 與「手寫一段 system prompt」有什麼本質差異。</li>\n<li>說明為什麼 <code>CLAUDE.md</code> 可以被視為一種 project memory。</li>\n<li>如果你要為 <code>mini harness</code> 設計最小 <code>ProjectContext</code>，你會保留哪些欄位？哪些先不保留？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你是否曾經把模型回答錯誤歸因於模型不夠聰明，但其實是 context injection 不完整？</li>\n<li>對 coding agent 來說，<code>git_status</code> 與 <code>git_diff</code> 這類資訊應該永遠注入嗎？還是要視任務而定？</li>\n<li>若專案規則分散在多個 instruction files，中間甚至互相衝突，你覺得 harness 應該怎麼處理？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>第 10 章說明的是系統如何把世界描述給模型；下一章則要處理另一個同樣重要的問題：這個世界的設定是從哪裡來的，又怎麼依 scope 與環境覆寫？第 11 章會進入 <code>config hierarchy</code>、permission mode 設定與 environment-sensitive behavior。</p>", "ch11": "<h2>章節導言</h2>\n<p>前一章談的是系統如何把世界描述給模型，而這一章要問的是：這些世界設定本身從哪裡來？對真實 harness 而言，很多關鍵行為都不是寫死在原始碼裡，而是受到 <code>config hierarchy</code>、permission modes、sandbox 與 remote / local 環境條件影響。也就是說，系統的表現不只由 code 決定，也由設定層與執行環境決定。</p>\n<p><code>claw-code</code> 在這一層做得相當成熟。<code>config.rs</code> 不只是讀一個 JSON，而是有來源層級、合併 precedence、feature-specific parsing，以及針對 model、permissions、hooks、plugins、MCP、sandbox 等能力的結構化解析。另一方面，<code>remote.rs</code> 又提醒我們：environment-sensitive behavior 不只是 config file 的問題，還可能來自環境變數、proxy 狀態、remote session token 與 base URL。這些一起構成了系統的 operational environment。</p>\n<p>本章會先釐清 <code>config hierarchy</code>，再討論 permission modes 如何由設定層進入 runtime，最後看 environment-sensitive behavior 為什麼是 agent harness 需要面對的真實邊界。你會看到，成熟系統之所以可用，不只是因為它功能多，而是因為它知道如何讓相同核心在不同 scope 與環境下表現出不同但可預期的行為。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 <code>config hierarchy</code> 如何決定最終有效設定</li>\n<li>能解釋 permission modes 與 permission rules 如何從設定層流入 runtime</li>\n<li>能理解 local / remote / proxy 這類 environment-sensitive behavior 為什麼屬於 harness 問題</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>config hierarchy</h3>\n<p><code>USAGE.md</code> 已先把 <code>config file resolution order</code> 寫得很清楚，<code>config.rs</code> 則把它落實成 <code>ConfigLoader::discover()</code> 的搜尋順序。它至少會依序看：</p>\n<ol>\n<li><code>~/.claw.json</code></li>\n<li><code>~/.config/claw/settings.json</code></li>\n<li><code>&lt;repo&gt;/.claw.json</code></li>\n<li><code>&lt;repo&gt;/.claw/settings.json</code></li>\n<li><code>&lt;repo&gt;/.claw/settings.local.json</code></li>\n</ol>\n<p>這就是典型的 <code>config hierarchy</code>。重點不是檔案多，而是 scope 清楚：user sco
