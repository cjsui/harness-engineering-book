pe、project scope、local override scope 會逐層疊加。這種設計使得同一套核心系統可以有全域預設、專案規則、以及本機覆寫，而不必把所有差異都硬寫進原始碼。</p>\n<h3>permission modes</h3>\n<p>前面第 8 章談的是 permission policy 的運作，這裡則要補上「這些 modes 從哪裡來」。在 <code>config.rs</code> 裡，<code>RuntimeFeatureConfig</code> 會解析出 <code>permission_mode</code> 與 <code>permission_rules</code>；<code>parse_optional_permission_mode()</code> 也支援從 <code>permissionMode</code> 或 <code>permissions.defaultMode</code> 這類欄位讀取設定。這意味著 permission 並不只是 CLI 當下傳入的旗標，它也可以是一個由設定層提供的預設。</p>\n<p>這個設計很重要，因為它讓安全邊界不只是一個臨時命令列選項，而能成為專案層規則的一部分。同時，allow / deny / ask 規則也能透過 config 載入，讓 permission system 真正成為可設定、可版本化的治理機制，而不是零散寫在程式裡的特殊判斷。</p>\n<h3>environment-sensitive behavior</h3>\n<p>一個成熟 harness 通常不能假設自己永遠在同一種環境裡執行。<code>remote.rs</code> 很明確地展示了這點：<code>RemoteSessionContext</code> 會從環境變數讀取 remote enabled 狀態、session id 與 base URL；<code>UpstreamProxyBootstrap</code> 會根據 token path、CA bundle、proxy 狀態與 session token 決定是否啟用 upstream proxy。這些都屬於 environment-sensitive behavior。</p>\n<p>這裡值得特別注意的是：環境行為不是附屬邊角，而是系統執行條件的一部分。對本地單機教學版來說，這些看起來也許太重；但對真實 harness 而言，local 與 remote 根本不是同一個問題。執行位置不同，能見資源不同，proxy 與證書路徑不同，甚至安全假設也不同。把這些差異顯性化，正是成熟 harness 的一部分。</p>\n<h3>config 與 runtime 的關係</h3>\n<p><code>config.rs</code> 的真正價值，不是儲存設定，而是把設定轉成 runtime 可直接消費的 feature config。<code>RuntimeConfig</code> 不只保留 merged settings 與 loaded entries，還解析出 hooks、plugins、MCP、oauth、model、permission mode、permission rules、sandbox 等結構化子配置。這使得 runtime 並不需要自己去碰原始 JSON，而能直接拿到較乾淨的 typed configuration。</p>\n<p>這種分層能避免一個很常見的壞味道：每個子系統自己去讀 JSON、自己解字串、自己決定 precedence。當系統規模變大時，那會讓 config behavior 非常難以推理。<code>claw-code</code> 用 <code>ConfigLoader</code> 把這一層集中處理，換來的是較高的一致性與可測試性。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/config.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/remote.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>USAGE.md</code> 的 config file resolution order</li>\n<li>再讀 <code>config.rs</code> 的 <code>ConfigLoader</code>、<code>RuntimeConfig</code>、permission / sandbox parsing</li>\n<li>最後讀 <code>remote.rs</code> 的 <code>RemoteSessionContext</code> 與 <code>UpstreamProxyBootstrap</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>config hierarchy</code> 如何決定設定覆寫順序</li>\n<li>permission modes 與 permission rules 如何從 config 流入 runtime</li>\n<li>local / remote / proxy 這些環境條件如何改變系統行為</li>\n<li>為什麼成熟 harness 需要把 environment-sensitive behavior 顯性做成模組</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>設定層最大的取捨，是彈性與可理解性之間的平衡。層級越多、可覆寫點越多，系統越靈活，但也越難判斷某個最終行為到底來自哪裡。<code>claw-code</code> 選擇接受這種複雜度，因為它需要同時支援 user defaults、project rules、local overrides、remote context、sandbox 與 plugin / MCP 等多種面向。這對真實系統很合理，但教學上就需要特別強調 precedence 與 scope，否則學生很容易迷失。</p>\n<p>另一個取捨則是 remote / environment 行為要不要早期納入。若完全不處理，系統看起來更純粹；但真實部署時，很多 operational 問題就會突然變成例外情況。<code>claw-code</code> 選擇把這些問題提前顯性化，雖然增加模組數與概念負擔，卻也讓 local 與 remote 邊界比較不會藏在隱晦副作用中。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 在這一層最值得保留的，是簡化版 <code>config hierarchy</code> 與最基本的 permission mode 設定。例如教學版可以只支援 project-level 與 local-level 設定，先不處理完整 user scope、MCP、plugin、remote proxy 等能力。但即使縮小，也應該讓學生看到：設定不是散落常數，而是會影響 runtime mode、工具限制與基本環境行為的正式層。完整 <code>claw-code</code> 增加的，則是更成熟的 scope 合併與環境分流能力。</p>\n<h2>本章小結</h2>\n<p><code>claw-code</code> 的 <code>config hierarchy</code>、permission modes 與 environment-sensitive behavior 共同說明了一件事：真實 harness 不只是寫好核心 loop，還要讓這個 loop 能在不同 scope、不同專案、不同環境條件下以可預期方式運作。<code>ConfigLoader</code> 把設定 precedence 變得可推理，<code>RuntimeConfig</code> 把設定轉成 runtime 可用結構，而 <code>remote.rs</code> 則提醒我們 local 與 remote 邊界本來就是系統設計問題。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明 <code>config hierarchy</code> 對真實 harness 有什麼好處，也有什麼代價。</li>\n<li>解釋為什麼 permission mode 應該可以來自 config，而不只是 CLI 旗標。</li>\n<li>如果你要為 <code>mini harness</code> 設計最小設定系統，你會支援哪些層級？哪些先不支援？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你是否曾經在大型系統中搞不清楚某個設定到底從哪裡生效？這和本章的 precedence 問題有何相似？</li>\n<li>若一個系統完全不顯性處理 remote / proxy 環境差異，最可能在哪些情境出問題？</li>\n<li>對教學版來說，你覺得應先教 config 還是先教 runtime？為什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>到這裡，Part II 的中層系統面已經更完整了：你看過 CLI、session、Prompt Assembly、config 與 environment。接下來若往 extension 與 remote 繼續走，就會自然接到第 12、13 章的 MCP / plugin 邊界與 remote execution 問題。</p>", "ch12": "<h2>章節導言</h2>\n<p>到這裡為止，我們看的大多是 <code>claw-code</code> 內建就有的核心能力：runtime、tools、permissions、session、prompt、config。第 12 章開始，焦點轉到另一個很容易讓人誤解的主題: 系統如何被擴充。這裡最需要小心的，不是技術細節，而是成熟度判斷。因為在真實 repo 裡，常常會同時存在「已實作的架構骨架」與「尚未完全 shipped 的產品介面」。若沒有把兩者分清楚，學生很容易把 extension boundary 誤讀成完整 plugin 平台。</p>\n<p><code>claw-code</code> 正是一個典型例子。從 <code>rust/README.md</code> 的 features table 可看到，<code>MCP server lifecycle</code> 標為已存在，但 <code>Plugin system</code> 與 <code>Skills registry</code> 則仍標示為 planned。另一方面，<code>mcp_tool_bridge.rs</code>、<code>mcp.rs</code>、<code>plugin_lifecycle.rs</code> 又確實已經提供了不少可讀程式碼：MCP tool naming、server registry、resource/tool metadata、plugin healthcheck、degraded mode、lifecycle trait 等。這代表我們不是在看空白規劃，而是在看一組可閱讀的 extension architecture 片段。</p>\n<p>本章必須先做一個成熟度聲明：這裡教的是 extension architecture 與目前已存在的 code paths，不是在介紹一套 fully shipped 的 plugin system，也不是在介紹已完成的 skills registry API。凡是涉及尚未成熟的 plugin / skills 產品面，都必須被標示為 planned，而不能當作現況來教。</p>\n<p>因此，本章的核心任務不是教你「如何使用一個已完成的 plugin 平台」，而是教你如何讀懂 <code>claw-code</code> 當前已存在的擴充邊界。你要分清楚哪些東西今天已經在程式碼中成立，哪些仍然只是 planned direction。這種區分，本身就是閱讀真實 agent harness 的重要能力。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 <code>MCP</code>、plugin tools、plugin lifecycle 在 <code>claw-code</code> 中目前處於什麼成熟度</li>\n<li>能解釋 extension architecture 與完整 plugin product surface 之間的差異</li>\n<li>能避免把尚未 shipped 的 plugin / skills registry 能力誤讀成已完成系統</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>MCP</h3>\n<p>在 <code>claw-code</code> 裡，<code>MCP</code> 並不是只是一個抽象名詞，而是已經有具體工具橋接與命名邏輯。<code>mcp.rs</code> 會把 server name 與 tool name 正規化成像 <code>mcp__server__tool</code> 的形式，也會根據 <code>McpServerConfig</code> 計算 signature 與 config hash。這代表系統已經明確處理「外部 server 上的工具要如何被表示成 runtime 可辨識的工具名」這個問題。</p>\n<p>而 <code>mcp_tool_bridge.rs</code> 更進一步展示了橋接層的存在。它定義了 <code>McpToolRegistry</code>、<code>McpServerState</code>、<code>McpToolInfo</code>、<code>McpResourceInfo</code>、connection status、resource/tool listing 與 <code>call_tool()</code> 的流程。從這裡可以看出，<code>MCP</code> 在 <code>claw-code</code> 裡不是紙上談兵，而是已有 stateful registry 與 server-manager bridge 的架構雛形。</p>\n<h3>plugin tools</h3>\n<p>從工具系統角度看，plugin tools 的關鍵不是「plugin」這個字本身，而是外部能力如何進入既有工具表面。前面第 7 章已看過 <code>GlobalToolRegistry</code> 可以同時處理 built-in、runtime、plugin tools；這一章再從 <code>mcp_tool_bridge.rs</code> 補上一層，就更清楚了: plugin-like capability 其實需要被轉譯成工具資訊、註冊狀態、server health 與呼叫路徑，才能真正進入 runtime。</p>\n<p>也就是說，plugin tools 在這裡更接近「被橋接進現有 tool system 的外部能力」，而不是一個你今天就能穩定安裝、瀏覽、升級、卸載的完整市集型體驗。這個 distinction 非常重要，因為它決定我們該把本章教成架構閱讀，而不是產品操作手冊。</p>\n<h3>extensibility boundaries</h3>\n<p><code>claw-code</code> 目前最有價值的地方，是它已經讓 extensibility boundaries 相當清楚。<code>mcp_tool_bridge.rs</code> 處理 server state 與外部能力橋接，<code>mcp.rs</code> 處理 naming、signature 與 config identity，<code>plugin_lifecycle.rs</code> 則處理 plugin health、degraded mode、discovery 與 shutdown 的生命週期抽象。這些模組共同回答了一個問題: 如果系統要納入外部能力，哪些責任必須被顯性化？</p>\n<p>答案至少包括: 名稱轉換、狀態追蹤、發現能力、健康檢查、降級模式、關閉流程。這些都是 extension boundary 的核心責任。即使今天還沒有完整 shipped 的 plugin product，這條責任鏈本身已經很值得學。因為它告訴你，擴充不是「把新工具接進來」那麼簡單，而是要處理跨進程、跨 server、跨可用性狀態的治理問題。</p>\n<h3>what exists today vs what is still planned</h3>\n<p>這裡必須非常明確。根據 <code>rust/README.md</code>：</p>\n<ul>\n<li><code>MCP server lifecycle</code>：已存在</li>\n<li><code>Plugin system</code>：planned</li>\n<li><code>Skills registry</code>：planned</li>\n</ul>\n<p>再對照原始碼，我們可以更精準地說：<code>MCP</code> 相關 naming、bridge、registry、server state 與 plugin lifecycle trait 等「架構片段」已存在並可閱讀；但這不等於 repo 已經提供一個 fully shipped 的 plugin system，也不等於 skills registry API 已經是完成產品。<code>plugin_lifecycle.rs</code> 提供的是 lifecycle abstraction、healthcheck 與 discovery model，並非完整外掛發佈、安裝、治理與使用者操作層。</p>\n<p>因此，本章需要明講三件事。第一，這些章節教的是 extension architecture 與現有程式碼。第二，它們<strong>不</strong>是在教一個完整 shipped plugin system。第三，凡是談到 plugin system / skills registry 的完整產品面，都必須被標示為 planned，而不能當成現況來教。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/mcp_tool_bridge.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/mcp.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/plugin_lifecycle.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>mcp.rs</code>，理解 naming、signature、config hash</li>\n<li>再讀 <code>mcp_tool_bridge.rs</code>，看 server/tool/resource state 如何被註冊與呼叫</li>\n<li>最後讀 <code>plugin_lifecycle.rs</code>，看 healthcheck、degraded mode、discovery 與 shutdown 抽象</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>MCP</code> tool naming 為何要做成 <code>mcp__server__tool</code> 形式</li>\n<li><code>McpToolRegistry</code> 如何承接外部 server 狀態與工具/資源資訊</li>\n<li><code>PluginLifecycle</code> trait 暗示了哪些現有 lifecycle 責任</li>\n<li>哪些程式碼是 today’s implemented architecture，哪些產品層能力仍屬 planned</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>extension architecture 最大的取捨，是提早設計清楚邊界，還是等產品成熟後再補抽象。<code>claw-code</code> 明顯偏向前者：即使 plugin system 還沒完整 shipped，也先把 naming、bridge、healthcheck、degraded mode、shutdown 等責任做成顯性模組。這樣做的好處是系統將來較容易擴充，風險也比較不會被埋在臨時 glue code 裡；代價則是學生若只看檔名，很容易誤以為整套產品已成熟。</p>\n<p>也因此，教材需要主動補上成熟度框架。否則讀者可能把「已有 lifecycle trait」誤解成「已有完整 plugin 平台」，把「已有 skills command」誤解成「已有完整 skills registry」。本章最大的教學責任，就是避免這種過度推論。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 在第一版明確不納入 full MCP support 與 plugin lifecycle，這不是退步，而是有意識的範圍控制。教學版最值得帶走的，不是外部擴充功能本身，而是 extension boundary 的觀念: 若未來真的要接外部 server 或外掛，你至少要處理 naming、state、discovery、health 與 degradation。完整 <code>claw-code</code> 已經替你示範這些責任如何被拆出來；教學版則先把這些觀念保留在腦中，而不急著實作。</p>\n<h2>本章小結</h2>\n<p>第 12 章真正教的，不是一個已完成的 plugin 平台，而是 <code>claw-code</code> 當前已存在的 extension architecture。<code>MCP</code> tool naming、server registry、bridge、plugin lifecycle、healthcheck、degraded mode 這些都已經有可讀程式碼；但 <code>Plugin system</code> 與 <code>Skills registry</code> 仍屬 planned。能把「已實作的架構邊界」與「尚未 shipped 的產品表面」分清楚，就是讀懂真實 harness 成熟度的關鍵能力。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋為什麼 <code>MCP server lifecycle</code> 已存在，不代表完整 <code>Plugin system</code> 已完成。</li>\n<li>說明 <code>mcp__server__tool</code> 這類命名形式解決了什麼問題。</li>\n<li>如果未來要把 <code>mini harness</code> 擴充成支援外部能力，你認為最先必須補的三個責任是什麼？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你是否常把 repo 中「已有某個抽象或 trait」誤認成「已有完整產品能力」？這個習慣會怎麼影響系統判讀？</li>\n<li>對 extension architecture 來說，你覺得 healthcheck 與 degraded mode 為什麼值得這麼早被考慮？</li>\n<li>若一個系統完全不顯性處理 extension boundary，你覺得它最終會在什麼地方失控？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>第 12 章處理的是外部能力如何被橋接進系統；第 13 章則會處理另一種更根本的邊界: 執行環境本身。也就是說，我們將從 extension boundary 轉到 environment boundary，討論為什麼 local 與 remote execution 根本不是同一類問題。</p>", "ch13": "<h2>章節導言</h2>\n<p>很多人在第一次看 agent harness 時，會把 remote execution 想成「只是把同樣的東西搬去另一台機器跑」。但真正的系統設計一旦走到這裡，就會發現事情完全不是這麼簡單。當執行位置不同，session token、proxy、CA bundle、可見檔案系統、環境變數、網路邊界、甚至信任假設都會跟著改變。也就是說，local 與 remote 並不是同一套 runtime 的單純部署差異，而是不同 execution boundary。</p>\n<p><code>claw-code</code> 的 <code>remote.rs</code> 很有代表性，因為它沒有把 remote support 寫成一個模糊 flag，而是明確拆出 <code>RemoteSessionContext</code>、<code>UpstreamProxyBootstrap</code>、<code>UpstreamProxyState</code>、<code>DEFAULT_REMOTE_BASE_URL</code>、proxy env propagation、CA bundle 路徑與 session token 讀取。這些設計都在傳達同一件事: remote execution 的困難，不在於把 prompt 送到遠端，而在於讓整個 runtime 能在不同環境條件下安全、一致、可診斷地工作。</p>\n<p>本章也要先做成熟度聲明：這裡教的是 execution environment architecture 與目前已存在的 remote code paths，不是在宣稱 repo 已經提供完整 shipped 的 plugin system 或 skills registry API。凡是牽涉後續擴充面的討論，都必須明確標示為 planned，而不是被描述成現在已完成的產品能力。</p>\n<p>本章的核心任務，就是把這些 environment boundaries 講清楚。你要理解的不是某個單一 API，而是為什麼 local 與 remote 是兩類不同問題；以及真實 harness 如何把這些差異顯性放進環境偵測、proxy bootstrap 與 subprocess env construction 中。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明 local 與 remote execution 為什麼不是同一個問題</li>\n<li>能解釋 <code>RemoteSessionContext</code>、<code>UpstreamProxyBootstrap</code> 與 proxy env state 的角色</li>\n<li>能理解 execution environment boundary 為什麼是成熟 harness 必須正式處理的主題</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>remote execution</h3>\n<p><code>remote.rs</code> 一開始就用環境變數把 remote context 做成顯性結構。<code>RemoteSessionContext</code> 會從環境中讀出：</p>\n<ul>\n<li>remote 是否啟用</li>\n<li><code>session_id</code></li>\n<li><code>base_url</code></li>\n</ul>\n<p>這表示 remote execution 在 <code>claw-code</code> 裡不是一段隱藏邏輯，而是一個明確的 session context。系統需要知道自己是不是處於 remote 模式、連的是哪個遠端 session、對應哪個 base URL，才能進一步決定後面如何建立代理與子程序環境。這也說明，remote support 的本質不是多一條網路請求，而是多一層執行上下文。</p>\n<h3>environment boundaries</h3>\n<p>真正的難點在 execution environment boundary。<code>UpstreamProxyBootstrap</code> 會根據 remote context、是否啟用 upstream proxy、session token path、CA bundle path、system CA path 與讀出的 token 來判斷 <code>should_enable()</code>。也就是說，系統不是看到 <code>CLAUDE_CODE_REMOTE=true</code> 就直接啟動 remote 模式，而是要確認多個條件一起滿足。</p>\n<p>這反映出一個很重要的設計原則: 環境切換不是布林值，而是一組邊界條件。檔案路徑、證書、token、proxy、session id、網路例外名單，都屬於 execution environment 的一部分。若不顯性處理這些條件，系統在 local 看起來能跑，到了 remote 或 proxy 受限環境就可能立即失效。</p>\n<h3>why local and remote are not the same problem</h3>\n<p>本章最核心的一句話就是：<code>local and remote are not the same problem</code>。在 local 模式下，工具與 runtime 多半假設自己直接面對本地工作區、本地檔案、本地 shell、本地憑證與直接網路；在 remote 模式下，則可能需要透過 upstream proxy、遠端 session token、特定 CA bundle 與轉譯後的 subprocess env 才能工作。這些差異不是表面部署位置不同，而是整條 operational chain 不同。</p>\n<p><code>remote.rs</code> 的 <code>subprocess_env()</code> 很值得注意，因為它會在啟用狀態下建出 <code>HTTPS_PROXY</code>、<code>NO_PROXY</code>、<code>SSL_CERT_FILE</code>、<code>NODE_EXTRA_CA_CERTS</code>、<code>REQUESTS_CA_BUNDLE</code>、<code>CURL_CA_BUNDLE</code> 等環境變數。這說明 remote execution 問題往往不是 agent loop 本身，而是整個執行環境如何被重新包裝給下游程序。換句話說，remote 不是「再多一個 transport」而已，而是系統外殼本身也要跟著改變。</p>\n<h3>boundary-aware design</h3>\n<p>成熟 harness 面對 remote 問題時，最值得學的不是每個 env var 名稱，而是 boundary-aware design。<code>RemoteSessionContext</code>、<code>UpstreamProxyBootstrap</code>、<code>UpstreamProxyState</code> 分別負責不同層次的問題：目前是否處於 remote session、是否應該啟動 upstream proxy、若啟動後應該如何把環境傳給子程序。這種分層讓 remote 支援不是一個到處散落的 if/else，而是一組可推理、可測試、可逐步擴充的環境模型。</p>\n<p>也正因如此，本章雖然和第 12 章一樣涉及較高階能力，但它們不是同一類主題。第 12 章處理的是 extension boundary；第 13 章處理的是 execution environment boundary。前者關心外部能力如何被系統吸納，後者關心系統自己在哪裡、如何、在什麼條件下執行。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/runtime/src/remote.rs</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>remote.rs</code> 的 <code>RemoteSessionContext</code></li>\n<li>再讀 <code>UpstreamProxyBootstrap</code> 與 <code>UpstreamProxyState</code></li>\n<li>最後回頭看 <code>rust/README.md</code>，把 remote 能力放回整體 runtime 責任圖中理解</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>RemoteSessionContext</code> 如何從 env 建立 remote execution 上下文</li>\n<li><code>UpstreamProxyBootstrap</code> 為什麼要同時看 token、session id、CA bundle、base URL</li>\n<li><code>subprocess_env()</code> 如何把 remote/proxy 邏輯轉成下游程序可用的環境</li>\n<li>為什麼 local / remote 是不同 execution boundary，而不是同一套 loop 的小變形</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>remote support 的最大取捨，是把環境差異顯性化，還是把它藏在隱形部署細節裡。顯性化的好處是結構清楚、可測試、出問題時容易診斷；代價則是模組數變多、學習門檻上升。<code>claw-code</code> 顯然選擇前者，因為它承認 remote execution 本來就不是小事，若不提早做成模組，之後很容易在 proxy、token、憑證與子程序邊界上積出難以理解的技術債。</p>\n<p>另一個取捨則是 remote 能力是否該在教學版過早引入。本書的答案是否定的。不是因為 remote 不重要，而是因為它牽涉的 execution boundary 遠比本地最小 harness 複雜。若學生還沒掌握本地 loop、tooling、permissions、session，就先被丟進 proxy 與 CA bundle 問題，學習重點很容易失焦。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 第一版明確排除 <code>remote execution</code>，理由在本章已經很清楚了：它不是一個小附加功能，而是另一層 execution environment 問題。教學版最值得先帶走的，不是 remote support 本身，而是這個觀念: 一旦系統跨出本地執行環境，你就必須重新思考 session context、proxy、憑證、子程序環境與信任邊界。完整 <code>claw-code</code> 已經替你示範這些責任該如何被模組化；教學版則先把它保留成未來擴充方向。</p>\n<h2>本章小結</h2>\n<p>第 13 章要你學到的，不是如何立刻做出 remote harness，而是為什麼 remote execution 是一類獨立的架構問題。<code>RemoteSessionContext</code>、<code>UpstreamProxyBootstrap</code>、<code>UpstreamProxyState</code> 共同說明，當執行位置改變時，環境、token、proxy、CA bundle 與 subprocess behavior 都會跟著改變。這使得 local 與 remote 不是同一套系統的小差異，而是不同 execution boundary 的設計問題。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋為什麼 remote execution 不應被理解成「同一套東西搬到別台機器跑」。</li>\n<li>說明 <code>UpstreamProxyBootstrap::should_enable()</code> 背後反映了哪些環境邊界條件。</li>\n<li>如果未來要把 <code>mini harness</code> 擴充成支援 remote，你認為最先需要補的三個模組責任是什麼？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你是否曾在系統設計中低估過「環境差異」本身的複雜度？後來通常是在哪裡出問題？</li>\n<li>對 agent harness 來說，remote support 最難的是 transport、security、還是 operational debugging？為什麼？</li>\n<li>如果一個系統只在 local 測得很好，但完全沒有 boundary-aware 的 remote 設計，你會信任它被拿去做真實跨環境工作嗎？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>第 12、13 章一起補完後，Part II 對 <code>claw-code</code> 的整體拆解就更接近完整版本了。接下來若回到 Part III 與 Part IV，你會更清楚看到：哪些能力值得在 <code>mini harness</code> 裡保留，哪些則應該留在真實系統的後續擴充與規模化階段。</p>", "ch14": "<h2>章節導言</h2>\n<p>到了這裡，你已經看過 runtime、tools、permissions 等核心結構，也大致理解 <code>claw-code</code> 怎麼把模型變成可行動的 agent。接下來最重要的一個問題是：你怎麼知道這套系統真的可靠？如果 agent system 會跨越模型輸出、工具執行、權限檢查、session persistence、CLI 表面與 JSON 輸出，那麼只靠人工點幾次、跑幾個 happy path，通常遠遠不夠。</p>\n<p><code>claw-code</code> 的一個關鍵成熟訊號，就是它沒有把驗證停留在「我手動試過，感覺可以」，而是建立了 deterministic 的 mock parity harness。這種做法的重點，不只是測試有沒有過，而是把 agent 行為拆成一組具體 scenario，然後對每一個 scenario 設定可重現的輸入、可檢查的輸出、可比對的 side effect 與可追蹤的 parity 目標。這比一般單元測試更接近真實 agent harness 的需求。</p>\n<p>本章會先說明為什麼手動測試不夠，再討論 mock service 的價值、scenario-based verification 的設計思路，以及 deterministic harness 為何對 agent 系統特別重要。你會看到，測試在這裡不是單純的 QA 程序，而是架構的一部分。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能說明為什麼 agent harness 需要 deterministic 的 parity 驗證</li>\n<li>能解釋 mock service、scenario manifest、assertion functions 如何共同構成測試系統</li>\n<li>能把 <code>claw-code</code> 的測試哲學轉譯成 <code>mini harness</code> 的基本驗證策略</li>\n</ul>\n<h2>核心概念講解</h2>\n<h3>為什麼手動測試不夠</h3>\n<p>agent harness 的特殊之處，在於它不是只有一個函式輸入與輸出，而是多層次互動：模型可能先輸出文字、再發出 tool use、再根據工具結果給出最後回答；中間還可能牽涉 permission prompt、session 更新、token usage、甚至 auto compaction。這樣的系統如果只靠人工測試，很容易出現三個問題：第一，覆蓋不完整；第二，不容易重現；第三，很難比較回歸差異。</p>\n<p>例如你今天手動試到 <code>write_file</code> 正常，不代表 <code>write_file_denied</code>、<code>multi_tool_turn_roundtrip</code>、<code>token_cost_reporting</code> 也正常。更麻煩的是，即使人工測到問題，你也不一定能在同樣條件下穩定重現。這對 agent 系統特別致命，因為很多 bug 不是靜態語法錯誤，而是流程錯誤、狀態錯誤、或邊界條件錯誤。</p>\n<h3>mock service 的價值</h3>\n<p><code>claw-code</code> 的 mock parity harness 不是只寫幾個 assertion，而是先建立 deterministic mock Anthropic-compatible service，再讓 CLI harness 在乾淨環境中對這個 mock 服務發出請求。這樣做的價值很高，因為它把模型供應者的變動性從測試中隔離出來。你不是在和一個真實、隨時可能漂移的外部模型服務比較，而是在和一個可控制、可腳本化的回應源頭互動。</p>\n<p>這使得很多 agent-specific 行為終於能被穩定測。像 <code>streaming_text</code> 可以專注驗證 streamed text；<code>read_file_roundtrip</code> 可以驗證 tool execution 後的最終 synthesis；<code>bash_permission_prompt_approved</code> 與 <code>bash_permission_prompt_denied</code> 可以檢查同一條 permission path 在不同 approval 下是否行為分岔正確。mock service 的價值，不是「比較省 API 錢」而已，而是讓系統回到可工程化驗證的狀態。</p>\n<h3>scenario-based verification</h3>\n<p><code>mock_parity_scenarios.json</code> 把 parity harness 的核心思想寫得很清楚：每個測試不是抽象功能點，而是一個有名字、有類別、有描述、有 parity 參照的 scenario。裡面列出的場景包括：</p>\n<ul>\n<li><code>streaming_text</code></li>\n<li><code>read_file_roundtrip</code></li>\n<li><code>grep_chunk_assembly</code></li>\n<li><code>write_file_allowed</code></li>\n<li><code>write_file_denied</code></li>\n<li><code>multi_tool_turn_roundtrip</code></li>\n<li><code>bash_stdout_roundtrip</code></li>\n<li><code>bash_permission_prompt_approved</code></li>\n<li><code>bash_permission_prompt_denied</code></li>\n<li><code>plugin_tool_roundtrip</code></li>\n<li><code>auto_compact_triggered</code></li>\n<li><code>token_cost_reporting</code></li>\n</ul>\n<p>這些場景之所以有教學價值，是因為它們把系統拆成可對話的能力斷面。例如 <code>write_file_allowed</code> 與 <code>write_file_denied</code> 不是兩個重複案例，而是用來檢查同一個工具在不同 permission mode 下是否遵守邊界；<code>multi_tool_turn_roundtrip</code> 則不是單純多做幾次工具，而是在驗證同一 assistant turn 中多個工具往返的控制流是否正確；<code>auto_compact_triggered</code> 則把長對話下的 session 維護能力拉進測試範圍。這就是真正的 scenario-based verification：不是測功能名詞，而是測行為情境。</p>\n<h3>deterministic harness 的意義</h3>\n<p>deterministic harness 的真正意義，是讓 agent 行為從「感覺上可用」變成「可證明地一致」。在 <code>mock_parity_harness.rs</code> 裡，每個 scenario 都對應一個 assertion function，例如 <code>assert_streaming_text</code>、<code>assert_read_file_roundtrip</code>、<code>assert_write_file_denied</code>、<code>assert_plugin_tool_roundtrip</code>、<code>assert_auto_compact_triggered</code>、<code>assert_token_cost_reporting</code>。這表示測試不是只有「有沒有跑完」，而是對每個情境明確指定要檢查什麼。</p>\n<p>對 agent harness 來說，這種 deterministic 設計尤其重要，因為它讓你可以分清楚兩類變動：一類是預期內的架構變更，一類是非預期的行為回歸。如果沒有 deterministic harness，你很難知道某次改動是正確擴充、還是意外破壞某條 permission 路徑、某個 tool synthesis、或某個 JSON usage output。換句話說，determinism 不是奢侈品，而是讓 agent 系統能持續演化的前提。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/crates/rusty-claude-cli/tests/mock_parity_harness.rs</code></li>\n<li><code>claw-code/rust/mock_parity_scenarios.json</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>mock_parity_scenarios.json</code>，看有哪些 scenario 類別與描述</li>\n<li>再讀 <code>mock_parity_harness.rs</code> 開頭的 scenario 註冊區段</li>\n<li>最後抽讀幾個 assertion function，例如 <code>assert_write_file_denied</code>、<code>assert_multi_tool_turn_roundtrip</code>、<code>assert_token_cost_reporting</code></li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li>scenario list：有哪些情境被當成 parity coverage 的最低集合</li>\n<li>permission approved / denied paths：同一工具或能力在不同 approval 狀態下如何被驗證</li>\n<li>write_file allowed / denied：能力與 guardrail 如何被一起測</li>\n<li>token cost reporting：系統不只要功能對，還要把 usage / cost 等運維資訊輸出正確</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>parity harness 的設計成本不低。你需要 mock service、scenario manifest、乾淨環境包裝、assertion functions，還要維護它們與系統功能的一致性。從短期速度看，這當然比手動測試重得多。但它換來的，是 agent harness 極需要的三種能力：可重現、可回歸比較、可擴充驗證面。</p>\n<p>另一個取捨是 scenario granularity。scenario 太粗，很多回歸會被藏起來；太細，維護成本會飆高。<code>claw-code</code> 的做法值得學，因為它挑的是一組對 agent 行為最關鍵的斷面：streaming、file tools、permission branching、multi-tool turns、plugin path、session compaction、token cost。這些不是任意挑選，而是直接對應一個真實 harness 最容易壞、也最值得保證的部分。</p>\n<h2>Mini Harness 連結點</h2>\n<p><code>mini harness</code> 不需要第一天就複製整套 parity harness，但它應該學這個哲學：不要只寫「函式回傳 1 或 0」的低價值測試，而要挑幾個能代表整體行為的 scenario。對教學版來說，至少可以保留三類：runtime turn 正常往返、permission denial、session persistence roundtrip。如果能再加入一個簡化的 multi-tool turn 測試，那就更接近真實 agent harness 的精神。重點不是測試數量，而是測試是否真的覆蓋行為邏輯。</p>\n<h2>本章小結</h2>\n<p><code>claw-code</code> 的 parity harness 展示了 agent 測試哲學的成熟版本：用 deterministic mock service 固定模型側行為，用 scenario manifest 定義覆蓋範圍，再用 assertion functions 對每個行為情境做具體檢查。這讓 testing 不再只是補充程序，而成為保障 runtime、tools、permissions、session 與 usage layer 共同正確運作的架構機制。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明為什麼手動測試不足以驗證一個真實 agent harness。</li>\n<li>比較 <code>write_file_allowed</code> 與 <code>write_file_denied</code> 這兩個 scenario 在測試哲學上的差異。</li>\n<li>為 <code>mini harness</code> 設計三個最小但有代表性的 scenario-based tests。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你認為在 agent 系統裡，最值得優先 deterministic 化的行為是哪一類：工具往返、權限分支、session 管理，還是 usage/cost 輸出？為什麼？</li>\n<li>如果某個團隊只測 happy path，不測 denied path 與 degraded path，長期最可能在哪裡踩雷？</li>\n<li>你是否同意「測試其實是對系統邊界的再次設計」這句話？為什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>讀完第 14 章後，你應該更能理解：runtime、tools、permissions、session 不是孤立模組，而是一組需要共同被驗證的行為系統。之後當我們在第 15 章回頭把 <code>claw-code</code> 當成整體來理解時，這種「從 end-to-end 行為回看架構」的視角會變得特別重要。</p>", "ch15": "<h2>章節導言</h2>\n<p>前面的 Part II 其實做了一件有點反直覺的事：我們把一個真實 harness 拆得很開。你先看 runtime，再看 tool system，再看 permissions，再看 parity harness。這種拆法有助於學習，但也有一個風險，就是讀到後面時，腦中只剩下一堆局部模組，卻忘了它們原本是如何一起運作的。因此，第 15 章的任務不是再引入新名詞，而是把前面那些被拆開的元件重新接回整體流程。</p>\n<p>真正成熟的系統理解，不只是知道有哪些 crate、有哪些型別、有哪些 policy，而是能用一條連續敘事說明：使用者如何從 CLI 進入系統、模型呼叫如何被組裝、工具如何被管理與執行、session 如何被持久化、permissions 如何在過程中持續發揮作用、以及 testing 為何能對這整條鏈做 end-to-end 驗證。只有當你能把這條敘事完整說出來，你才算真的看懂 <code>claw-code</code>。</p>\n<p>這一章同時也是 Part II 的收束點。它要替你做兩件事：第一，把 <code>claw-code</code> 從「很多能力」重新還原成「一個整體系統」；第二，幫你分辨哪些東西屬於 harness 的本質，哪些是因為系統要支撐更真實、更大規模、更高可靠性而逐漸長出的能力。這個 distinction 會直接決定你在 Part III 要如何縮小系統、做出自己的 <code>mini harness</code>。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能用 end-to-end 流程說明 <code>claw-code</code> 的整體運作</li>\n<li>能解釋各 crate 與核心元件如何共同構成一個 agent harness</li>\n<li>能區分 <code>claw-code</code> 中哪些能力屬於本質必要、哪些屬於規模化擴充</li>\n</ul>\n<h2>核心概念講解</h2>\n<p>把 <code>claw-code</code> 當成整體系統來看時，最有效的方法不是再按檔案順序走一遍，而是沿著一次真實使用流程來走。從 Rust README 提供的 crate responsibilities 出發，我們可以把整個系統濃縮成一條主流程。</p>\n<p>第一步是 <code>CLI entry</code>。使用者透過 <code>rusty-claude-cli</code> 這個主二進位檔進入系統，可能是 interactive REPL，也可能是 one-shot prompt，也可能是 <code>--resume</code>、<code>status</code>、<code>system-prompt</code> 等模式。這一層的責任不是推理，而是把人的操作入口、旗標、slash commands、顯示格式與 session 互動方式整理成可啟動的工作表面。也就是說，它是 system surface。</p>\n<p>第二步是 <code>request assembly</code>。CLI 收到任務後，真正進入 runtime 層。<code>runtime</code> crate 在 <code>lib.rs</code> 頂端就直白說明，它擁有 session persistence、permission evaluation、prompt assembly 等核心責任。這表示一旦進入執行核心，系統就不再只是把 prompt 往外送，而是會先決定：目前 session 狀態是什麼、system prompt 如何組裝、有哪些 project context、哪些 permission mode 生效、哪些工具被允許暴露給模型。</p>\n<p>第三步是 <code>model call</code>。這時 <code>ConversationRuntime</code> 會把 system prompt 與 conversation messages 組成 <code>ApiRequest</code>，交給 <code>ApiClient</code>。這裡很重要的一點是：模型邊界被明確包成一個抽象接口，所以整個系統不是直接依賴某家 API，而是依賴「能回傳 <code>AssistantEvent</code> 流」的能力。這使得 runtime 真正掌控的是控制流程，而不是把控制權交給模型供應者。</p>\n<p>第四步是 <code>event interpretation and tool execution</code>。模型回傳的不是單一答案，而是一串事件流。runtime 會從中辨識文字增量、usage、tool use、message stop 等訊號。如果 assistant message 內有 pending tool use，系統就不會把這視為整輪結束，而是透過 tool executor 與 tool registry 進入下一段資料流。這裡 <code>tools</code> crate 的角色就非常關鍵：它決定模型看得到哪些工具、這些工具的 schema 與 permission requirement 為何、使用者經由 <code>allowedTools</code> 限制後真正暴露出去的是哪個能力切片。</p>\n<p>第五步是 <code>governance and boundaries</code>。工具不是拿到就執行。每一次工具呼叫，都可能經過 permission policy 的判斷，必要時再透過 enforcer 落到檔案寫入邊界、bash 判斷、或 approval flow。也就是說，能力鏈與治理鏈是同時運作的。runtime 不只是調度模型和工具，也負責把能力放在 guardrails 內。</p>\n<p>第六步是 <code>state persistence</code>。每輪 assistant message、tool result、usage、可能的 compaction 都會回寫到 <code>Session</code>。這讓系統不只是「做完一輪就消失」，而是能被 resume、能保留 transcript、能在長對話中管理累積上下文。從系統角度看，session 並不是附屬 storage，而是把多輪 agent work 變成可持續流程的必要結構。</p>\n<p>第七步是 <code>verification and feedback</code>。當這整條鏈完成後，系統還需要確保自己沒有悄悄退化。這就是 mock parity harness 的位置。它不是在某個孤立角落測單一函式，而是沿著 CLI entry、model interaction、tool use、permission branching、session behavior、usage output 這整條 end-to-end 路徑進行驗證。這也讓 <code>claw-code</code> 從「一個很多功能的 agent 工具」提升為「一個有自我驗證能力的 harness」。</p>\n<p>如果把這整張圖再壓縮一點，你可以把 <code>claw-code</code> 想成四層：</p>\n<ol>\n<li><code>入口層</code>：CLI、slash commands、resume、status、輸出格式</li>\n<li><code>執行層</code>：<code>ConversationRuntime</code>、prompt assembly、session、usage</li>\n<li><code>能力層</code>：tool specs、registry、runtime tools、plugin tools</li>\n<li><code>治理與驗證層</code>：permissions、enforcer、mock parity harness、telemetry</li>\n</ol>\n<p>這四層並不是彼此分離，而是沿著一次工作流相互穿透。使用者從入口層進來，執行層驅動模型回圈，能力層提供手腳，治理與驗證層確保這一切可控且可回歸。</p>\n<h2><code>claw-code</code> 對照閱讀</h2>\n<h3>建議閱讀檔案</h3>\n<ul>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n</ul>\n<h3>閱讀順序</h3>\n<ol>\n<li>先讀 <code>rust/README.md</code> 的 workspace layout 與 crate responsibilities</li>\n<li>再讀 <code>runtime/src/lib.rs</code>，看 runtime 真正收斂了哪些責任</li>\n<li>最後讀 <code>tools/src/lib.rs</code>，確認能力層如何被宣告與輸出</li>\n</ol>\n<h3>閱讀重點</h3>\n<ul>\n<li><code>rusty-claude-cli</code>、<code>runtime</code>、<code>tools</code>、<code>api</code>、<code>telemetry</code> 各自負責什麼</li>\n<li><code>runtime</code> 為何同時重新匯出 conversation、permissions、prompt、session、remote、usage 等模組</li>\n<li><code>tools</code> 如何把 built-in、runtime、plugin 能力統一成模型可見工具表面</li>\n</ul>\n<h2>設計取捨分析</h2>\n<p>把 <code>claw-code</code> 當成整體來看時，一個最重要的分析框架是：<code>什麼是 essential，什麼是 scale-induced</code>。所謂 essential，是指就算你要做一個教學版或最小版系統，也幾乎不能拿掉的東西，例如：模型邊界、runtime loop、tool dispatch、permission gating、session persistence、基本測試。這些能力一旦拿掉，系統會從 harness 退化成比較脆弱的聊天包裝器。</p>\n<p>而 scale-induced 能力，則是那些因為真實使用情境、可靠性要求與擴充需求而長出的部分，例如：hooks、session tracer、prompt cache telemetry、完整 plugin 路徑、remote execution、MCP lifecycle、豐富的 CLI surface、較完整的 parity scenario 組合。這些能力不是不重要，而是它們的重要性來自系統規模與成熟度，而不是作為 harness 的最小本質。</p>\n<p>這個區分很關鍵，因為如果你看不出兩者差異，就會在學習時被規模嚇到，或在重建時不是做得過大，就是削得過頭。<code>claw-code</code> 真正教你的，不只是「真實系統很複雜」，而是「要能在複雜度裡辨認本質」。</p>\n<h2>Mini Harness 連結點</h2>\n<p>這一章最直接的任務，就是替 Part III 做減法。現在你應該可以回答：如果不追求完整複製 <code>claw-code</code>，我最少要帶走什麼？答案會很接近這樣一張縮圖：一個 CLI 或簡單入口、一個最小 runtime loop、一組明確的工具、一層最小 permission policy、一個可 resume 的 session 檔，以及幾個能覆蓋核心行為的測試。這些就是 <code>mini harness</code> 的骨架。</p>\n<p>也因此，第 16 章不會問「如何重做整個 <code>claw-code</code>」，而會問「在理解整個真實系統之後，哪個縮小版本最有教學價值、也最能保留本質」。這正是從分析走向建構的轉折點。</p>\n<h2>本章小結</h2>\n<p>把 <code>claw-code</code> 當成整體系統來理解時，你看到的不再是分散的 crate，而是一條從 CLI entry、到 request assembly、到 model event stream、到 tool execution、到 permission gating、到 session persistence、再到 parity verification 的連續工作流。真正重要的，不只是這條鏈很完整，而是你已經能分辨其中哪些是 harness 的本質，哪些是成熟系統因規模而長出的能力。這個區分，正是 Part III 能成立的基礎。</p>\n<h2>章末練習</h2>\n<ol>\n<li>用一段文字描述 <code>claw-code</code> 從使用者輸入到工具執行再到 session 更新的 end-to-end 流程。</li>\n<li>各列出三項你認為屬於 <code>essential</code> 與 <code>scale-induced</code> 的能力，並解釋理由。</li>\n<li>說明為什麼 mock parity harness 應被視為整體系統理解的一部分，而不是附錄工具。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你過去在讀大型系統時，是否習慣把所有能力都視為同等重要？這樣的閱讀習慣會帶來什麼問題？</li>\n<li>如果現在要把 <code>claw-code</code> 拿去教學，你最怕學生把哪個規模化能力誤認成「一定要先做」？為什麼？</li>\n<li>你會如何向一位沒看過原始碼的人解釋：為什麼 <code>claw-code</code> 不只是很多功能的 CLI，而是一個 harness？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>從下一章開始，我們就正式進入 Part III。也就是說，不再只是分析別人的系統，而是要根據你剛剛整理出的本質清單，定義一個可由自己實作的 Python <code>mini harness</code> 範圍。第 16 章的核心任務，就是做對這個縮減。</p>", "ch16": "<h2>章節導言</h2>\n<p>現在我們終於要從「看懂真實 harness」跨到「自己做一個縮小版 harness」。但在真正開始寫 Python 之前，有一件事比寫程式更重要：先把範圍定義對。很多教學專案失敗，不是因為學生不會寫，而是因為一開始沒有把最小可行範圍切清楚，結果不是一路膨脹成重做整個真實系統，就是反過來縮得太小，最後只剩一個包了 prompt 的小腳本，完全失去 harness 的本質。</p>\n<p>因此，第 16 章的任務不是進入實作細節，而是做一個有意識的減法。我們要從前面學到的 <code>claw-code</code> 整體圖中，挑出最值得保留的核心，再明確列出這一版 <code>mini harness</code> 不做什麼。這種範圍切割不是偷懶，而是教學設計本身。因為本書的目標從來不是複製 <code>claw-code</code>，而是讓你在理解真實系統之後，能獨立做出一個「保留本質、但規模適中」的 agent harness。</p>\n<p>這一章會先界定 v1 的 included 與 excluded 清單，再說明為什麼這樣的減法仍然保留了 Harness Engineering 的核心。接著，我們會把這些決策轉成下一章可以直接動手的任務說明。換句話說，這一章就是 Part III 的 scope contract。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能清楚定義 <code>mini harness</code> v1 應包含與不應包含的能力</li>\n<li>能把前面學到的 <code>claw-code</code> 本質能力轉譯成可教學、可實作的 Python 範圍</li>\n<li>能說明「做得更小」與「做得太薄」之間的差別</li>\n</ul>\n<h2>核心概念講解</h2>\n<p>定義 <code>mini harness</code> 範圍時，最重要的原則不是功能數量，而是是否保留了 agent harness 的本質。從前面 Part II 的分析來看，最小可行版本至少要讓我們看見：模型不是直接裸跑，而是被放進一個有回圈、有工具、有權限、有狀態、有測試的工作系統。若這幾個本質不見了，就算程式跑得起來，也比較像聊天包裝器，而不是 harness。</p>\n<p>基於這個原則，本書將 <code>mini harness</code> v1 定義為以下範圍：</p>\n<h3>Included:</h3>\n<ul>\n<li>message loop</li>\n<li>tool dispatch</li>\n<li>permission policy</li>\n<li>session persistence</li>\n<li>basic tests</li>\n</ul>\n<p>這五項其實正對應前面一路建立起來的核心地圖。<code>message loop</code> 讓系統不是單次輸入輸出，而是真正有 assistant turn、tool result、再回圈的概念；<code>tool dispatch</code> 讓模型有手腳；<code>permission policy</code> 讓手腳不會無限制亂動；<code>session persistence</code> 讓狀態能跨回合延續；<code>basic tests</code> 則保證這些行為不只是「看起來可以」，而是可被驗證。</p>\n<p>接著，我們也要明確定義這一版不做什麼：</p>\n<h3>Excluded for v1:</h3>\n<ul>\n<li>full MCP support</li>\n<li>remote execution</li>\n<li>plugin lifecycle</li>\n<li>full parity harness</li>\n</ul>\n<p>這四項被排除，不是因為它們不重要，而是因為它們都屬於較高階、較規模化、或較整合性的能力。<code>full MCP support</code> 與 <code>plugin lifecycle</code> 牽涉擴充協定與生命週期管理，適合在理解核心 loop 後再加；<code>remote execution</code> 代表另一層環境邊界問題，不應和本地最小系統綁在同一個起點；<code>full parity harness</code> 則是成熟驗證架構，不是教學版第一步的必要門檻。</p>\n<p>更精確地說，v1 的問題不是「能不能做很多」，而是「能不能把最關鍵的系統骨架做對」。如果 v1 能清楚展現 turn loop、tool call、permission denial、session roundtrip 與幾個代表性測試，那它就已經達成了本書的建構目標。</p>\n<h2>本章任務</h2>\n<p>本章的具體任務有四個：</p>\n<ol>\n<li>把 <code>mini harness</code> 的核心需求寫成明確 scope，而不是模糊願望清單</li>\n<li>為下一章的 Python 檔案分工預留清楚邊界</li>\n<li>為第 18 章的 session / testing 設定最低完成標準</li>\n<li>防止範圍膨脹，避免學生在第一版系統裡過早引入 MCP、remote、plugins 等高階能力</li>\n</ol>\n<p>完成這一章後，你應該能回答三個非常實際的問題：第一，v1 一定要有哪些能力才配叫做 harness？第二，哪些能力明明重要，但現在故意不做？第三，下一章開始寫 Python 時，哪些檔案與模組責任已經可以先決定？</p>\n<h2>對照 <code>claw-code</code> 的設計差異</h2>\n<p><code>claw-code</code> 是一個成熟、真實、面向較完整使用情境的 harness，因此它的責任範圍遠大於 <code>mini harness</code>。它有更完整的 CLI surface、有較多工具來源、有 permission policy 與 enforcer 的多層治理、有 session compaction、有 parity harness、有 remote 與 MCP 路徑，也有較多與觀測、追蹤、hook 相關的能力。這些能力對真實系統很有價值，但若一開始就全部搬進教學版，學生很可能還沒真正掌握核心 loop，就先被周邊複雜度淹沒。</p>\n<p>因此，<code>mini harness</code> 的差異不是「比較差的 <code>claw-code</code>」，而是「刻意保留本質的教學版縮圖」。它不追求 feature parity，而追求 concept parity。也就是說，雖然能力範圍大幅縮小，但它仍然應該在架構上保留 <code>claw-code</code> 的幾個關鍵精神：模型透過 runtime 被協調、工具透過宣告與 dispatch 被管理、權限作為外部治理層存在、session 是可持久化狀態，而 testing 是必要條件。</p>\n<h2>實作決策記錄</h2>\n<p>本章先記下幾個對後續實作會有直接影響的決策：</p>\n<ol>\n<li>\n<p>實作語言選擇 <code>Python</code><br />\n原因：教學與自學門檻較低，能把注意力放在系統概念，而不是 Rust 語法細節。</p>\n</li>\n<li>\n<p>先做本地單機版本，不做 remote execution<br />\n原因：先把最小本地回圈做穩，比同時處理跨環境邊界更有教學價值。</p>\n</li>\n<li>\n<p>先做少量工具，不追求完整工具表面<br />\n原因：tooling 的重點是 schema、dispatch、permission coupling，不是工具數量。</p>\n</li>\n<li>\n<p>先做基本 scenario / unit tests，不做 full parity harness<br />\n原因：保留 testing 哲學，但避免第一版就承擔完整 mock service 與大量場景維護成本。</p>\n</li>\n</ol>\n<p>這些決策不是臨時方便，而是刻意為「把本質學到手」服務。</p>\n<h2>本章小結</h2>\n<p>第 16 章的核心工作，是替 <code>mini harness</code> v1 畫出清楚邊界：要包含 message loop、tool dispatch、permission policy、session persistence、basic tests；暫不包含 full MCP support、remote execution、plugin lifecycle、full parity harness。這種範圍定義的目的，不是做得保守，而是讓教學版能保留 harness 的本質，同時維持可實作性與可完成性。</p>\n<h2>章末練習</h2>\n<ol>\n<li>解釋為什麼 <code>session persistence</code> 應被納入 v1，而 <code>remote execution</code> 不應該。</li>\n<li>如果把 <code>basic tests</code> 從 v1 移除，這個系統還算不算一個合格的教學版 harness？為什麼？</li>\n<li>請你重新設計一版 <code>mini harness</code> scope，並說明你和本章版本最大的差異。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你在自己的專案裡，是否有過「第一版做太大」導致難以完成的經驗？如果有，和本章的範圍控制有什麼共通點？</li>\n<li>你認為 <code>mini harness</code> 最容易失去本質的地方是什麼：loop、tools、permissions、session，還是 testing？</li>\n<li>若只能再多加入一項現在被排除的能力，你最想加哪一項？為什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>有了清楚範圍後，下一章就可以真正動手。第 17 章會把這份 scope 轉成具體的 Python project skeleton，開始實作最小 runtime、tools 與 permissions，讓 <code>mini harness</code> 從概念藍圖走向可執行程式。</p>", "ch17": "<h2>章節導言</h2>\n<p>到了這一章，我們終於不再只是替 <code>mini harness</code> 劃範圍，而是要把它轉成一個可執行的 Python 專案骨架。這一步最容易出現兩種失誤。第一種是做得太像教學玩具，只剩一個大檔案把 prompt、工具與權限全部混在一起，雖然短期能跑，但你幾乎學不到真正的 harness 分層。第二種則是過度模仿 <code>claw-code</code>，一開始就把模組拆得很細、抽象拉得很高，結果教學複雜度瞬間爆炸。</p>\n<p>因此，本章的核心任務是做一種「有意識的壓縮」。我們要保留 <code>claw-code</code> 的結構精神，但把它收斂成幾個最少、最能教會人的 Python 檔案。重點不是 feature parity，而是 architectural parity。也就是說，你做出來的東西不需要有完整 CLI、MCP、remote、plugin lifecycle，但它應該已經能清楚展現 runtime loop、tool dispatch、permission gating 這三條主軸是如何彼此咬合的。</p>\n<p>這一章會先定義 project skeleton，再逐一解釋每個檔案對應 Part II 的哪個概念。最後，我們會把這份骨架收斂成一組可操作的 build 任務，讓下一章能順勢接上 session persistence 與測試。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能建立一個保留 harness 本質的 Python 專案骨架</li>\n<li>能說明 <code>runtime.py</code>、<code>tools.py</code>、<code>permissions.py</code> 各自對應 Part II 的哪個系統責任</li>\n<li>能在縮小版實作中維持清楚的能力邊界，而不把所有邏輯混成單一腳本</li>\n</ul>\n<h2>核心概念講解</h2>\n<p>若要把 <code>claw-code</code> 的核心精神濃縮成第一版 Python 實作，一個很合理的最小檔案樹會是：</p>\n<div class=\"codehilite\"><pre><span></span><code>mini-harness/\n├── mini_harness/__init__.py\n├── mini_harness/runtime.py\n├── mini_harness/tools.py\n├── mini_harness/permissions.py\n└── tests/\n    ├── test_runtime.py\n    ├── test_tools.py\n    └── test_permissions.py\n</code></pre></div>\n\n<p>這個骨架之所以好，不是因為它最短，而是因為它剛好把三條最核心的責任線拉開。</p>\n<p><code>mini_harness/__init__.py</code> 的角色很簡單，但仍然重要。它不需要承擔業務邏輯，而是作為 package 的明確出口，整理最值得對外暴露的型別與主物件。對教學來說，這可以幫學生建立一個清楚印象：系統不是靠檔案偶然拼在一起，而是一個有正式入口的 package。</p>\n<p><code>runtime.py</code> 對應的就是我們在第 6 章讀過的 <code>ConversationRuntime</code> 核心精神。當然，Python 版不需要一開始就複製 hooks、prompt cache、session tracer 與 auto compaction，但至少要有幾個本質成分：一個 <code>Runtime</code> 類別或主函式、可注入的 model client 邊界、message loop、最大迭代數、以及遇到 tool use 時會呼叫 tool dispatcher 並把結果送回下一輪。這個檔案的任務是控制流程，不是宣告工具細節，也不是決定權限規則。</p>\n<p><code>tools.py</code> 對應的則是第 7 章的 tool system。這裡最值得保留的不是龐大的工具數量，而是 <code>ToolSpec</code> + registry + dispatch 這條骨架。也就是說，Python 版應該至少有：</p>\n<ul>\n<li><code>ToolSpec</code>：包含 name、description、input schema、required permission</li>\n<li><code>ToolRegistry</code>：集中管理工具宣告與查找</li>\n<li><code>dispatch()</code> 或 <code>execute()</code>：根據工具名稱呼叫對應實作</li>\n</ul>\n<p>這讓你在教學版裡仍然保留「能力宣告」與「能力執行」的分工，而不是把工具當成幾個裸露函式硬塞給 runtime。</p>\n<p><code>permissions.py</code> 對應第 8 章的 permission / guardrail layer。教學版不必完整重做 <code>PermissionEnforcer</code> 的所有 heuristics，但至少應該有：</p>\n<ul>\n<li><code>PermissionMode</code></li>\n<li><code>PermissionPolicy</code></li>\n<li>一個 <code>authorize(tool_name, input)</code> 的最小授權流程</li>\n</ul>\n<p>重點是讓 runtime 在每次工具執行前，真的會問 permission layer，而不是只在文字上說「理論上會檢查」。這個邏輯只要被拆到獨立檔案，學生就比較能真正理解「能力」與「治理」是兩個不同責任。</p>\n<p>最後是 <code>tests/</code>。很多人會覺得測試應該留到下一章再談，但在 project skeleton 階段先把 <code>test_runtime.py</code>、<code>test_tools.py</code>、<code>test_permissions.py</code> 放進樹裡，本身就有教學意義。它等於先宣告：這個專案一開始就預期自己會被驗證，而不是等功能都寫完才想到要補測。這種先把 testing 當正式模組的習慣，本身就是 harness thinking 的一部分。</p>\n<p>若用「Part II 對照表」的方式看，每個 Python 檔案其實都能找到對應來源：</p>\n<ul>\n<li><code>runtime.py</code> -&gt; <code>claw-code/rust/crates/runtime/src/conversation.rs</code></li>\n<li><code>tools.py</code> -&gt; <code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n<li><code>permissions.py</code> -&gt; <code>claw-code/rust/crates/runtime/src/permissions.rs</code> 與 <code>permission_enforcer.rs</code></li>\n<li><code>tests/test_runtime.py</code> -&gt; runtime turn / tool-result roundtrip 的最小驗證</li>\n<li><code>tests/test_tools.py</code> -&gt; tool registry / dispatch / schema 的最小驗證</li>\n<li><code>tests/test_permissions.py</code> -&gt; read-only / workspace-write / denial path 的最小驗證</li>\n</ul>\n<p>這種 mapping 很重要，因為它讓學生知道我們不是隨便取幾個 Python 檔案名，而是在有意識地把 Part II 拆解出的責任重新投影到 Part III 的教學版結構中。</p>\n<h2>本章任務</h2>\n<p>本章的實作任務可以被拆成四步：</p>\n<ol>\n<li>建立 <code>mini_harness/</code> package 與 <code>tests/</code> 目錄</li>\n<li>在 <code>runtime.py</code> 先定義最小回圈與 model / tool 邊界</li>\n<li>在 <code>tools.py</code> 建立最小 tool spec、registry 與 dispatch 流程</li>\n<li>在 <code>permissions.py</code> 定義 mode、policy 與授權判斷，並讓 runtime 在工具執行前使用它</li>\n</ol>\n<p>這裡要注意一個順序原則：先把結構對，再把功能補進去。也就是說，先確立責任邊界，再逐步讓每個模組真的能工作。若一開始就把所有邏輯塞進 <code>runtime.py</code>，之後再拆開會比一開始就保留邊界更痛苦。</p>\n<h2>對照 <code>claw-code</code> 的設計差異</h2>\n<p>和 <code>claw-code</code> 相比，這個 Python 專案骨架做了三種刻意簡化。第一，crate-level 分層被壓縮成少量 Python 檔案。<code>claw-code</code> 把 runtime、tools、api、telemetry、plugins、commands 等責任分散到多個 crate；教學版則只保留最直接與最必要的三個核心模組。第二，成熟系統的周邊能力被暫時拿掉，例如 hooks、MCP、remote、prompt cache、session compaction。第三，CLI surface 與操作模式被刻意簡化，不在第一版就處理完整使用者入口。</p>\n<p>但這些簡化不代表我們放棄系統思維。相反地，這樣的設計差異正是在保留 <code>claw-code</code> 的本質：runtime 仍然是流程控制核心，tools 仍然是正式能力層，permissions 仍然是治理層。真正被縮掉的，是那些對教學第一步來說尚非必要的規模化能力。</p>\n<h2>實作決策記錄</h2>\n<p>這一章先明確記下幾個 build 決策，讓後續實作不會漂移：</p>\n<ol>\n<li>\n<p><code>runtime.py</code> 不直接持有工具細節<br />\n原因：要維持控制流程與能力宣告的分離，避免 runtime 變成萬能大檔案。</p>\n</li>\n<li>\n<p><code>tools.py</code> 保留 <code>ToolSpec</code><br />\n原因：即使工具很少，也要讓 schema 與 required permission 跟著工具宣告走。</p>\n</li>\n<li>\n<p><code>permissions.py</code> 不只是常數設定<br />\n原因：它必須提供最小授權函式，真的參與執行流程，而不是只有裝飾性存在。</p>\n</li>\n<li>\n<p><code>tests/</code> 提前列入骨架<br />\n原因：testing 是系統設計的一部分，不應等到所有功能完成才被想到。</p>\n</li>\n<li>\n<p>第一版專案先不引入複雜 DI 或 plugin 機制<br />\n原因：對教學版而言，清楚邊界比高度抽象更重要。</p>\n</li>\n</ol>\n<h2>本章小結</h2>\n<p>第 17 章把 <code>mini harness</code> 的概念範圍轉成具體 Python 專案骨架。<code>runtime.py</code> 對應流程控制，<code>tools.py</code> 對應能力宣告與 dispatch，<code>permissions.py</code> 對應治理邊界，<code>tests/</code> 則預告這是一個從一開始就要被驗證的系統。這個骨架的價值，不在於它已經完整，而在於它已經把最重要的系統責任放在對的位置上。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明為什麼 <code>runtime.py</code>、<code>tools.py</code>、<code>permissions.py</code> 不應被合併成單一檔案。</li>\n<li>為 <code>mini harness</code> 設計兩個最小工具，並替它們各自指定 <code>required_permission</code>。</li>\n<li>如果你想再多拆一個檔案，你會拆哪一層？是 model client、session、還是 CLI？為什麼？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你傾向於一開始就做較多模組拆分，還是先做一個大檔案再重構？對教學版來說，哪一種風險比較高？</li>\n<li>如果一個學生把 <code>permissions.py</code> 視為可有可無的附加檔案，這透露了他在哪個概念上還沒真正理解？</li>\n<li>你覺得 <code>tests/</code> 先出現在骨架裡，會改變學生對整個專案的心智模型嗎？怎麼改變？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>有了 project skeleton，下一章就會處理這個骨架中最容易被忽略、卻又最能區分 harness 與 demo script 的部分：<code>session persistence</code> 與 <code>basic testing</code>。也就是說，第 18 章會把狀態延續、resume flow、以及三類最低測試案例落實成教學版的可驗證設計。</p>", "ch18": "<h2>章節導言</h2>\n<p>如果第 17 章讓 <code>mini harness</code> 長出了最小的骨架，那麼第 18 章要讓它真正成為「可持續工作的系統」。一個只有 runtime、tools、permissions 的第一版程式，雖然已經比聊天腳本更接近 harness，但如果它無法保存狀態、無法 resume、也沒有最低測試，整體仍然非常脆弱。你很難長對話工作，也很難知道之後修改時是不是把系統默默改壞了。</p>\n<p>因此，本章處理的是兩個最能提升系統穩定度、卻又不需要過度膨脹範圍的能力：<code>session persistence</code> 與 <code>basic testing</code>。前者讓多輪互動不再每次都從零開始；後者讓 runtime、permissions、session 這幾個核心責任至少有最小而有代表性的驗證方式。這兩者一加進來，<code>mini harness</code> 就會從一個概念原型，變成一個真正可迭代的教學系統。</p>\n<p>和 <code>claw-code</code> 相比，我們在這裡依然採取有意識的簡化。重點不是複製完整 session rotation、compaction metadata、usage accounting 或 full parity harness，而是學會：在縮小版系統裡，哪些 session 與 testing 能力最值得先做，才能最大化學習價值與系統穩定度。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能為 <code>mini harness</code> 選擇合理的 session 檔案格式並設計最小 resume flow</li>\n<li>能定義三類最小但有代表性的測試案例</li>\n<li>能說明為什麼 session persistence 與 testing 應被視為核心功能，而非事後補件</li>\n</ul>\n<h2>核心概念講解</h2>\n<p>本章先做一個非常務實的決策：<code>mini harness</code> 的 session file format 採用 <code>jsonl</code>。選擇它的原因不是因為它最炫，而是因為它很適合教學版系統。每一行可以代表一筆 message record，追加寫入容易、閱讀與除錯也直觀，未來若要加入 compaction 或 metadata，也比單一巨大 JSON 物件更容易漸進擴充。更重要的是，這個選擇和 <code>claw-code</code> 的 session persistence 脈絡是相通的，因此學生能把教學版與真實系統做有意義對照。</p>\n<p>一個最小 session record 至少應該保留幾件事：message role、content、必要時的 tool result 資訊、以及可辨識當前 session 的 metadata。教學版不一定要從一開始就保存所有 usage breakdown 或 compaction 狀態，但至少要能做到兩件事：把新訊息 append 到 session 檔中，以及在啟動時把既有 session replay 回記憶體。只要這兩件事成立，resume flow 就有了最小可用版本。</p>\n<p><code>minimal resume flow</code> 可以設計得很簡單。例如：</p>\n<ol>\n<li>啟動時檢查是否提供 <code>session_path</code></li>\n<li>若存在，從 <code>jsonl</code> 檔 replay message records，重建 in-memory session</li>\n<li>若不存在，建立新 session</li>\n<li>每次 user / assistant / tool result 新增後，立即 append 一筆新 record</li>\n</ol>\n<p>這種流程的教學價值很高，因為它把「session 是一個真正的狀態容器」這件事具體化了。學生會很清楚看到：resume 並不是 magical feature，而是因為系統一直有在持久化自己。</p>\n<p>接著是 testing。本章要求至少涵蓋三類測試：</p>\n<ul>\n<li>runtime turn</li>\n<li>permission denial</li>\n<li>session persistence roundtrip</li>\n</ul>\n<p><code>runtime turn</code> 測試要回答的問題是：一個最小 assistant turn 是否真的能完成模型回應、工具呼叫、工具結果回寫、以及最終收斂？它對應的是第 6 章的核心 loop。教學版不需要模擬所有 <code>AssistantEvent</code> 類型，但至少應該有一個 scripted model stub，讓 runtime 能完成一輪「要求工具 -&gt; 收到結果 -&gt; 輸出最終回答」的往返。</p>\n<p><code>permission denial</code> 測試則對應第 8 章。它應該檢查：當某個工具需求高於當前 <code>PermissionMode</code> 時，系統是否真的拒絕執行，而不是只是理論上有這個 policy。這類測試很重要，因為它直接驗證「治理層真的有參與流程」，而不是停留在設定檔或文件上。</p>\n<p><code>session persistence roundtrip</code> 測試則對應第 9 章即將補寫的 session 主題，也和本章的核心功能直接相關。它要回答的是：一個 session 寫出後，是否能被正確讀回，且至少保留 message 順序、role、基本內容與必要 metadata。只要這個 roundtrip 不穩，resume flow 就沒有可信基礎。</p>\n<p>從測試哲學看，這三類案例的價值不在於數量，而在於剛好分別覆蓋了 <code>執行</code>、<code>治理</code>、<code>狀態</code> 三個最核心面向。這比寫很多零散、只檢查 getter/setter 的測試更接近 harness engineering 的需求。</p>\n<h2>本章任務</h2>\n<p>本章的具體任務可以整理成四步：</p>\n<ol>\n<li>為 <code>mini harness</code> 選定 <code>jsonl</code> 作為 session 檔案格式</li>\n<li>在 runtime 或 session helper 中加入最小 <code>resume</code> 流程</li>\n<li>實作三類基本測試：runtime turn、permission denial、session persistence roundtrip</li>\n<li>確保測試名稱與檔案分工反映前一章 project skeleton，而不是把所有驗證塞進單一測試檔</li>\n</ol>\n<p>執行順序上，建議先做 session roundtrip，再做 runtime turn，最後做 permission denial。原因是 session persistence 一旦穩定，runtime 測試與後續 debug 都更容易追蹤；而 permission denial 則依賴前面已有清楚的 mode / policy 介面。</p>\n<h2>對照 <code>claw-code</code> 的設計差異</h2>\n<p><code>claw-code</code> 的 session 系統比教學版成熟得多。從 <code>session.rs</code> 可以看到它支援 JSON 與 JSONL 載入、append 寫入、rotation、compaction metadata、fork provenance、usage metadata 等能力。教學版顯然不需要一次做到這麼完整。對 <code>mini harness</code> 而言，真正值得先保留的是：<code>Session</code> 作為持久化狀態容器、append-friendly 格式、以及最小 resume 能力。</p>\n<p>測試面也是同樣邏輯。<code>claw-code</code> 透過 mock parity harness 驗證 streaming、tool roundtrip、permission branching、plugin path、auto compaction、token cost reporting 等多種 scenario；教學版則只需要抓住能代表本質的三類案例。這不是降低標準，而是把 testing 的哲學先留住，再把規模控制在可教、可做、可完成的範圍。</p>\n<h2>實作決策記錄</h2>\n<p>本章先把幾個 persistence / testing 決策明確記錄下來：</p>\n<ol>\n<li>\n<p>session 格式選擇 <code>jsonl</code><br />\n原因：append 寫入直觀、除錯友善、也較容易和真實 harness 的 session 心智模型對齊。</p>\n</li>\n<li>\n<p>resume flow 採「讀檔 replay」而非複雜 checkpoint<br />\n原因：教學版先聚焦可理解性與可驗證性，不先引入過多狀態同步機制。</p>\n</li>\n<li>\n<p>測試先覆蓋三類核心行為，不追求大量案例<br />\n原因：高價值 scenario 比大量低價值測試更符合 harness engineering 的需求。</p>\n</li>\n<li>\n<p>測試允許使用簡化 stub / fake model client<br />\n原因：重點是驗證 runtime 行為與邊界，不是接上真實模型供應者。</p>\n</li>\n</ol>\n<h2>本章小結</h2>\n<p>第 18 章替 <code>mini harness</code> 補上了最關鍵的穩定度能力：以 <code>jsonl</code> 持久化 session、透過最小 resume flow 重建上下文、並用 runtime turn、permission denial、session persistence roundtrip 三類測試覆蓋執行、治理與狀態三個核心面向。到這一步，教學版系統才真正從概念骨架變成一個可反覆修改、可驗證、可持續工作的 harness。</p>\n<h2>章末練習</h2>\n<ol>\n<li>說明為什麼本章選擇 <code>jsonl</code> 而不是單一 JSON 物件作為第一版 session 格式。</li>\n<li>為 <code>runtime turn</code> 測試設計一個最小 scripted model stub，描述它應回傳哪些步驟。</li>\n<li>如果你只能保留一個測試類別，你會保留 <code>runtime turn</code>、<code>permission denial</code>、還是 <code>session persistence roundtrip</code>？為什麼？</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你覺得很多初學者為什麼會低估 session persistence 的價值？</li>\n<li>如果系統只有 session persistence、沒有測試，和只有測試、沒有 persistence，各自會在什麼地方變得脆弱？</li>\n<li>當教學版 <code>mini harness</code> 將來想升級時，你會先擴充更多 session 能力，還是先擴充更多 parity-style 測試？理由是什麼？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>完成第 18 章後，Part III 的核心建構就已經成形。接下來若回看 <code>claw-code</code>，你會更清楚哪些能力是教學版已經掌握的本質，哪些則是成熟系統因規模而長出的複雜度。這也會為最後的整合章鋪路，讓你能真正回答：從 <code>mini harness</code> 回看真實 harness，我們到底學到了什麼。</p>", "ch19": "<h2>章節導言</h2>\n<p>到第 18 章為止，你已經不是只會「看懂別人的 agent 系統」而已，你也真的做出了一個可工作的 <code>mini harness</code>。這一步非常重要，因為它會徹底改變你再回頭看 <code>claw-code</code> 的方式。前面在 Part II 讀 <code>claw-code</code> 時，你很可能一邊佩服、一邊覺得系統很大；但現在你已經親手處理過 runtime loop、tool dispatch、permission gating、session persistence 與 basic tests，再回看真實 harness 時，你會開始有能力分辨：哪些複雜度是本質，哪些複雜度是規模化之後才不得不長出來的。</p>\n<p>因此，本章不是要你把 <code>mini harness</code> 當成最終答案，也不是要你把 <code>claw-code</code> 當成不可企及的巨大系統。本章真正的任務，是把兩者接起來，建立一種成熟的比較視角。你要學會用自己做過的縮小版系統，反過來理解真實 harness 的設計取捨；同時也要能為自己的下一步升級路線做出判斷。</p>\n<p>換句話說，第 19 章是全書的整合章。它要回答的問題不是「我們還能再加什麼功能」，而是「在真的做過之後，我們到底學到了什麼」，以及「如果要從教學版走向更真實的 harness，應該先長出哪些能力，為什麼」。</p>\n<h2>學習目標</h2>\n<ul>\n<li>能用 <code>mini harness</code> 的實作經驗重新解讀 <code>claw-code</code> 的複雜度來源</li>\n<li>能區分 local teaching harness 與規模化 real harness 之間的能力落差</li>\n<li>能替自己的下一版 harness 擬定有順序的升級路線，而不是無限制加功能</li>\n</ul>\n<h2>核心概念講解</h2>\n<p>完成 <code>mini harness</code> 之後，最值得建立的新能力，是一種「回看能力」。很多學習者在做完教學版系統後，會掉進兩個相反的誤區。第一個誤區是過度自滿，覺得自己已經做出一個 harness，因此真實系統只是不必要地把東西做複雜。第二個誤區則是過度挫折，覺得自己做出來的只是玩具，和 <code>claw-code</code> 之間還有不可跨越的鴻溝。這兩種看法都不夠成熟。</p>\n<p>比較好的框架是把 <code>mini harness</code> 視為一個 <code>concept lens</code>。它不是 <code>claw-code</code> 的縮小 copy，也不是純 demo。它的價值在於讓你把真實系統拆成三種類型的能力：</p>\n<ol>\n<li><code>已掌握的本質能力</code></li>\n<li><code>需要補強的本地能力</code></li>\n<li><code>屬於規模化與產品化的能力</code></li>\n</ol>\n<p>第一類，也就是 <code>已掌握的本質能力</code>，通常包括：</p>\n<ul>\n<li>runtime loop</li>\n<li>tool dispatch</li>\n<li>permission gating</li>\n<li>session persistence</li>\n<li>basic testing</li>\n</ul>\n<p>這些能力之所以重要，是因為只要拿掉其中幾項，系統就很容易退化成一個包裝模型 API 的腳本，而不是一個真正的 harness。你在 Part III 做的事，就是把這些骨架真正裝到手上。</p>\n<p>第二類是 <code>需要補強的本地能力</code>。這類能力還沒有完全跳到 <code>remote</code>、<code>MCP</code>、<code>plugins</code> 或 deployment 等高階場景，但一旦你想讓 <code>mini harness</code> 更穩、更可用，就很容易遇到它們。例如：</p>\n<ul>\n<li>較清楚的 CLI entry 與 mode routing</li>\n<li>更完整的 prompt assembly</li>\n<li>config hierarchy 與 settings override</li>\n<li>更細緻的 transcript 結構</li>\n<li>更有代表性的 scenario tests 與 evaluation</li>\n</ul>\n<p>這些能力比 Part III 更進一步，但仍然可以在單機、本地、教學可控的範圍內成長。它們通常是最值得優先做的 <code>v2 local upgrades</code>。</p>\n<p>第三類則是 <code>屬於規模化與產品化的能力</code>。當你從單一學習者工具，走向多種環境、多種工具來源、較長生命週期與較高可靠性需求時，才會真的碰到它們。例如：</p>\n<ul>\n<li><code>MCP</code> 與外部能力橋接</li>\n<li>plugin lifecycle 與 extension boundary</li>\n<li>remote execution 與多執行環境治理</li>\n<li>hooks、telemetry、usage accounting</li>\n<li>更完整的 regression coverage、cost tracking、deployment concerns</li>\n</ul>\n<p>這些能力不是多餘裝飾，而是規模化系統的真問題。但它們的重要性，來自使用情境與運維現實，而不是來自「harness 這個概念本身」。</p>\n<p>如果把這三類能力轉成升級順序，一條很合理的路線通常會是：</p>\n<ol>\n<li><code>先把本地 teaching harness 做穩</code></li>\n<li><code>再補 local reliability 與 operator usability</code></li>\n<li><code>最後才處理擴充邊界與跨環境邊界</code></li>\n</ol>\n<p>這個順序非常重要。很多人一做完教學版，就急著加 <code>MCP</code>、remote 或 multi-agent orchestration，結果反而把原本已經理解的核心 loop 攪亂。更穩健的做法，是先補那些能直接提升可理解性與可驗證性的能力，例如更好的 CLI、config、prompt assembly、scenario tests 與 evaluation 策略。因為這些能力會讓你後續面對規模化問題時，仍然看得見系統的骨架。</p>\n<p>另一個值得建立的觀念是：<code>claw-code</code> 並不是「mini harness 加很多功能」而已。真正的差異不只是功能數量，而是多條責任鏈的成熟度同時提高了。它的 system surface 更完整、governance 更細緻、session 更成熟、extension boundary 更清楚、verification 也更有系統。這表示從 <code>mini harness</code> 走向真實 harness，不是做一個大規模功能加法，而是同時升級多個系統面向。</p>\n<p>所以，回看 <code>claw-code</code> 時，最成熟的問題不再是「它有什麼我沒有」，而是：</p>\n<ul>\n<li>它多出來的每一層複雜度，是為了解哪一種真實問題？</li>\n<li>這個問題在我的系統裡是否已經出現？</li>\n<li>如果還沒出現，我現在是不是其實不該先做？</li>\n</ul>\n<p>當你能這樣問，代表你已經開始具備 Harness Engineering 的設計判斷，而不只是閱讀能力。</p>\n<h2>本章任務</h2>\n<p>本章的整合任務有四步：</p>\n<ol>\n<li>用 <code>已掌握 / 需補強 / 規模化</code> 三類框架，重新盤點你的 <code>mini harness</code></li>\n<li>對照 <code>claw-code</code>，寫出三項你最想優先補的 <code>v2 local upgrades</code></li>\n<li>為其中一項升級寫一段簡短設計說明，說明它要解決什麼真實痛點</li>\n<li>刻意列出三項你現在暫時不做的能力，並說明為什麼它們屬於後期議題</li>\n</ol>\n<p>若你是自學者，本章最有價值的產出，通常不是新程式碼，而是一份 <code>upgrade roadmap</code>。這份 roadmap 應該能回答：你的下一版要先補 CLI、config、prompt assembly、testing，還是 transcript / evaluation？順序為何？每一步預計降低哪一種風險？</p>\n<p>若你是授課者，則可以把本章任務設計成總結型作業：要求學生提交一份比較報告，說明自己的 <code>mini harness</code> 與 <code>claw-code</code> 的差異，並提出一條合理的 v2 演化路線。</p>\n<h2>對照 <code>claw-code</code> 的設計差異</h2>\n<p>最容易誤解的一點，是把 <code>claw-code</code> 和 <code>mini harness</code> 的差異理解成「前者功能比較多」。其實更準確的說法是：<code>claw-code</code> 的多數能力都不是孤立存在，而是彼此互相支撐。舉例來說，較豐富的 CLI surface 會影響 session 操作與 modes；較成熟的 prompt assembly 會影響 project context 與 config；<code>MCP</code> 和 plugin path 會影響 tool registry 與 permission evaluation；remote execution 又會改寫整個執行環境邊界。這種互相牽動，正是規模化 harness 和教學版 harness 最大的差異。</p>\n<p>也因此，<code>mini harness</code> 的設計差異應該被理解為一種刻意壓縮。它保留的是 <code>architectural parity</code>，不是 <code>feature parity</code>。你已經實作到的，是 harness 最核心的幾條骨架；而 <code>claw-code</code> 額外擁有的，則是讓這些骨架能在更真實、更長期、更高風險的情境下工作所需要的成熟層。</p>\n<p>這個差異並不意味著 <code>mini harness</code> 不夠真實，而是說它的真實性來自「讓你親手做出本質」，<code>claw-code</code> 的真實性則來自「讓這些本質在規模化世界裡仍然成立」。兩者合起來，才構成這門課真正想教的 Harness Engineering 全貌。</p>\n<h2>實作決策記錄</h2>\n<p>本章不新增大量功能，但會替後續升級留下一組決策原則：</p>\n<ol>\n<li>\n<p><code>v1</code> 的成功標準是 concept parity，不是 feature parity<br />\n原因：本書的核心目標是讓學習者掌握 harness 的骨架，而不是重做整個 <code>claw-code</code>。</p>\n</li>\n<li>\n<p><code>v2</code> 優先補 local reliability，不先追規模化功能<br />\n原因：CLI、config、prompt assembly、testing 與 evaluation 會先提升可理解性與可驗證性。</p>\n</li>\n<li>\n<p>每加一項能力，都要先說清楚它解的是哪種真實問題<br />\n原因：避免為了模仿大型系統而盲目加功能，導致結構重新失焦。</p>\n</li>\n<li>\n<p>規模化能力必須和治理、測試、觀測一起成長<br />\n原因：<code>MCP</code>、remote、deployment 或多代理協作若沒有對應 guardrails 與 verification，只會放大風險。</p>\n</li>\n</ol>\n<h2>本章小結</h2>\n<p>第 19 章的重點，不是再替 <code>mini harness</code> 疊更多功能，而是建立一種成熟的回看能力。現在你應該能用 <code>已掌握的本質能力</code>、<code>需要補強的本地能力</code>、以及 <code>屬於規模化與產品化的能力</code> 三類框架，重新理解 <code>claw-code</code> 與自己做出的系統差異。這種判斷力，才是從教材走向真實設計工作的真正門檻。</p>\n<h2>章末練習</h2>\n<ol>\n<li>請把你的 <code>mini harness</code> 現況分成 <code>已掌握 / 需補強 / 規模化</code> 三類，每類至少列三項。</li>\n<li>在 CLI、config、prompt assembly、evaluation、scenario testing 中，選兩項作為 <code>v2</code> 優先升級，並說明排序理由。</li>\n<li>說明為什麼 <code>MCP</code>、remote execution 或 deployment 不一定適合成為教學版下一步的第一優先。</li>\n</ol>\n<h2>反思問題</h2>\n<ul>\n<li>你過去是否有過「一看到大型系統就想全部複製」的衝動？這種衝動對學習與設計有什麼風險？</li>\n<li>如果你真的要把 <code>mini harness</code> 變成日常可用工具，你最先感受到的痛點會是什麼：入口、設定、上下文、工具治理、還是測試？</li>\n<li>當一個系統開始規模化時，你覺得最容易被低估的是哪一層：permissions、session、evaluation、還是環境邊界？</li>\n</ul>\n<h2>延伸閱讀 / 下一章預告</h2>\n<p>本書主體到這裡完成，但學習其實才剛進入第二階段。接下來建議你使用附錄作為行動指南：附錄 A 幫你建立 <code>claw-code</code> 的重點閱讀地圖，附錄 B 幫你把 <code>mini harness</code> 變成可交付的專題作品，附錄 D 則整理 <code>MCP</code>、multi-agent、UI、deployment、evaluation 等後續延伸方向。</p>", "appendix-a": "<h2>這份附錄要解決什麼問題</h2>\n<p><code>claw-code</code> 不是一個適合從頭到尾線性讀完的 repo。對初學者來說，真正困難的通常不是看不懂單一函式，而是不知道「先讀哪裡、後讀哪裡」，也不知道哪些檔案是核心，哪些暫時可以略過。因此，這份附錄的目的不是列出所有檔案，而是替你建立一條和本書章節對齊的閱讀地圖。</p>\n<p>最重要的原則只有一句話：<code>先用問題帶路，不要用目錄帶路</code>。你應該先問自己現在想理解的是入口、runtime、tools、permissions、session、prompt、config、extension、remote，還是 testing，再去追對應檔案。</p>\n<h2>建議的總閱讀順序</h2>\n<p>若你要完整走一次 <code>claw-code</code>，建議使用以下順序：</p>\n<ol>\n<li><code>claw-code/README.md</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/PHILOSOPHY.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/conversation.rs</code></li>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/session.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/prompt.rs</code></li>\n<li><code>claw-code/rust/crates/rusty-claude-cli/tests/mock_parity_harness.rs</code></li>\n</ol>\n<p>這條順序的目的，是先建立入口與哲學，再進核心 runtime，最後才處理 verification 與較高階邊界。</p>\n<h2>章節對照表</h2>\n<table>\n<thead>\n<tr>\n<th>本書章節</th>\n<th>你要回答的問題</th>\n<th>優先閱讀檔案</th>\n<th>第一輪先看什麼</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>第 1 章</td>\n<td>為什麼這不是單純 prompt 工具？</td>\n<td><code>README.md</code>, <code>PHILOSOPHY.md</code></td>\n<td>產品定位、agent 工作方式、設計哲學</td>\n</tr>\n<tr>\n<td>第 4 章</td>\n<td>如何建立 reading strategy？</td>\n<td><code>README.md</code>, <code>USAGE.md</code>, <code>rust/README.md</code></td>\n<td>入口文件、workspace layout、crate responsibilities</td>\n</tr>\n<tr>\n<td>第 5 章</td>\n<td>系統從哪裡進來？</td>\n<td><code>USAGE.md</code>, <code>rusty-claude-cli</code> 相關檔案</td>\n<td>subcommands、modes、system surface</td>\n</tr>\n<tr>\n<td>第 6 章</td>\n<td>runtime loop 怎麼運作？</td>\n<td><code>runtime/src/lib.rs</code>, <code>runtime/src/conversation.rs</code></td>\n<td><code>ApiRequest</code>、<code>AssistantEvent</code>、turn loop</td>\n</tr>\n<tr>\n<td>第 7 章</td>\n<td>tools 怎麼被定義與暴露？</td>\n<td><code>tools/src/lib.rs</code></td>\n<td><code>ToolSpec</code>、registry、<code>definitions()</code></td>\n</tr>\n<tr>\n<td>第 8 章</td>\n<td>guardrails 在哪裡真的生效？</td>\n<td><code>runtime/src/permissions.rs</code> 及相關 enforcer 檔案</td>\n<td><code>PermissionMode</code>、policy、授權判斷</td>\n</tr>\n<tr>\n<td>第 9 章</td>\n<td>session 與 transcript 如何持久化？</td>\n<td><code>runtime/src/session.rs</code></td>\n<td>append、resume、transcript 結構</td>\n</tr>\n<tr>\n<td>第 10 章</td>\n<td>system prompt 怎麼被組起來？</td>\n<td><code>runtime/src/prompt.rs</code></td>\n<td>project context、instruction files、prompt assembly</td>\n</tr>\n<tr>\n<td>第 11 章</td>\n<td>config 與 modes 怎麼影響行為？</td>\n<td><code>runtime/src/lib.rs</code> 與 config 相關檔案</td>\n<td>hierarchy、settings、環境敏感行為</td>\n</tr>\n<tr>\n<td>第 12 章</td>\n<td>MCP / plugins 到底做到哪裡？</td>\n<td>extension / bridge / registry 相關檔案</td>\n<td>implemented path 與 planned surface 的邊界</td>\n</tr>\n<tr>\n<td>第 13 章</td>\n<td>remote 為什麼是另一種問題？</td>\n<td>remote / proxy / execution context 相關檔案</td>\n<td>local vs remote boundary</td>\n</tr>\n<tr>\n<td>第 14 章</td>\n<td>系統怎麼驗證自己沒退化？</td>\n<td><code>tests/mock_parity_harness.rs</code>, <code>mock_parity_scenarios.json</code></td>\n<td>scenario-based verification</td>\n</tr>\n<tr>\n<td>第 15 章</td>\n<td>如何把整體重新接回來？</td>\n<td><code>rust/README.md</code>, <code>runtime/src/lib.rs</code>, <code>tools/src/lib.rs</code></td>\n<td>end-to-end 系統鏈</td>\n</tr>\n</tbody>\n</table>\n<h2>按主題閱讀，而不是按資料夾閱讀</h2>\n<h3>Route 1：如果你想先看懂整體系統</h3>\n<ol>\n<li><code>claw-code/README.md</code></li>\n<li><code>claw-code/USAGE.md</code></li>\n<li><code>claw-code/rust/README.md</code></li>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n</ol>\n<p>這條路線適合第一次進 repo 時使用。目標不是理解所有型別，而是先知道「有哪些主要層次」。</p>\n<h3>Route 2：如果你最關心 runtime loop</h3>\n<ol>\n<li><code>claw-code/rust/crates/runtime/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/conversation.rs</code></li>\n<li>回看第 6 章與第 15 章</li>\n</ol>\n<p>重點是沿著一次 assistant turn 去看，而不是從每個 helper module 細節開始。</p>\n<h3>Route 3：如果你最關心 tools 與 permissions</h3>\n<ol>\n<li><code>claw-code/rust/crates/tools/src/lib.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/permissions.rs</code></li>\n<li>對照第 7、8 章</li>\n</ol>\n<p>這條路線最適合想理解「能力」與「治理」如何耦合的人。</p>\n<h3>Route 4：如果你最關心 session / prompt / config</h3>\n<ol>\n<li><code>claw-code/rust/crates/runtime/src/session.rs</code></li>\n<li><code>claw-code/rust/crates/runtime/src/prompt.rs</code></li>\n<li>config 與相關 settings 檔案</li>\n<li>對照第 9、10、11 章</li>\n</ol>\n<p>這條路線可以幫你理解系統為什麼不是把 prompt 直接送出去，而是先把上下文與設定組成工作環境。</p>\n<h3>Route 5：如果你最關心 extension、remote 與 testing</h3>\n<ol>\n<li>extension / bridge / registry 相關檔案</li>\n<li>remote / execution context / proxy 相關檔案</li>\n<li><code>claw-code/rust/crates/rusty-claude-cli/tests/mock_parity_harness.rs</code></li>\n<li><code>claw-code/rust/mock_parity_scenarios.json</code></li>\n</ol>\n<p>這條路線建議放在較後面，因為它比較容易把初學者帶進規模化複雜度，而忽略核心 loop。</p>\n<h2>第一輪閱讀時可以暫時略過什麼</h2>\n<p>第一次讀 <code>claw-code</code>，你不需要同時追所有 helper、所有旗標、所有實驗性邊界。更好的做法是先刻意略過：</p>\n<ul>\n<li>還看不出責任邊界的細碎 utility 檔案</li>\n<li>你暫時不打算實作的規模化能力</li>\n<li>所有你一追就會忘記原本問題的支線</li>\n</ul>\n<p>這不是偷懶，而是為了保留閱讀主軸。對初學者來說，最大的風險通常不是讀太少，而是讀太散。</p>\n<h2>三個常見閱讀錯誤</h2>\n<ol>\n<li>一開始就去追 Python port，結果錯過 <code>rust/</code> 主實作的責任分層。</li>\n<li>看到 <code>MCP</code>、plugins、remote 就立刻深挖，結果核心 runtime 還沒建立穩定心智模型。</li>\n<li>把 mock parity harness 當成附屬測試，不把它當成理解整個 harness 的入口之一。</li>\n</ol>\n<h2>最後的使用建議</h2>\n<p>如果你是第一次學 Harness Engineering，請把這份 reading map 和本書章節一起使用，而不是獨立使用。最有效的方式，是先用章節建立問題意識，再用這份 reading map 對照 <code>claw-code</code> 的具體檔案。這樣你讀到的就不只是原始碼，而是一條有教學節奏的理解路線。</p>", "appendix-b": "<h2>這份附錄的用途</h2>\n<p>Part III 與第 19 章已經帶你把 <code>mini harness</code> 的核心骨架做出來，也帶你理解它和 <code>claw-code</code> 的關係。這份附錄的目的，是把那些章節內容整理成一份可直接執行的專題製作指南。換句話說，如果你想把這門教材轉成一個可提交、可展示、可迭代的作品，就從這裡開始。</p>\n<h2>專題目標</h2>\n<p>你的專題不需要重做 <code>claw-code</code>，但必須清楚展現你已經理解 Harness Engineering 的本質。最低要求是：做出一個可以跑多輪互動、能呼叫工具、會經過 permission policy、能保存 session、而且有基本測試的 <code>mini harness</code>。</p>\n<h2>最低交付物</h2>\n<p>建議至少交出以下內容：</p>\n<ol>\n<li>一個可執行的 <code>mini harness</code> 專案</li>\n<li>一份 <code>README.md</code>，說明系統定位、使用方式與設計取捨</li>\n<li>至少三類測試：runtime turn、permission denial、session persistence roundtrip</li>\n<li>一份簡短設計說明，解釋它如何對照 <code>claw-code</code></li>\n</ol>\n<h2>建議的最低檔案樹</h2>\n<div class=\"codehilite\"><pre><span></span><code>mini-harness/\n├── README.md\n├── mini_harness/\n│   ├── __init__.py\n│   ├── runtime.py\n│   ├── tools.py\n│   └── permissions.py\n└── tests/\n    ├── test_runtime.py\n    ├── test_tools.py\n    └── test_permissions.py\n</code></pre></div>\n\n<p>如果你的 session logic 已經開始變多，也可以在第二階段再拆出 <code>session.py</code>。但第一版不必為了看起來完整而過早拆太多檔案。</p>\n<h2>建議的製作流程</h2>\n<h3>Step 1：先寫 scope contract</h3>\n<p>先用一頁文字寫清楚：</p>\n<ul>\n<li>Included: message loop、tool dispatch、permission policy、session persistence、basic tests</li>\n<li>Excluded for v1: full <code>MCP</code> support、remote execution、plugin lifecycle、full parity harness</li>\n</ul>\n<p>沒有這一步，專題很容易變成持續膨脹的功能清單。</p>\n<h3>Step 2：先把骨架搭對</h3>\n<p>在 <code>runtime.py</code>、<code>tools.py</code>、<code>permissions.py</code> 中先建立責任邊界，再補功能。不要一開始就把所有邏輯塞進單一檔案。因為這門專題真正要評估的，不只是能不能跑，而是你有沒有保留 harness 的分層思維。</p>\n<h3>Step 3：先完成最小 roundtrip</h3>\n<p>先讓系統做到一件事：模型可以請求工具，runtime 真的執行工具，工具結果能回到下一輪，最後 assistant 能產生完成訊息。只要這條主鏈沒有打通，其他周邊能力都不應該先做。</p>\n<h3>Step 4：再補 permission denial</h3>\n<p>加入一個至少會被拒絕的工具情境。這一步非常關鍵，因為它能證明你的系統不是把工具直接裸露給模型，而是真的有治理層。</p>\n<h3>Step 5：最後補 session persistence 與 tests</h3>\n<p>把 message history 寫進 <code>jsonl</code> 或其他簡單格式，確保 session 能重新載入。然後補三類基本測試。這時候你的專題才真正從 demo 變成一個最小但完整的 harness。</p>\n<h2>最低完成標準</h2>\n<p>你的 <code>mini harness</code> 至少應達成以下條件：</p>\n<ul>\n<li>能處理至少一次工具往返的多輪流程</li>\n<li>至少有兩個工具，而且各自有 <code>required_permission</code></li>\n<li><code>read-only</code> 模式下至少有一個工具會被正確拒絕</li>\n<li>session 可以被寫出並重新載入</li>\n<li>三類基本測試可以通過</li>\n<li><code>README.md</code> 能清楚說明它和 <code>claw-code</code> 的關係</li>\n</ul>\n<p>如果上述任何一項缺失，你的作品很可能仍比較像 demo script，而不是教學版 harness。</p>\n<h2>建議的 README 結構</h2>\n<p>你可以把專題說明寫成以下五段：</p>\n<ol>\n<li>這個 <code>mini harness</code> 的目標是什麼</li>\n<li>它對照 <code>claw-code</code> 保留了哪些核心概念</li>\n<li>v1 刻意不做哪些能力</li>\n<li>如何安裝、執行與測試</li>\n<li>下一步升級路線是什麼</li>\n</ol>\n<p>這樣的 README 不只幫助他人閱讀，也會反過來迫使你釐清自己的設計判斷。</p>\n<h2>自我檢查清單</h2>\n<p>在交付前，請至少問自己以下問題：</p>\n<ul>\n<li>我的 runtime 是否真的掌控流程，而不是把所有事交給模型 stub？</li>\n<li>tool schema、dispatch 與 permission requirement 是否有被明確宣告？</li>\n<li>permission policy 是否真的在執行前被呼叫？</li>\n<li>session persistence 是否只是把資料 dump 出去，還是真的能支撐 resume？</li>\n<li>tests 是否在驗證高價值 scenario，而不是只測零碎函式？</li>\n</ul>\n<h2>常見失敗模式</h2>\n<ol>\n<li>一開始就加太多工具，結果 registry 與權限邊界設計變得混亂。</li>\n<li>為了模仿 <code>claw-code</code> 而過早加入 <code>MCP</code>、remote 或 plugin 機制，最後核心 loop 反而不穩。</li>\n<li>只有 happy path，沒有 permission denial 或 session roundtrip。</li>\n<li>沒有寫設計說明，導致讀者看不出這個專題到底學到了什麼。</li>\n</ol>\n<h2>建議的加分方向</h2>\n<p>若你完成最低版本後還有餘力，可以再選一條 <code>v2</code> 路線：</p>\n<ul>\n<li>加入更清楚的 CLI entry</li>\n<li>加入簡單 config file 與 settings override</li>\n<li>強化 prompt assembly 與 project context</li>\n<li>補更多 scenario tests 或簡單 evaluation 指標</li>\n<li>把 transcript 結構做得更清楚</li>\n</ul>\n<p>這些方向都比一開始就跳去 deployment 或 multi-agent orchestration 更適合作為第一個升級台階。</p>\n<h2>最後提醒</h2>\n<p>這份專題指南的核心精神只有一句話：<code>保留本質，控制範圍</code>。你的 <code>mini harness</code> 不需要變成 <code>claw-code</code>，但它必須足夠完整，能證明你真的理解了 harness 為什麼不是單純 prompt wrapper。只要你能做到這點，這份專題就已經很有價值。</p>", "appendix-d": "<h2>為什麼還需要這份附錄</h2>\n<p>完成本書後，你已經有能力看懂 <code>claw-code</code> 的核心架構，也能自己做出一個 <code>mini harness</code>。但 Harness Engineering 的學習不會停在這裡。真正往實務走時，系統常常會碰到更長的生命週期、更多工具來源、更多使用情境，以及更高的可靠性需求。這些問題，未必適合放進第一輪教材，但很適合作為第二階段進修方向。</p>\n<p>這份附錄的目的是幫你辨識下一步可能的路線，而不是要你一次全做完。你應該根據自己的目標，選擇最需要的一條往下挖。</p>\n<h2>方向 1：<code>MCP</code> 與能力擴充介面</h2>\n<p>如果你想讓 harness 能接更多外部能力來源，而不是只靠內建工具，下一步很自然會走到 <code>MCP</code>。這條路線的核心問題包括：</p>\n<ul>\n<li>工具 schema 如何跨邊界對齊？</li>\n<li>外部能力如何被安全地註冊到系統？</li>\n<li>permission policy 要怎麼延伸到外部工具？</li>\n<li>lifecycle 與 error handling 該放在哪一層？</li>\n</ul>\n<p>這個方向適合想研究 extension architecture、tool bridge 與能力治理的人。</p>\n<h2>方向 2：Multi-Agent Orchestration</h2>\n<p>當一個 agent 不夠用，或者你想把任務拆成 planner、executor、reviewer 等多角色時，就會進入 multi-agent orchestration。這條路線最重要的不是讓 agent 數量變多，而是處理：</p>\n<ul>\n<li>任務如何切分</li>\n<li>中介狀態如何共享</li>\n<li>角色邊界如何定義</li>\n<li>錯誤與衝突如何回收</li>\n</ul>\n<p>如果沒有清楚 orchestration 設計，多代理只會把單代理的混亂放大。</p>\n<h2>方向 3：UI 與 Human Oversight</h2>\n<p>本書主要用 CLI 與教材式視角理解 harness，但真實系統常常還需要更好的操作介面。你可以研究：</p>\n<ul>\n<li>approval flow 如何在 UI 中被清楚呈現</li>\n<li>transcript、tool logs、permission decision 如何可視化</li>\n<li>人類如何中途介入、修正、批准或中止 agent 行為</li>\n<li>長任務如何讓使用者維持可理解感</li>\n</ul>\n<p>這個方向特別適合想把 harness 變成真正可被一般使用者操作的產品介面的人。</p>\n<h2>方向 4：Deployment 與運維</h2>\n<p>當 harness 從個人專案變成團隊工具，deployment 問題就會浮現。這不只是把程式放到雲端而已，而是要考慮：</p>\n<ul>\n<li>執行環境如何隔離</li>\n<li>secrets 與 credentials 如何管理</li>\n<li>remote workers 如何被啟動與監控</li>\n<li>版本更新如何避免破壞既有 workflow</li>\n<li>成本、資源與失敗重試如何被追蹤</li>\n</ul>\n<p>這條路線會讓你看到，為什麼很多看似「只是工程雜事」的能力，其實會反過來改寫 harness 的核心設計。</p>\n<h2>方向 5：Evaluation、Telemetry 與 Cost Awareness</h2>\n<p>只要系統開始長期使用，<code>evaluation</code> 就不再是可有可無的補充件。你會需要思考：</p>\n<ul>\n<li>什麼叫做一輪任務成功？</li>\n<li>哪些 scenario 應該被固定回歸測試？</li>\n<li>usage、latency、tool failure rate、approval rate 應該如何觀測？</li>\n<li>哪些指標能提醒你系統正在退化？</li>\n</ul>\n<p>如果沒有 evaluation 與 telemetry，系統就算看起來能跑，也很難知道它是不是在悄悄變差。</p>\n<h2>方向 6：Security、Sandbox 與 Policy Engineering</h2>\n<p>當 agent 擁有更多手腳，安全邊界就會成為真正的設計核心。後續可深入的問題包括：</p>\n<ul>\n<li>shell、file system、network 的能力該如何分層授權？</li>\n<li>sandbox 與 approval 機制如何彼此搭配？</li>\n<li>哪些政策應由 prompt 處理，哪些應由外部系統強制？</li>\n<li>如何避免模型在錯誤環境假設下做出高風險操作？</li>\n</ul>\n<p>這條方向特別適合想從 Guardrails 進一步走向更嚴格 policy engineering 的人。</p>\n<h2>一條實際可行的進修順序</h2>\n<p>如果你不確定從哪裡開始，以下是一條很穩健的順序：</p>\n<ol>\n<li>先補 local reliability：CLI、config、prompt assembly、更多 tests</li>\n<li>再補 evaluation / telemetry，建立可觀測性</li>\n<li>接著才處理 <code>MCP</code> 或其他 extension boundary</li>\n<li>最後再考慮 remote、deployment、multi-agent orchestration</li>\n</ol>\n<p>這個順序的好處是：你會先把系統做得穩、看得清，再去碰會大量放大複雜度的議題。</p>\n<h2>可作為第二階段專題的題目</h2>\n<p>若你想延伸本書內容，可以考慮以下題目：</p>\n<ul>\n<li>為 <code>mini harness</code> 加上一個簡化版 CLI 與 config 機制</li>\n<li>為 <code>mini harness</code> 增加 scenario-based evaluation</li>\n<li>設計一個最小 <code>MCP</code> bridge 實驗</li>\n<li>把 permission decision 與 tool logs 做成簡單 UI</li>\n<li>實作一個可被部署到遠端 worker 的執行模型</li>\n</ul>\n<h2>最後建議</h2>\n<p>後續進修最重要的不是一次學最多，而是每次只擴充一條責任鏈。當你加入 <code>MCP</code>、deployment、evaluation 或 multi-agent 時，都應該反問自己：這一層新能力是否仍然能被既有 runtime、permissions、session、testing 框架穩定承接？如果答案是否定的，代表你需要的可能不是更多功能，而是先把骨架補強。</p>"};
    var TITLES = {"readme": "Harness Engineering Book", "index": "Harness Engineering 教材索引", "syllabus": "Harness Engineering 課程綱要", "roadmap": "自主學習路線圖", "glossary": "Glossary", "references": "References", "ch01": "第 1 章：從 Prompt Engineering 到 Harness Engineering", "ch02": "第 2 章：AI Agent 系統的基本構成", "ch03": "第 3 章：Harness 的核心設計原則", "ch04": "第 4 章：如何閱讀一個真實的 Agent Harness", "ch05": "第 5 章：從 CLI 入口看整個系統", "ch06": "第 6 章：Conversation Runtime：Agent Loop 的心臟", "ch07": "第 7 章：Tool System：讓模型有手腳", "ch08": "第 8 章：Permissions and Guardrails：讓模型不會亂來", "ch09": "第 9 章：Session、Transcript、Memory", "ch10": "第 10 章：Prompt Assembly 與 Project Context", "ch11": "第 11 章：Config、Modes 與執行環境", "ch12": "第 12 章：MCP、Plugins 與能力擴充", "ch13": "第 13 章：Remote 與多執行環境能力", "ch14": "第 14 章：Parity Harness 與測試哲學", "ch15": "第 15 章：把 `claw-code` 當成一個完整系統來理解", "ch16": "第 16 章：定義 Mini Harness 的最小範圍", "ch17": "第 17 章：實作最小 Runtime、Tools 與 Permissions", "ch18": "第 18 章：加入 Session Persistence 與基本測試", "ch19": "第 19 章：從 Mini Harness 回看真實 Harness", "appendix-a": "附錄 A：`claw-code` 閱讀地圖", "appendix-b": "附錄 B：`mini harness` 專題製作指南", "appendix-d": "附錄 D：後續進修方向"};

    function applyTheme(t) {
      root.setAttribute("data-theme", t);
      localStorage.setItem("he-reader-theme", t);
      var btn = document.getElementById("themeBtn");
      if (btn) btn.textContent = t === "dark" ? "淺色模式" : "深色模式";
    }
    if (storedTheme === "light" || storedTheme === "dark") {
      applyTheme(storedTheme);
    } else {
      applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    }
    document.getElementById("themeBtn").addEventListener("click", function () {
      var cur = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
      applyTheme(cur === "dark" ? "light" : "dark");
    });

    function showDoc(key, push) {
      if (!DOCS[key]) return;
      var html = DOCS[key];
      document.getElementById("docBody").innerHTML = html;
      document.getElementById("docTitle").textContent = TITLES[key] || key;
      document.getElementById("docMeta").textContent = "";
      document.querySelectorAll(".nav-link").forEach(function (el) {
        el.setAttribute("aria-current", el.getAttribute("data-key") === key ? "page" : "false");
      });
      if (push !== false) {
        try {
          history.replaceState(null, "", "#" + encodeURIComponent(key));
        } catch (e) {}
      }
      localStorage.setItem("he-reader-last", key);
      wireInternalLinks();
      window.scrollTo({ top: 0, behavior: "smooth" });
      closeMenu();
    }

    function wireInternalLinks() {
      document.getElementById("docBody").querySelectorAll("a.internal-md-link").forEach(function (a) {
        a.addEventListener("click", function (ev) {
          var k = a.getAttribute("data-doc");
          if (!k || !DOCS[k]) return;
          ev.preventDefault();
          showDoc(k);
          var h = a.getAttribute("href");
          if (h && h.indexOf("#") > 0) {
            var id = h.slice(h.indexOf("#") + 1);
            setTimeout(function () {
              var target = document.getElementById(id);
              if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 50);
          }
        });
      });
    }

    function openMenu() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("backdrop").classList.add("show");
      document.getElementById("backdrop").hidden = false;
      document.getElementById("menuBtn").setAttribute("aria-expanded", "true");
    }
    function closeMenu() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("backdrop").classList.remove("show");
      document.getElementById("backdrop").hidden = true;
      document.getElementById("menuBtn").setAttribute("aria-expanded", "false");
    }
    document.getElementById("menuBtn").addEventListener("click", function () {
      if (document.getElementById("sidebar").classList.contains("open")) closeMenu();
      else openMenu();
    });
    document.getElementById("backdrop").addEventListener("click", closeMenu);

    document.querySelectorAll(".nav-link").forEach(function (btn) {
      btn.addEventListener("click", function () {
        showDoc(btn.getAttribute("data-key"));
      });
    });

    var search = document.getElementById("navSearch");
    search.addEventListener("input", function () {
      var q = search.value.trim().toLowerCase();
      document.querySelectorAll(".nav-link").forEach(function (el) {
        var t = (el.textContent || "").toLowerCase();
        el.classList.toggle("hidden", q && t.indexOf(q) === -1);
      });
      document.querySelectorAll(".nav-section-title").forEach(function (title) {
        var section = title.nextElementSibling;
        if (!section) return;
        var any = false;
        section.querySelectorAll(".nav-link").forEach(function (el) {
          if (!el.classList.contains("hidden")) any = true;
        });
        title.style.display = q && !any ? "none" : "";
      });
    });

    var toTop = document.getElementById("toTop");
    window.addEventListener("scroll", function () {
      toTop.classList.toggle("visible", window.scrollY > 400);
    });
    toTop.addEventListener("click", function () {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    var initial = DEFAULT_KEY;
    try {
      var h = location.hash ? decodeURIComponent(location.hash.slice(1)) : "";
      if (h && DOCS[h]) initial = h;
      else {
        var last = localStorage.getItem("he-reader-last");
        if (last && DOCS[last]) initial = last;
      }
    } catch (e) {}
    showDoc(initial, false);
  })();
  </script>
</body>
</html>
